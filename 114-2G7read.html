<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>七下 課文句子翻譯理解講義 (大電視互動點擊版)</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts: Noto Sans TC (Chinese) & Lexend (English) -->
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background-color: #f1f5f9;
    }
    .font-chinese { font-family: 'Noto Sans TC', sans-serif; }
    .font-english { font-family: 'Lexend', sans-serif; }
    
    .page-a4 {
      width: 210mm;
      height: 297mm;
      background-color: #ffffff;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
      margin: 20px auto;
      padding: 8mm 15mm;
      box-sizing: border-box;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* 大電視選取中題目的聚焦特效底色 */
    .active-row {
      background-color: #fef08a !important; 
    }

    /* 列印專用配置 */
    @media print {
      @page { size: A4; margin: 0; }
      body { background-color: #ffffff; margin: 0; }
      .page-a4 {
        width: 210mm;
        height: 297mm;
        margin: 0;
        padding: 8mm 15mm;
        box-shadow: none;
        border: none;
        overflow: hidden;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .no-print { display: none !important; }
      /* 確保列印時提示顏色不印出來 */
      .hint-active-text { color: inherit !important; font-weight: inherit !important; }
      .hint-active-box { background-color: transparent !important; color: inherit !important; border-color: transparent !important; }
    }
    
    .break-avoid { break-inside: avoid; }
  </style>
</head>
<body class="p-0 m-0 min-h-screen flex flex-col items-center justify-start">

  <!-- 頂端控制列（整合雙排選課功能，列印時自動隱藏） -->
  <div class="no-print w-full max-w-[210mm] bg-white mt-4 p-4 rounded-xl shadow-md flex flex-col gap-3 border border-slate-200">
    <div class="flex flex-wrap gap-2 items-center justify-between border-b border-slate-100 pb-2">
      <div class="flex items-center gap-2">
        <span class="inline-block w-3 h-3 bg-blue-500 rounded-full animate-pulse"></span>
        <span class="text-slate-700 font-medium text-sm font-chinese">📺 大電視已啟動：點擊題目任一列（變黃底），再點下方任一中文選項即可填入答案！點句子可聽慢速發音。</span>
      </div>
      <div class="flex gap-2">
        <button onclick="toggleAnswers()" class="px-3 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-lg text-xs transition shadow-sm font-chinese">顯示 / 隱藏全頁答案</button>
        <button onclick="clearAnswers()" class="px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium rounded-lg text-xs transition border border-slate-300 font-chinese">重設清除全頁</button>
        <button onclick="window.print()" class="px-3 py-1.5 bg-emerald-600 hover:bg-emerald-700 text-white font-medium rounded-lg text-xs transition shadow-sm font-chinese">🖨️ 列印學習單</button>
      </div>
    </div>
    
    <!-- 雙排選課功能區 -->
    <div class="flex flex-col gap-2">
      <div class="flex items-center gap-2 text-xs font-bold text-slate-500 font-chinese shrink-0">💬 課文對話版：</div>
      <div class="grid grid-cols-6 gap-1.5" id="dialogue-selectors"></div>
      <div class="flex items-center gap-2 text-xs font-bold text-slate-500 font-chinese shrink-0 mt-1">📖 課文閱讀版：</div>
      <div class="grid grid-cols-6 gap-1.5" id="reading-selectors"></div>
    </div>
  </div>

  <!-- A4 靜態列印主結構 -->
  <div class="page-a4">
    <!-- 頂部標頭與學生資料填寫區 -->
    <div class="pb-2 mb-2 border-b-2 border-slate-200 shrink-0">
      <div class="flex justify-between items-end">
        <div>
          <h1 class="text-[23px] font-bold text-slate-800 tracking-wider font-chinese text-left leading-none" id="main-title">七下 L6 課文句子翻譯理解講義</h1>
        </div>
        <div class="flex gap-6 text-[15px] font-medium text-slate-700 text-right leading-none mb-1 font-chinese">
          <div>班級/座號：______</div>
          <div>姓名：__________</div>
        </div>
      </div>
    </div>

    <!-- 核心作答連續區區塊 (動態生成) -->
    <div class="flex-grow flex flex-col justify-between space-y-2 overflow-hidden" id="levels-container"></div>
  </div>

  <script>
    // 講義資料庫：預留 L1 ~ L6 欄位，先將您提供的 L6 閱讀版放入
    const database = {
      "L1_D": { title: "七下 L1 課文句子翻譯理解講義 (對話版)", levels: [] },
      "L1_R": { title: "七下 L1 課文句子翻譯理解講義 (閱讀版)", levels: [] },
      "L2_D": { title: "七下 L2 課文句子翻譯理解講義 (對話版)", levels: [] },
      "L2_R": { title: "七下 L2 課文句子翻譯理解講義 (閱讀版)", levels: [] },
      "L3_D": { title: "七下 L3 課文句子翻譯理解講義 (對話版)", levels: [] },
      "L3_R": { title: "七下 L3 課文句子翻譯理解講義 (閱讀版)", levels: [] },
      "L4_D": { title: "七下 L4 課文句子翻譯理解講義 (對話版)", levels: [] },
      "L4_R": { title: "七下 L4 課文句子翻譯理解講義 (閱讀版)", levels: [] },
      "L5_D": { title: "七下 L5 課文句子翻譯理解講義 (對話版)", levels: [] },
      "L5_R": { title: "七下 L5 課文句子翻譯理解講義 (閱讀版)", levels: [] },
      "L6_D": { title: "七下 L6 課文句子翻譯理解講義 (對話版)", levels: [] },
      "L6_R": { title: "七下 L6 課文句子翻譯理解講義 (閱讀版)", levels: [
        {
          id: 1,
          name: "Level 1",
          desc: "基礎字詞理解：",
          colorClass: "green",
          bgClass: "bg-green-50 text-green-800",
          badgeClass: "bg-green-600",
          questions: [
            { qNum: 1, ans: "A", type: "eng", keyWord: "India", txtPre: "Welcome to ", txtPost: ", Anna and Zac.", tts: "Welcome to India, Anna and Zac.", opts: [{id:"A", ch:"印度"}, {id:"B", ch:"印尼"}, {id:"C", ch:"泰國"}] },
            { qNum: 2, ans: "B", type: "eng", keyWord: "slept", txtPre: "We're not tired; we ", txtPost: " a lot on the plane.", tts: "We're not tired; we slept a lot on the plane.", opts: [{id:"A", ch:"玩耍"}, {id:"B", ch:"睡覺"}, {id:"C", ch:"吃飯"}] },
            { qNum: 3, ans: "C", type: "eng", keyWord: "popular", txtPre: "I got two cups of lassi. It's a ", txtPost: " drink in India.", tts: "I got two cups of lassi. It's a popular drink in India.", opts: [{id:"A", ch:"昂貴的"}, {id:"B", ch:"奇怪的"}, {id:"C", ch:"受歡迎的"}] }
          ]
        },
        {
          id: 2,
          name: "Level 2",
          desc: "句意翻譯理解：",
          colorClass: "blue",
          bgClass: "bg-blue-50 text-blue-800",
          badgeClass: "bg-blue-600",
          questions: [
            { qNum: 4, ans: "B", type: "eng", keyWord: "rest", txtPre: "You two traveled a long way. Do you need a ", txtPost: "?", tts: "You two traveled a long way. Do you need a rest?", opts: [{id:"A", ch:"你們兩個走得很慢。你們需要一把椅子嗎？"}, {id:"B", ch:"你們兩個遠道而來。需不需要休息一下？"}, {id:"C", ch:"你們兩個跑得快。需要喝一杯水嗎？"}] },
            { qNum: 5, ans: "A", type: "eng_full", keyWord: "I went to a bookstore the other day and bought a book about the Taj Mahal.", txtPre: "", txtPost: "", tts: "I went to a bookstore the other day and bought a book about the Taj Mahal.", opts: [{id:"A", ch:"我前幾天去了一間書店，買了一本關於泰姬瑪哈陵的書。"}, {id:"B", ch:"我昨天去圖書館，借了一本關於火車旅行的書。"}, {id:"C", ch:"我今天去文具店，買了泰姬瑪哈陵的漂亮明信片。"}] },
            { qNum: 6, ans: "B", type: "eng_full", keyWord: "We took many beautiful pictures and learned the story behind the building.", txtPre: "", txtPost: "", tts: "We took many beautiful pictures and learned the story behind the building.", opts: [{id:"A", ch:"我們畫了許多美麗的畫，並講述這棟大樓的故事。"}, {id:"B", ch:"我們拍了許多美麗的照片，還學習了這座建築背後的故事。"}, {id:"C", ch:"我們買了許多美麗的照片，還參觀了這座歷史建築。"}] },
            { qNum: 7, ans: "A", type: "eng_full", keyWord: "What's that man doing over there?", txtPre: "", txtPost: "", tts: "What's that man doing over there?", opts: [{id:"A", ch:"那個男人在那邊做什麼？"}, {id:"B", ch:"那個男人生病需要幫忙嗎？"}, {id:"C", ch:"那個男人想要去哪裡呢？"}] },
            { qNum: 8, ans: "C", type: "eng_full", keyWord: "He's selling food and drinks. Do you want anything?", txtPre: "", txtPost: "", tts: "He's selling food and drinks. Do you want anything?", opts: [{id:"A", ch:"他在分發免費食物。你想吃點什麼嗎？"}, {id:"B", ch:"他在吃便當跟喝飲料。你需要幫他買嗎？"}, {id:"C", ch:"他在賣食物和飲料。你想要什麼嗎？"}] }
          ]
        },
        {
          id: 3,
          name: "Level 3",
          desc: "翻譯挑戰：",
          colorClass: "purple",
          bgClass: "bg-purple-50 text-purple-800",
          badgeClass: "bg-purple-600",
          questions: [
            { qNum: 9, ans: "A", type: "ch_main", keyWord: "關於", txtPre: "中文：我前幾天去了一間書店，買了一本", txtPost: "泰姬瑪哈陵的書。", opts: [
              {id:"A", ch:"I went to a bookstore and bought a book <strong class='keyword-target font-bold'>about</strong> the Taj Mahal.", tts: "I went to a bookstore and bought a book about the Taj Mahal."},
              {id:"B", ch:"I went to a bookstore and bought a book <strong class='keyword-target font-bold'>above</strong> the Taj Mahal.", tts: "I went to a bookstore and bought a book above the Taj Mahal."},
              {id:"C", ch:"I went to a bookstore and bought a book <strong class='keyword-target font-bold'>around</strong> the Taj Mahal.", tts: "I went to a bookstore and bought a book around the Taj Mahal."}
            ]},
            { qNum: 10, ans: "B", type: "ch_main", keyWord: "受歡迎的", txtPre: "中文：在印度這是一種", txtPost: "飲料。試試吧！", opts: [
              {id:"A", ch:"It's a <strong class='keyword-target font-bold'>sweet</strong> drink in India. Try it!", tts: "It's a sweet drink in India. Try it!"},
              {id:"B", ch:"It's a <strong class='keyword-target font-bold'>popular</strong> drink in India. Try it!", tts: "It's a popular drink in India. Try it!"},
              {id:"C", ch:"It's a <strong class='keyword-target font-bold'>cold</strong> drink in India. Try it!", tts: "It's a cold drink in India. Try it!"}
            ]}
          ]
        }
      ]}
    };

    let currentKey = "L6_R"; 
    let showAnswersState = false;
    let activeInput = null; 
    let hintStates = { 1: false, 2: false, 3: false }; // 紀錄各 Level 提示是否開啟

    function speakWord(word) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(word);
        utterance.lang = 'en-US';
        utterance.rate = 0.8; 
        window.speechSynthesis.speak(utterance);
      }
    }

    // 渲染講義核心畫面
    function renderLesson() {
      const data = database[currentKey];
      document.getElementById('main-title').innerText = data.title;
      const container = document.getElementById('levels-container');
      container.innerHTML = '';

      if (data.levels.length === 0) {
        container.innerHTML = `<div class="text-center py-12 text-slate-400 font-chinese font-bold text-[18px]">（本課欄位已預留，尚無測試資料）</div>`;
        return;
      }

      data.levels.forEach(lvl => {
        let qHtml = '';
        
        lvl.questions.forEach(q => {
          let sentenceHtml = '';
          if (q.type === 'eng') {
            sentenceHtml = `<span onclick="speakWord('${q.tts.replace(/'/g, "\\'")}')" class="cursor-pointer hover:text-blue-600 transition text-[17px] pl-1 font-medium">${q.txtPre}<strong class="keyword-target font-bold text-slate-800">${q.keyWord}</strong>${q.txtPost}</span>`;
          } else if (q.type === 'eng_full') {
            sentenceHtml = `<span onclick="speakWord('${q.tts.replace(/'/g, "\\'")}')" class="cursor-pointer hover:text-blue-600 transition text-[17px] pl-1 font-medium keyword-target text-slate-800">${q.keyWord}</span>`;
          } else if (q.type === 'ch_main') {
            sentenceHtml = `<span class="text-[16px] pl-1 font-chinese font-semibold text-slate-700">${q.txtPre}<strong class="keyword-target underline decoration-2 text-slate-700">${q.keyWord}</strong>${q.txtPost}</span>`;
          }

          let optsHtml = '';
          q.opts.forEach(opt => {
            if (q.type === 'ch_main') {
              optsHtml += `<div onclick="selectAnswer('${opt.id}')" data-opt-id="${opt.id}" class="opt-box px-2 py-0.5 rounded transition cursor-pointer hover:bg-slate-100 flex items-center">(A) ${opt.ch}</div>`.replace('(A)', `(${opt.id})`);
            } else {
              optsHtml += `<div onclick="selectAnswer('${opt.id}')" data-opt-id="${opt.id}" class="opt-box px-2 py-0.5 rounded transition cursor-pointer hover:bg-slate-100 flex items-center">(${opt.id}) ${opt.ch}</div>`;
            }
          });

          let flexLayout = (lvl.id === 1) ? "pl-14 flex gap-12 text-[14.5px] font-chinese text-slate-500 font-medium" : "pl-14 flex flex-col gap-1 text-[14.5px] font-chinese text-slate-500 font-medium";
          if (lvl.id === 3) flexLayout = "pl-14 flex flex-col gap-1 text-[15px] font-medium text-slate-500";

          qHtml += `
            <div class="flex flex-col leading-tight quiz-row transition duration-200 py-0.5 rounded px-1">
              <div class="flex items-start">
                <span class="text-slate-700 font-bold shrink-0 mt-0.5 text-[17px]">(</span>
                <input type="text" maxlength="1" data-ans="${q.ans}" readonly class="answer-input w-7 h-7 text-center font-bold text-blue-600 border-b-2 border-slate-400 focus:outline-none uppercase bg-transparent text-[16px] shrink-0 mx-0.5 cursor-pointer pointer-events-none">
                <span class="text-slate-700 font-bold shrink-0 mt-0.5 text-[17px]">) ${q.qNum}.</span>
                ${sentenceHtml}
              </div>
              <div class="${flexLayout} mt-1">
                ${optsHtml}
              </div>
            </div>
          `;
        });

        container.innerHTML += `
          <div class="break-avoid sub-level-block" data-lvl-id="${lvl.id}">
            <div class="flex justify-between items-center ${lvl.bgClass} px-2.5 py-0.5 rounded mb-1.5 shrink-0 border border-slate-200">
              <h2 class="text-[15px] font-bold font-chinese flex items-center gap-2">
                <span class="px-1.5 py-0.2 ${lvl.badgeClass} text-white text-[10px] rounded font-english">${lvl.name}</span>
                <span>${lvl.desc}</span>
                <span id="score-${lvl.id}" class="no-print hidden ml-2 px-1 py-0.2 bg-emerald-600 text-white rounded text-[10px] font-bold"></span>
              </h2>
              
              <!-- 標題列互動三鍵列印時自動隱藏 -->
              <div class="no-print flex gap-1.5">
                <button onclick="checkLevel(${lvl.id})" class="px-2 py-0.5 bg-emerald-600 hover:bg-emerald-700 text-white font-medium rounded text-[11px] transition shadow-sm font-chinese">✅ 批改</button>
                <button onclick="toggleHint(${lvl.id})" class="px-2 py-0.5 bg-amber-500 hover:bg-amber-600 text-white font-medium rounded text-[11px] transition shadow-sm font-chinese">🔍 提示</button>
                <button onclick="toggleLevelAnswers(${lvl.id})" class="px-2 py-0.5 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded text-[11px] transition shadow-sm font-chinese">💡 解答</button>
              </div>
            </div>
            <div class="space-y-2.5 font-english text-slate-800 pl-1">
              ${qHtml}
            </div>
          </div>
        `;
      });
      
      hintStates = { 1: false, 2: false, 3: false }; // 重設提示狀態
    }

    // 大電視聚焦作答法
    function setActiveRow(element) {
      document.querySelectorAll('.quiz-row').forEach(row => row.classList.remove('active-row'));
      const parentRow = element.closest('.quiz-row');
      parentRow.classList.add('active-row');
      activeInput = parentRow.querySelector('.answer-input');
      
      // 點擊聚焦時，如果內有含英文語音，同步播放
      const ttsSpan = parentRow.querySelector('[onclick^="speakWord"]');
      if (ttsSpan) ttsSpan.click();
    }

    // 當直接點擊題目列時觸發聚焦
    document.addEventListener('click', function(e) {
      const row = e.target.closest('.quiz-row');
      if (row && !e.target.classList.contains('opt-box') && !e.target.closest('.opt-box')) {
        setActiveRow(row);
      }
    });

    // 點選答案填入
    function selectAnswer(letter) {
      if (activeInput) {
        activeInput.value = letter;
        activeInput.className = "answer-input w-7 h-7 text-center font-bold text-blue-600 border-b-2 border-slate-400 focus:outline-none uppercase bg-transparent text-[16px] shrink-0 mx-0.5 cursor-pointer pointer-events-none";
        
        const allRows = Array.from(document.querySelectorAll('.quiz-row'));
        const currentIdx = allRows.indexOf(activeInput.closest('.quiz-row'));
        
        activeInput.closest('.quiz-row').classList.remove('active-row');
        
        // 自動聚焦下一題
        if (currentIdx !== -1 && currentIdx < allRows.length - 1) {
          setActiveRow(allRows[currentIdx + 1]);
        } else {
          activeInput = null;
        }
      }
    }

    // 功能四-1：✅ 批改按鈕
    function checkLevel(lvlId) {
      const lvlBlock = document.querySelector(`.sub-level-block[data-lvl-id="${lvlId}"]`);
      if (!lvlBlock) return;

      const rows = lvlBlock.querySelectorAll('.quiz-row');
      let total = rows.length;
      let correct = 0;

      rows.forEach(row => {
        const input = row.querySelector('.answer-input');
        const userAns = input.value.trim().toUpperCase();
        const correctAns = input.getAttribute('data-ans');

        if (userAns === '') return;

        if (userAns === correctAns) {
          correct++;
          input.className = "answer-input w-7 h-7 text-center font-bold text-emerald-700 bg-emerald-100 rounded focus:outline-none uppercase text-[16px] shrink-0 mx-0.5 cursor-pointer pointer-events-none border-b-2 border-emerald-500";
        } else {
          input.value = ''; // 錯了直接擦掉
          input.className = "answer-input w-7 h-7 text-center font-bold text-blue-600 border-b-2 border-slate-400 focus:outline-none uppercase bg-transparent text-[16px] shrink-0 mx-0.5 cursor-pointer pointer-events-none";
        }
      });

      const scoreBadge = document.getElementById(`score-${lvlId}`);
      if (scoreBadge) {
        scoreBadge.innerText = `答對 ${correct} / ${total}`;
        scoreBadge.classList.remove('hidden');
      }
    }

    // 功能四-2：🔍 提示按鈕（關鍵字同步上色，不直接閃爍）
    function toggleHint(lvlId) {
      const lvlBlock = document.querySelector(`.sub-level-block[data-lvl-id="${lvlId}"]`);
      if (!lvlBlock) return;

      hintStates[lvlId] = !hintStates[lvlId];
      const rows = lvlBlock.querySelectorAll('.quiz-row');

      rows.forEach(row => {
        const input = row.querySelector('.answer-input');
        const correctAns = input.getAttribute('data-ans');
        const isCorrect = input.classList.contains('bg-emerald-100'); // 已答對的不再提示

        const keyWordTarget = row.querySelector('.keyword-target');
        const targetOpt = row.querySelector(`[data-opt-id="${correctAns}"]`);

        if (hintStates[lvlId] && !isCorrect) {
          // 啟動關鍵字提示：中英文關鍵字與正確選項同步上色
          if (keyWordTarget) {
            keyWordTarget.classList.add('text-red-600', 'font-bold', 'hint-active-text');
            if(keyWordTarget.classList.contains('text-slate-800')) keyWordTarget.classList.remove('text-slate-800');
            if(keyWordTarget.classList.contains('text-slate-700')) keyWordTarget.classList.remove('text-slate-700');
          }
          if (targetOpt) {
            targetOpt.classList.add('bg-red-50', 'text-red-600', 'font-bold', 'border', 'border-red-300', 'hint-active-box');
          }
        } else {
          // 關閉提示：復原無顏色狀態
          if (keyWordTarget) {
            keyWordTarget.classList.remove('text-red-600', 'hint-active-text');
            if (keyWordTarget.tagName === 'STRONG' && !keyWordTarget.classList.contains('underline')) {
              keyWordTarget.classList.add('text-slate-800');
            } else {
              keyWordTarget.classList.add('text-slate-700');
            }
          }
          if (targetOpt) {
            targetOpt.classList.remove('bg-red-50', 'text-red-600', 'font-bold', 'border', 'border-red-300', 'hint-active-box');
          }
        }
      });
    }

    // 功能四-3：💡 解答按鈕 (單層開關)
    function toggleLevelAnswers(lvlId) {
      const lvlBlock = document.querySelector(`.sub-level-block[data-lvl-id="${lvlId}"]`);
      if (!lvlBlock) return;

      const inputs = lvlBlock.querySelectorAll('.answer-input');
      let isShowing = false;
      if (inputs.length > 0 && inputs[0].value === inputs[0].getAttribute('data-ans') && inputs[0].classList.contains('bg-red-50')) {
        isShowing = true;
      }

      inputs.forEach(input => {
        const ans = input.getAttribute('data-ans');
        if (!isShowing) {
          input.value = ans;
          input.className = "answer-input w-7 h-7 text-center font-bold text-red-600 bg-red-50 rounded focus:outline-none uppercase text-[16px] shrink-0 mx-0.5 cursor-pointer pointer-events-none border-b-2 border-red-400";
        } else {
          input.value = '';
          input.className = "answer-input w-7 h-7 text-center font-bold text-blue-600 border-b-2 border-slate-400 focus:outline-none uppercase bg-transparent text-[16px] shrink-0 mx-0.5 cursor-pointer pointer-events-none";
        }
      });

      const scoreBadge = document.getElementById(`score-${lvlId}`);
      if (scoreBadge) scoreBadge.classList.add('hidden');
    }

    // 全頁控制列功能
    function toggleAnswers() {
      showAnswersState = !showAnswersState;
      const data = database[currentKey];
      data.levels.forEach(lvl => {
        const lvlBlock = document.querySelector(`.sub-level-block[data-lvl-id="${lvl.id}"]`);
        if (!lvlBlock) return;
        const inputs = lvlBlock.querySelectorAll('.answer-input');
        inputs.forEach(input => {
          if (showAnswersState) {
            input.value = input.getAttribute('data-ans');
            input.className = "answer-input w-7 h-7 text-center font-bold text-red-600 bg-red-50 rounded focus:outline-none uppercase text-[16px] shrink-0 mx-0.5 border-b-2 border-red-400 pointer-events-none";
          } else {
            input.value = '';
            input.className = "answer-input w-7 h-7 text-center font-bold text-blue-600 border-b-2 border-slate-400 focus:outline-none uppercase bg-transparent text-[16px] shrink-0 mx-0.5 pointer-events-none";
          }
        });
        document.getElementById(`score-${lvl.id}`).classList.add('hidden');
      });
    }

    function clearAnswers() {
      const data = database[currentKey];
      data.levels.forEach(lvl => {
        const lvlBlock = document.querySelector(`.sub-level-block[data-lvl-id="${lvl.id}"]`);
        if (!lvlBlock) return;
        lvlBlock.querySelectorAll('.answer-input').forEach(input => {
          input.value = '';
          input.className = "answer-input w-7 h-7 text-center font-bold text-blue-600 border-b-2 border-slate-400 focus:outline-none uppercase bg-transparent text-[16px] shrink-0 mx-0.5 pointer-events-none";
        });
        document.getElementById(`score-${lvl.id}`).classList.add('hidden');
      });
      document.querySelectorAll('.quiz-row').forEach(row => row.classList.remove('active-row'));
      showAnswersState = false;
      activeInput = null;
    }

    // 初始化雙排選單按鈕
    function initSelectors() {
      const dContainer = document.getElementById('dialogue-selectors');
      const rContainer = document.getElementById('reading-selectors');
      dContainer.innerHTML = '';
      rContainer.innerHTML = '';

      for (let i = 1; i <= 6; i++) {
        // 對話版按鈕
        const btnD = document.createElement('button');
        btnD.innerText = `💬 L${i} 對話`;
        const keyD = `L${i}_D`;
        btnD.className = "lesson-btn py-1 rounded-md text-xs font-semibold border transition font-chinese bg-slate-50 text-slate-700 hover:bg-slate-200 border-slate-200";
        btnD.onclick = () => switchLesson(keyD, btnD);
        dContainer.appendChild(btnD);

        // 閱讀版按鈕
        const btnR = document.createElement('button');
        btnR.innerText = `📖 L${i} 閱讀`;
        const keyR = `L${i}_R`;
        btnR.className = "lesson-btn py-1 rounded-md text-xs font-semibold border transition font-chinese bg-slate-50 text-slate-700 hover:bg-slate-200 border-slate-200";
        btnR.onclick = () => switchLesson(keyR, btnR);
        rContainer.appendChild(btnR);
      }

      // 預設高亮 L6 閱讀版
      const defaultBtn = rContainer.children[5];
      if (defaultBtn) switchLesson("L6_R", defaultBtn);
    }

    function switchLesson(key, btnElement) {
      currentKey = key;
      document.querySelectorAll('.lesson-btn').forEach(btn => {
        btn.className = "lesson-btn py-1 rounded-md text-xs font-semibold border transition font-chinese bg-slate-50 text-slate-700 hover:bg-slate-200 border-slate-200";
      });
      btnElement.className = "lesson-btn py-1 rounded-md text-xs font-semibold border transition font-chinese bg-blue-600 text-white border-blue-600 shadow-sm";
      renderLesson();
    }

    window.onload = initSelectors;
  </script>
</body>
</html>
