<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>網路偵探：你能看穿壞人的陷阱嗎？</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: '微軟正黑體', sans-serif; }
        .border-red { border: 4px solid #b91c1c; }
        .text-shadow { text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="h-screen flex items-center justify-center overflow-hidden p-6">

    <div id="app" class="w-full max-w-5xl h-[80vh] flex flex-col justify-center">
        <!-- 開始畫面 -->
        <div id="start-screen" class="text-center space-y-8">
            <h1 class="text-6xl font-black text-yellow-500 italic">你能看穿壞人的陷阱嗎？</h1>
            <p class="text-3xl text-gray-300">你以為你很聰明，但壞人比你更專業。</p>
            <button onclick="startGame()" class="bg-red-700 text-white text-4xl font-bold py-6 px-16 rounded-2xl animate-pulse">開始偵探任務</button>
        </div>

        <!-- 遊戲主體 -->
        <div id="game-screen" class="hidden h-full flex flex-col justify-center">
            <div id="content-container" class="bg-gray-900 p-10 rounded-3xl border-red shadow-2xl">
                <div id="scene-box" class="space-y-8">
                    <p id="scene-text" class="text-4xl font-bold leading-relaxed"></p>
                    <div id="options" class="grid grid-cols-2 gap-6"></div>
                </div>
                
                <div id="feedback-box" class="hidden space-y-6">
                    <p id="analysis" class="text-3xl font-medium text-yellow-300 leading-relaxed"></p>
                    <button onclick="nextScene()" class="w-full bg-yellow-600 text-black text-3xl font-black py-5 rounded-xl">下一題</button>
                </div>
            </div>
        </div>

        <!-- 結尾 -->
        <div id="end-screen" class="hidden text-center space-y-10">
            <h2 class="text-5xl font-black text-red-500">保護自己，不是因為你笨！</h2>
            <div class="bg-gray-800 p-10 rounded-3xl border-red">
                <p class="text-3xl font-bold italic mb-8">而是因為有人專門利用你的相信。</p>
                <div class="grid grid-cols-3 gap-6 text-2xl font-bold">
                    <div class="p-6 bg-gray-700 rounded-xl">🔴 有疑問，先問老師。</div>
                    <div class="p-6 bg-gray-700 rounded-xl">🔴 有壓力，先拒絕。</div>
                    <div class="p-6 bg-gray-700 rounded-xl">🔴 有秘密，先懷疑。</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const scenes = [
            { text: "LINE 聊天：他每天陪你聊天三個月，說他很懂你。", options: ["這很安全", "要小心，聊久不代表認識"], analysis: "🟡 很多人都會這樣想。網路聊多久，都不能代表對方真實的年齡、長相或身分。" },
            { text: "對方說：『如果愛我，就傳照片給我。』", options: ["傳照片證明愛", "這有危險，絕對不傳"], analysis: "💡 真正愛你的人，不會叫你證明。照片傳出去，就可能被保存、威脅，甚至散布。" },
            { text: "對方說：『不要跟老師或爸媽說喔！』", options: ["好，這是秘密", "危險！馬上找老師"], analysis: "🔴 任何要求保密、刪紀錄、不要截圖的行為，都是危險的開始。" },
            { text: "遊戲中：『給我帳號密碼，送你稀有裝備。』", options: ["領免費裝備", "帳號是我的秘密，拒絕"], analysis: "💡 帳號密碼是你的鎖匙，任何人要帳密，通常都是為了騙走你的財產。" },
            { text: "網友約見面：『約在人多的車站很安全。』", options: ["車站人多很安全", "依然危險，沒告知家人就不去"], analysis: "💡 人多不代表安全。沒有家長或老師同意的網友見面，就是紅旗。" }
        ];

        let current = 0;
        function startGame() { 
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            showScene(); 
        }
        function showScene() {
            document.getElementById('scene-box').classList.remove('hidden');
            document.getElementById('feedback-box').classList.add('hidden');
            const s = scenes[current];
            document.getElementById('scene-text').innerText = s.text;
            const optDiv = document.getElementById('options');
            optDiv.innerHTML = '';
            s.options.forEach(o => {
                const btn = document.createElement('button');
                btn.className = "bg-gray-700 hover:bg-gray-600 p-8 rounded-2xl text-2xl font-bold transition";
                btn.innerText = o;
                btn.onclick = () => {
                    document.getElementById('scene-box').classList.add('hidden');
                    document.getElementById('feedback-box').classList.remove('hidden');
                    document.getElementById('analysis').innerText = s.analysis;
                };
                optDiv.appendChild(btn);
            });
        }
        function nextScene() {
            current++;
            if(current < scenes.length) showScene();
            else {
                document.getElementById('game-screen').classList.add('hidden');
                document.getElementById('end-screen').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
