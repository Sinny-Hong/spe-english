    let currentLesson = "L1";

    let流水題號計數器 = 1;

    function speakWord(word) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const cleaned = cleanPastTense(word);
        const utterance = new SpeechSynthesisUtterance(cleaned);
        utterance.lang = 'en-US';
        utterance.rate = 0.85; 
        window.speechSynthesis.speak(utterance);
      }
    }

    function cleanPastTense(rawEng) {
      if (rawEng.includes('/')) {
        const parts = rawEng.split('/');
        const presentTense = parts[0].trim();
        const secondPart = parts[1].trim();
        const secondWords = secondPart.split(/\s+/);
        if (secondWords.length > 1) {
          const tailCapsule = secondWords.slice(1).join(' ');
          return `${presentTense} ${tailCapsule}`;
        }
        return presentTense;
      }
      return rawEng.trim();
    }

    // 完美對照聽力卷骨架：高度鎖定在 h-5，縮小中文、擴大英文、絕不超頁[cite: 1]
    function buildGroupHtml(groupData, groupIndex, isPrintMode = false) {
      let rowsHtml = '';
      
      for (let i = 0; i < 12; i++) {
        const wordItem = groupData.words[i];
        if (wordItem) {
          const cleanedEnglish = cleanPastTense(wordItem.eng);
          
          rowsHtml += `
            <div class="flex items-center px-1 py-1.5 row-border-style transition hover:bg-slate-50/50 cursor-pointer" onclick="speakWord('${wordItem.eng.replace(/'/g, "\\'")}')">
              <!-- 中文向左看齊：固定寬度 105px，字太長會貼心自動折行，完全不影響右邊書寫區 -->
              <div class="text-slate-800 font-chinese font-medium tracking-wide text-[14px] shrink-0 flex items-start leading-tight pr-1" style="width: 105px;">
                <span class="font-bold text-slate-400 mr-1.5 font-english text-[13px]">${流水題號計數器}.</span>
                <span class="break-all">${wordItem.ch}</span>
              </div>
              
              <!-- 右側英文空間：完全釋放寬度，採用固定 h-5 水平置中，徹底防止超格 -->
              <div class="flex-grow relative font-english pl-2 h-5 flex items-center">
                <input type="text" data-ans="${cleanedEnglish}" class="spelling-input no-print w-full bg-transparent focus:outline-none text-[15px] font-bold text-slate-800 tracking-wide">
                <span class="ans-text-span hidden text-red-600 font-extrabold text-[15px] tracking-wide absolute left-2 leading-none">${cleanedEnglish}</span>
              </div>
            </div>
          `;
          流水題號計數器++;
        } else {
          // 均分留白預留格：維持高度物理結構，固定版面
          rowsHtml += `
            <div class="flex items-center px-1 py-1.5 row-border-style opacity-0 pointer-events-none select-none">
              <div style="width: 105px;"><span class="text-[14px]">Empty</span></div>
              <div class="flex-grow h-5"></div>
            </div>
          `;
        }
      }

      const actionButtons = isPrintMode ? '' : `
        <div class="flex gap-1.5">
          <button onclick="speakGroupPreview(${groupIndex})" class="no-print bg-sky-500/90 hover:bg-sky-600 text-white text-[11px] font-bold py-0.5 px-2 rounded shadow">預習導讀</button>
        </div>
      `;

      // 複製聽力測驗的無大框排版：利用灰色控制橫列（bg-slate-100）進行小組微分類
      return `
        <div class="bg-white flex flex-col justify-start flex-grow">
          <div class="flex justify-between items-center bg-slate-100 border border-slate-300 rounded-lg px-3 py-1.5 mb-2 shrink-0">
            <h3 class="text-[16px] font-bold text-slate-800 font-chinese tracking-wide">${groupData.gTitle}</h3>
            ${actionButtons}
          </div>
          <div class="flex flex-col flex-grow justify-start pl-1">
            ${rowsHtml}
          </div>
        </div>
      `;
    }

    function speakGroupPreview(groupIndex) {
      const gData = database[currentLesson][groupIndex];
      const wordsArray = gData.words.map(w => w.eng);
      executePreviewLoop(wordsArray, 0);
    }

    function executePreviewLoop(wordsArray, index) {
      if (index < wordsArray.length) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(wordsArray[index]);
        utterance.lang = 'en-US';
        utterance.rate = 0.85;
        utterance.onend = function() {
          setTimeout(() => { executePreviewLoop(wordsArray, index + 1); }, 1400);
        };
        window.speechSynthesis.speak(utterance);
      }
    }

    function loadLesson(lessonKey) {
      currentLesson = lessonKey;
      showAnswersState = false;

      document.querySelectorAll('.lesson-btn').forEach(btn => {
        const k = btn.getAttribute('data-lesson');
        btn.className = (k === lessonKey) ? 
          "py-1.5 rounded-md text-xs font-semibold border transition font-chinese bg-red-600 text-white border-red-600 shadow-sm" :
          "py-1.5 rounded-md text-xs font-semibold border transition font-chinese bg-slate-50 text-slate-700 hover:bg-slate-200 border-slate-200";
      });

      document.getElementById('main-title').innerText = `七下 ${lessonKey} 英文科講義 單字拼寫卷`;
      
      const container = document.getElementById('groups-container');
      container.innerHTML = '';

      流水題號計數器 = 1; 
      const groups = database[lessonKey];
      groups.forEach((groupData, idx) => {
        container.innerHTML += buildGroupHtml(groupData, idx, false);
      });

      bindInputLogic();
    }

    function initApp() {
      const selectorContainer = document.getElementById('lesson-selectors');
      selectorContainer.innerHTML = '';
      Object.keys(database).forEach(key => {
        const btn = document.createElement('button');
        btn.innerText = `七下 ${key}`;
        btn.setAttribute('data-lesson', key);
        btn.className = "lesson-btn py-1.5 rounded-md text-xs font-semibold border transition font-chinese";
        btn.onclick = () => loadLesson(key);
        selectorContainer.appendChild(btn);
      });
      loadLesson("L1");
    }

    function bindInputLogic() {
      const inputs = Array.from(document.querySelectorAll('.spelling-input'));
      inputs.forEach((input, index) => {
        input.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' && index < inputs.length - 1) {
            inputs[index + 1].focus();
          }
        });
      });
    }

    function toggleAnswers() {
      showAnswersState = !showAnswersState;
      document.querySelectorAll('.spelling-input').forEach(input => {
        const parent = input.parentElement;
        const ansSpan = parent.querySelector('.ans-text-span');
        const correctAnswer = input.getAttribute('data-ans');

        if (showAnswersState) {
          input.value = correctAnswer;
          input.classList.add('opacity-0'); 
          ansSpan.classList.remove('hidden'); 
        } else {
          input.value = '';
          input.classList.remove('opacity-0');
          ansSpan.classList.add('hidden');
        }
      });
    }

    function clearAnswers() {
      document.querySelectorAll('.spelling-input').forEach(input => {
        input.value = '';
        input.classList.remove('opacity-0');
        input.parentElement.querySelector('.ans-text-span').classList.add('hidden');
      });
      showAnswersState = false;
      if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    }

    function printAllLessons() {
      const printContainer = document.getElementById('print-all-container');
      printContainer.innerHTML = '';

      Object.keys(database).forEach(lessonKey => {
        const page = document.createElement('div');
        page.className = "print-page";

        const savedLesson = currentLesson;
        currentLesson = lessonKey;
        
        let leftColumnHtml = '';
        let rightColumnHtml = '';
        const groups = database[lessonKey];
        
        流水題號計數器 = 1;
        leftColumnHtml += buildGroupHtml(groups[0], 0, true);
        leftColumnHtml += buildGroupHtml(groups[1], 1, true);

        rightColumnHtml += buildGroupHtml(groups[2], 2, true);
        rightColumnHtml += buildGroupHtml(groups[3], 3, true);

        currentLesson = savedLesson; 

        page.innerHTML = `
          <div class="border-b-4 border-double border-slate-400 pb-2 mb-4 shrink-0">
            <div class="flex justify-between items-end">
              <h1 class="title-large text-slate-800 tracking-wider font-chinese">七下 ${lessonKey} 英文科講義 單字拼寫卷</h1>
              <div class="flex gap-4 info-text text-slate-700 font-chinese mb-1">
                <div class="flex items-end">
                  <span class="border-b-2 border-slate-400 w-20 text-center h-7 inline-block"></span>
                  <span class="ml-1 shrink-0">班</span>
                </div>
                <div class="flex items-end">
                  <span class="shrink-0">姓名：</span>
                  <span class="border-b-2 border-slate-400 w-28 text-center h-7 inline-block"></span>
                </div>
              </div>
            </div>
            <div class="mt-2 flex flex-col gap-1 bg-slate-100 px-3 py-1 rounded border-l-4 border-slate-500 shrink-0 text-[14px] font-bold text-slate-700 font-chinese">
              <div class="flex items-center flex-wrap gap-x-6">
                <span>◎ 生字 (每個字 2 分，每次考 <span class="border-b-2 border-slate-700 w-16 inline-block text-center h-5"></span> 個單字)</span>
                <span>◎ 錯字請用紅筆訂正：中文 1 次、英文 1 次。</span>
              </div>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-x-6 gap-y-4 flex-grow mb-1 overflow-hidden">
            <div class="flex flex-col flex-grow justify-start">${leftColumnHtml}</div>
            <div class="flex flex-col flex-grow justify-start">${rightColumnHtml}</div>
          </div>
          <div class="h-1 shrink-0"></div>
        `;
        printContainer.appendChild(page);
      });

      setTimeout(() => {
        document.body.classList.add('printing-all');
        window.print();
        setTimeout(() => { document.body.classList.remove('printing-all'); }, 600);
      }, 50);
    }

    window.onload = initApp;
  </script>
</body>
</html>
