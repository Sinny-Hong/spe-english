<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>八下 L6 英文科講義 聽力選擇卷</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background-color: #f1f5f9;
    }
    
    .font-chinese {
      font-family: 'Noto Sans TC', sans-serif;
    }
    
    .font-english {
      font-family: 'Lexend', sans-serif;
    }
    
    /* 嚴格 A4 尺寸限制 */
    .page-a4 {
      width: 210mm;
      height: 297mm;
      background-color: #ffffff;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
      margin: 15px auto;
      padding: 6mm 8mm; /* 壓低內距 */
      box-sizing: border-box;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    /* 標題與資訊列 */
    .title-large {
      font-size: 24px;
      font-weight: 700;
    }
    
    .info-text {
      font-size: 16px;
      font-weight: 500;
    }
    
    /* 輸入框聚焦效果 */
    .answer-input:focus {
      border-color: #ef4444;
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.3);
      background-color: #fef2f2;
    }
    
    /* 調整行距與間隔 */
    .single-row-item {
      padding-top: 0.375rem;    /* py-1.5 */
      padding-bottom: 0.375rem; /* py-1.5 */
    }

    /* 印全份講義時隱藏主頁 */
    #print-all-container {
      display: none;
    }
    
    /* 列印專用 CSS 調整 */
    @media print {
      @page {
        size: A4;
        margin: 0;
      }
      body {
        background-color: #ffffff;
        margin: 0;
        padding: 0;
      }
      .no-print {
        display: none !important;
      }
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      /* 列印全部時，隱藏主網頁，只印容器內容 */
      body.printing-all .page-a4 {
        display: none !important;
      }
      body.printing-all #print-all-container {
        display: block !important;
        width: 210mm;
      }
      .page-a4 {
        box-shadow: none;
        border: none;
        margin: 0;
        padding: 6mm 8mm;
      }
      .print-page {
        width: 210mm;
        height: 297mm;
        padding: 6mm 8mm;
        box-sizing: border-box;
        background-color: #ffffff;
        page-break-after: always;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        overflow: hidden;
      }
      .print-page:last-child {
        page-break-after: avoid;
      }
    }
  </style>
</head>
<body class="p-0 m-0 min-h-screen flex flex-col items-center justify-start">

  <div class="no-print w-full max-w-[210mm] bg-white mt-4 p-4 rounded-xl shadow-md flex flex-col gap-3 border border-slate-200">
    <div class="flex flex-wrap gap-2 items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="inline-block w-3 h-3 bg-red-500 rounded-full animate-pulse"></span>
        <span class="text-slate-700 font-medium text-sm font-chinese">🎧 提示：點擊英文單字可聽慢速發音。考前點選「預習」；小考點選「📢 小考」。</span>
      </div>
      <div class="flex gap-2">
        <button onclick="toggleAllAnswers()" class="px-3 py-1.5 bg-red-600 hover:bg-red-700 text-white font-medium rounded-lg text-xs transition shadow-sm font-chinese">顯示 / 隱藏答案</button>
        <button onclick="clearAnswers()" class="px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium rounded-lg text-xs transition border border-slate-300 font-chinese">重設清除</button>
        <button onclick="window.print()" class="px-3 py-1.5 bg-sky-600 hover:bg-sky-700 text-white font-medium rounded-lg text-xs transition shadow-sm font-chinese">🖨️ 列印本頁</button>
      </div>
    </div>
  </div>

  <div class="page-a4">
    <div class="border-b-4 border-double border-slate-400 pb-2 mb-4 shrink-0">
      <div class="flex justify-between items-end">
        <h1 class="title-large text-slate-800 tracking-wider font-chinese">八下 L6 英文科講義 聽力選擇卷</h1>
        
        <div class="flex gap-4 info-text text-slate-700 font-chinese mb-1">
          <div class="flex items-end">
            <span class="border-b-2 border-slate-400 w-20 text-center h-7 inline-block"></span>
            <span class="ml-1 shrink-0">班</span>
          </div>
          <div class="flex items-end">
            <span class="shrink-0">姓名：</span>
            <span class="border-b-2 border-slate-400 w-28 text-center h-7 inline-block"></span>
          </div>
        </div>
      </div>
      <div class="mt-2 flex justify-between items-center bg-slate-100 px-3 py-1 rounded border-l-4 border-slate-500 shrink-0">
        <span class="text-[14px] font-bold text-slate-700 font-chinese">◎ 錯字用紅筆訂正，中文、英文各1次。</span>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-x-6 gap-y-4 flex-grow mb-1 overflow-hidden" id="groups-container">
      
      <div class="bg-white flex flex-col justify-start flex-grow">
        <div class="flex justify-between items-center bg-slate-100/90 border border-slate-300 rounded-lg px-3 py-1.5 mb-2 shrink-0">
          <h3 class="text-[16px] font-bold text-slate-800 font-chinese tracking-wide">◎ 第一組</h3>
          <div class="flex gap-1.5">
            <button onclick="startGroupPreview('group1')" class="no-print bg-sky-500/90 hover:bg-sky-600 text-white text-[11px] font-bold py-0.5 px-2 rounded shadow">預習</button>
            <button onclick="startGroupQuiz('group1')" class="no-print bg-orange-400/90 hover:bg-orange-500 text-white text-[11px] font-bold py-0.5 px-2 rounded shadow">📢 小考</button>
            <button onclick="toggleSingleGroupAnswer('group1')" class="no-print bg-emerald-500/90 hover:bg-emerald-600 text-white text-[11px] font-bold py-0.5 px-2 rounded shadow font-english">√Ans</button>
          </div>
        </div>
        <div class="flex flex-col flex-grow justify-start pl-1" id="group1-rows"></div>
      </div>

      <div class="bg-white flex flex-col justify-start flex-grow">
        <div class="flex justify-between items-center bg-slate-100/90 border border-slate-300 rounded-lg px-3 py-1.5 mb-2 shrink-0">
          <h3 class="text-[16px] font-bold text-slate-800 font-chinese tracking-wide">◎ 第二組</h3>
          <div class="flex gap-1.5">
            <button onclick="startGroupPreview('group2')" class="no-print bg-sky-500/90 hover:bg-sky-600 text-white text-[11px] font-bold py-0.5 px-2 rounded shadow">預習</button>
            <button onclick="startGroupQuiz('group2')" class="no-print bg-orange-400/90 hover:bg-orange-500 text-white text-[11px] font-bold py-0.5 px-2 rounded shadow">📢 小考</button>
            <button onclick="toggleSingleGroupAnswer('group2')" class="no-print bg-emerald-500/90 hover:bg-emerald-600 text-white text-[11px] font-bold py-0.5 px-2 rounded shadow font-english">√Ans</button>
          </div>
        </div>
        <div class="flex flex-col flex-grow justify-start pl-1" id="group2-rows"></div>
      </div>

      <div class="bg-white flex flex-col justify-start flex-grow">
        <div class="flex justify-between items-center bg-slate-100/90 border border-slate-300 rounded-lg px-3 py-1.5 mb-2 shrink-0">
          <h3 class="text-[16px] font-bold text-slate-800 font-chinese tracking-wide">◎ 第三組</h3>
          <div class="flex gap-1.5">
            <button onclick="startGroupPreview('group3')" class="no-print bg-sky-500/90 hover:bg-sky-600 text-white text-[11px] font-bold py-0.5 px-2 rounded shadow">預習</button>
            <button onclick="startGroupQuiz('group3')" class="no-print bg-orange-400/90 hover:bg-orange-500 text-white text-[11px] font-bold py-0.5 px-2 rounded shadow">📢 小考</button>
            <button onclick="toggleSingleGroupAnswer('group3')" class="no-print bg-emerald-500/90 hover:bg-emerald-600 text-white text-[11px] font-bold py-0.5 px-2 rounded shadow font-english">√Ans</button>
          </div>
        </div>
        <div class="flex flex-col flex-grow justify-start pl-1" id="group3-rows"></div>
      </div>

      <div class="bg-white flex flex-col justify-start flex-grow">
        <div class="flex justify-between items-center bg-slate-100/90 border border-slate-300 rounded-lg px-3 py-1.5 mb-2 shrink-0">
          <h3 class="text-[16px] font-bold text-slate-800 font-chinese tracking-wide">◎ 第四組</h3>
          <div class="flex gap-1.5">
            <button onclick="startGroupPreview('group4')" class="no-print bg-sky-500/90 hover:bg-sky-600 text-white text-[11px] font-bold py-0.5 px-2 rounded shadow">預習</button>
            <button onclick="startGroupQuiz('group4')" class="no-print bg-orange-400/90 hover:bg-orange-500 text-white text-[11px] font-bold py-0.5 px-2 rounded shadow">📢 小考</button>
            <button onclick="toggleSingleGroupAnswer('group4')" class="no-print bg-emerald-500/90 hover:bg-emerald-600 text-white text-[11px] font-bold py-0.5 px-2 rounded shadow font-english">√Ans</button>
          </div>
        </div>
        <div class="flex flex-col flex-grow justify-start pl-1" id="group4-rows"></div>
      </div>

    </div>
    <div class="h-1 shrink-0"></div>
  </div>

  <script>
    // 資料庫模型數據
    const wordsData = {
      group1: [
        { eng: "temple", ch: "寺廟" }, { eng: "earthquake", ch: "地震" }, { eng: "history", ch: "歷史" },
        { eng: "god", ch: "神" }, { eng: "culture", ch: "文化" }, { eng: "wood", ch: "木頭" },
        { eng: "detail", ch: "細節" }, { eng: "nail", ch: "釘子" }, { eng: "pillar", ch: "柱子" }
      ],
      group2: [
        { eng: "destroy", ch: "破壞" }, { eng: "rebuild", ch: "重建" }, { eng: "shake", ch: "搖晃" },
        { eng: "pray", ch: "祈禱" }, { eng: "carve", ch: "雕刻" }, { eng: "marry", ch: "結婚" },
        { eng: "burn down", ch: "燒毀" }, { eng: "rock", ch: "岩石；搖晃" }
      ],
      group3: [
        { eng: "safe", ch: "安全的" }, { eng: "amazing", ch: "神奇的" }, { eng: "beautiful", ch: "美麗的" },
        { eng: "stone", ch: "石頭" }, { eng: "roof", ch: "屋頂" }, { eng: "dragon", ch: "龍" },
        { eng: "story", ch: "故事" }, { eng: "century", ch: "世紀" }
      ],
      group4: [
        { eng: "go through", ch: "經歷" }, { eng: "turn ... into ...", ch: "把…變成…" }, { eng: "come to mind", ch: "浮現心頭" },
        { eng: "more than", ch: "超過" }, { eng: "with one's own eyes", ch: "親眼所見" }, { eng: "believe in", ch: "信任" },
        { eng: "in the corner", ch: "在角落" }, { eng: "stay away from", ch: "遠離" }
      ]
    };

    let showAnswersState = false;
    let groupAnswerStates = {}; // 紀錄單組答案狀態 (true代表顯示)
    let groupOrders = {}; // 存放各組完全固定的亂序名單
    const chineseTitles = ["第一題", "第二題", "第三題", "第四題", "第五題", "第六題", "第七題", "第八題", "第九題", "第十題", "第十一題", "第十二題"];

    // 種子偽隨機洗牌演算法：確保不同組別算出截然不同的打亂順序，但每次計算結果百分之百固定不變
    function seedShuffle(array, seedString) {
      let h = 0;
      for (let i = 0; i < seedString.length; i++) {
        h = Math.imul(31, h) + seedString.charCodeAt(i) | 0;
      }
      function seededRandom() {
        let x = Math.sin(h++) * 10000;
        return x - Math.floor(x);
      }
      let shuffled = [...array];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(seededRandom() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

    // 初始化所有組別的固定打亂順序
    function initAllGroupOrders() {
      Object.keys(wordsData).forEach(groupId => {
        let wordsArray = wordsData[groupId].map(w => w.eng);
        // 使用組別代號（如 group1, group2）做為獨一無二的種子字串，確保四組序列互不相同
        groupOrders[groupId] = seedShuffle(wordsArray, groupId);
      });
    }

    // 單字慢速 TTS 發音功能 (rate=0.85)
    function speakWord(word) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(word);
        utterance.lang = 'en-US';
        utterance.rate = 0.85; 
        window.speechSynthesis.speak(utterance);
      }
    }

    // 聽力小考鏈式語音廣播
    function speakQuizChain(chineseNum, englishText, onDone) {
      window.speechSynthesis.cancel();
      const uChinese = new SpeechSynthesisUtterance(chineseNum);
      uChinese.lang = 'zh-TW';
      
      uChinese.onend = function() {
        setTimeout(() => {
          const uEng1 = new SpeechSynthesisUtterance(englishText);
          uEng1.lang = 'en-US';
          uEng1.rate = 0.85;
          
          uEng1.onend = function() {
            setTimeout(() => {
              const uEng2 = new SpeechSynthesisUtterance(englishText);
              uEng2.lang = 'en-US';
              uEng2.rate = 0.85;
              if (onDone) uEng2.onend = onDone;
              window.speechSynthesis.speak(uEng2);
            }, 1200); // 題內單字重複間隔維持 1.2 秒
          };
          window.speechSynthesis.speak(uEng1);
        }, 400);
      };
      window.speechSynthesis.speak(uChinese);
    }

    // 預習按鈕循環播放邏輯
    function startGroupPreview(groupId) {
      const list = wordsData[groupId].map(w => w.eng);
      executePreviewLoop(list, 0);
    }

    function executePreviewLoop(list, index) {
      if (index < list.length) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(list[index]);
        utterance.lang = 'en-US';
        utterance.rate = 0.85;
        utterance.onend = function() {
          setTimeout(() => {
            executePreviewLoop(list, index + 1);
          }, 1500);
        };
        window.speechSynthesis.speak(utterance);
      }
    }

    // 📢 小考按鈕播放控制：清空舊作答，並開始播放已產生的固定打亂序列
    function startGroupQuiz(groupId) {
      const inputs = document.querySelectorAll(`input[data-group="${groupId}"]`);
      inputs.forEach(input => input.value = '');
      
      executeAudioLoop(groupId, 0);
    }

    function executeAudioLoop(groupId, index) {
      const currentList = groupOrders[groupId];
      if (index < currentList.length) {
        speakQuizChain(chineseTitles[index], currentList[index], () => {
          setTimeout(() => {
            executeAudioLoop(groupId, index + 1);
          }, 1800); // 跨題間隔縮短至 1.8 秒，發音維持慢速
        });
      }
    }

    // 單組顯示/隱藏答案控制 (√Ans 按鈕)
    function toggleSingleGroupAnswer(groupId) {
      groupAnswerStates[groupId] = !groupAnswerStates[groupId];
      
      const inputs = document.querySelectorAll(`input[data-group="${groupId}"]`);
      inputs.forEach(input => {
        const word = input.getAttribute('data-word');
        
        if (groupAnswerStates[groupId] || showAnswersState) {
          if (groupOrders[groupId]) {
            input.value = groupOrders[groupId].indexOf(word) + 1;
          } else {
            input.value = "-";
          }
          input.classList.add('bg-red-50', 'text-red-600', 'border-red-500', 'font-extrabold');
        } else {
          input.value = '';
          input.classList.remove('bg-red-50', 'text-red-600', 'border-red-500', 'font-extrabold');
        }
      });
    }

    // 渲染生成 12 行嚴格滿表格 HTML 的核心引擎
    function renderGroupRows(groupId, elementId) {
      const container = document.getElementById(elementId);
      container.innerHTML = '';
      let listHtml = '';
      
      for (let i = 0; i < 12; i++) {
        const wordItem = wordsData[groupId][i];
        if (wordItem) {
          listHtml += `
            <div class="flex items-center px-1 py-1.5 hover:bg-slate-50/80 rounded transition cursor-pointer single-row-item" onclick="speakWord('${wordItem.eng.replace(/'/g, "\\'")}')">
              <span class="text-slate-800 font-bold mr-1 shrink-0 text-[15px]">(</span>
              <input type="text" maxlength="2" data-group="${groupId}" data-word="${wordItem.eng}" onclick="event.stopPropagation();" class="answer-input w-7 h-5 text-center font-bold text-slate-800 border-b-2 border-slate-400 focus:outline-none bg-transparent shrink-0 text-[15px]">
              <span class="text-slate-800 font-bold ml-1 shrink-0 text-[15px]">)</span>
              <span class="ml-2 font-medium font-english truncate flex-grow tracking-tight text-slate-800 word-eng-span" style="max-width: 155px; font-size:16px;">${wordItem.eng}</span>
              <span class="font-chinese text-slate-500 text-[14px] pl-2 truncate text-right shrink-0 font-medium" style="max-width: 125px;">${wordItem.ch}</span>
            </div>
          `;
        } else {
          listHtml += `
            <div class="flex items-center px-1 py-1.5 opacity-0 pointer-events-none select-none">
              <span class="text-[15px]">(</span>
              <input type="text" class="w-7 h-5 border-b-2 text-[15px]">
              <span class="text-[15px]">)</span>
              <span class="ml-2 text-[15px]">Empty</span>
            </div>
          `;
        }
      }
      container.innerHTML = listHtml;
    }

    // 微型字體自適應縮放，防止特教長字群爆版
    function applyMicroScaling() {
      document.querySelectorAll('.word-eng-span').forEach(span => {
        const textLength = span.innerText.length;
        if (textLength > 18) {
          span.style.fontSize = "12.5px";
          span.style.letterSpacing = "-0.5px";
        } else if (textLength > 12) {
          span.style.fontSize = "14px";
        } else {
          span.style.fontSize = "16px";
        }
      });
    }

    // 頂部大按鈕：全域答案核對 (改為 text-red-600)
    function toggleAllAnswers() {
      showAnswersState = !showAnswersState;
      const inputs = document.querySelectorAll('.answer-input');
      
      inputs.forEach(input => {
        const groupId = input.getAttribute('data-group');
        const word = input.getAttribute('data-word');
        
        if (showAnswersState) {
          if (groupOrders[groupId]) {
            input.value = groupOrders[groupId].indexOf(word) + 1;
          } else {
            input.value = "-";
          }
          input.classList.add('bg-red-50', 'text-red-600', 'border-red-500', 'font-extrabold');
        } else {
          input.value = '';
          input.classList.remove('bg-red-50', 'text-red-600', 'border-red-500', 'font-extrabold');
        }
      });
    }

    // 清除重設所有狀態
    function clearAnswers() {
      groupAnswerStates = {};
      const inputs = document.querySelectorAll('.answer-input');
      inputs.forEach(input => {
        input.value = '';
        input.classList.remove('bg-red-50', 'text-red-600', 'border-red-500', 'font-extrabold');
      });
      showAnswersState = false;
      if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    }

    // 輸入框防呆控制：僅允許輸入實體數字 1 到 12，且自動向後跳格
    function bindInputLogic() {
      const inputsArray = Array.from(document.querySelectorAll('.answer-input'));
      inputsArray.forEach((input, index) => {
        input.addEventListener('input', function() {
          this.value = this.value.replace(/[^0-9]/g, '');
          const val = parseInt(this.value);
          if (val < 1 || val > 12) this.value = '';
          
          if (this.value !== '' && index < inputsArray.length - 1) {
            inputsArray[index + 1].focus();
          }
        });

        input.addEventListener('keydown', function(e) {
          if (e.key === 'Backspace' && this.value === '' && index > 0) {
            inputsArray[index - 1].focus();
          }
        });
      });
    }

    // 網頁初始化載入
    window.onload = function() {
      // 1. 初始化全課固定亂序序列
      initAllGroupOrders();
      
      // 2. 渲染各組
      renderGroupRows('group1', 'group1-rows');
      renderGroupRows('group2', 'group2-rows');
      renderGroupRows('group3', 'group3-rows');
      renderGroupRows('group4', 'group4-rows');
      
      // 3. 綁定輸入控制與縮放
      bindInputLogic();
      applyMicroScaling();
    };
  </script>
</body>
</html>
