<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新市國中特教教室日誌系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&display=swap');
        
        body {
            font-family: "標楷體", "KAIU", "DFKai-SB", serif;
            background-color: #f3f4f6;
        }
        
        /* A4 直式列印規範 */
        .page-a4 {
            width: 210mm;
            min-height: 297mm;
            padding: 15mm 15mm;
            margin: 10px auto;
            background: #ffffff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            box-sizing: border-box;
            position: relative;
        }

        /* 產生手寫空間的公文線條 */
        .diary-table th, .diary-table td {
            border: 1.5px solid #000000 !important;
            height: 88px;
            vertical-align: top;
            padding: 4px;
            background-color: #ffffff !important; /* 強制移除底色 */
        }
        
        .diary-table th {
            height: 35px !important;
            vertical-align: middle;
            font-weight: bold;
        }

        /* 控制台樣式 */
        #control-panel {
            background: #1f2937;
            color: white;
            padding: 15px;
            max-width: 210mm;
            margin: 0 auto;
            border-radius: 8px 8px 0 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* 列印防護 */
        @media print {
            body {
                background: none;
            }
            #control-panel {
                display: none !important;
            }
            .page-a4 {
                margin: 0;
                box-shadow: none;
                width: 210mm;
                height: 297mm;
                page-break-after: always;
            }
        }
    </style>
</head>
<body>

    <div id="control-panel" class="shadow-md">
        <div class="flex flex-wrap items-center justify-between gap-4">
            <div class="flex items-center gap-2">
                <span class="font-bold text-yellow-400">選擇填寫教師：</span>
                <select id="teacher-select" class="bg-gray-700 text-white px-3 py-1.5 rounded border border-gray-600 focus:outline-none focus:border-yellow-400">
                    <option value="洪欣怡">洪欣怡 老師</option>
                    <option value="許杏凰">許杏凰 老師</option>
                    <option value="陳秋錡">陳秋錡 老師</option>
                    <option value="孫瑞彤">孫瑞彤 老師</option>
                    <option value="曾筱雯">曾筱雯 老師</option>
                </select>
                <span id="sync-status" class="text-xs text-gray-400 ml-2">正在與雲端連線...</span>
            </div>
            <div class="flex gap-2">
                <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded text-sm font-semibold transition-colors">
                    🖨️ 列印本頁日誌
                </button>
            </div>
        </div>
    </div>

    <div class="page-a4">
        <div class="text-center mb-4">
            <h1 class="text-2xl font-bold tracking-wider" style="font-family: 'Noto Serif TC', serif;">
                114學年度第二學期 <span id="title-classroom">異想教室</span>日誌
            </h1>
            <div class="flex justify-between mt-2 text-base px-2">
                <div>教師：<span id="info-teacher" class="font-bold text-lg">洪欣怡</span></div>
                <div>第_______週</div>
            </div>
        </div>

        <table class="w-full diary-table text-sm">
            <thead>
                <tr class="text-center">
                    <th style="width: 10%;">節次</th>
                    <th style="width: 18%;">星期一</th>
                    <th style="width: 18%;">星期二</th>
                    <th style="width: 18%;">星期三</th>
                    <th style="width: 18%;">星期四</th>
                    <th style="width: 18%;">星期五</th>
                </tr>
            </thead>
            <tbody id="diary-tbody">
                </tbody>
        </table>

        <div class="mt-8 flex justify-between text-base px-4">
            <div>任課教師：</div>
            <div>輔導主任：</div>
            <div>教務主任：</div>
        </div>
    </div>

    <script>
        // A3授課的 Google CSV 發布網址
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSNEots8pxAuco9lAY1ZNv1nVH-GgKODMA_DN-diDP40jsoR-ZXEN7fAdmBmdEKm0NMkPYDvGY7KfCk/pub?gid=1823409322&single=true&output=csv";
        
        // 防呆備用本地資料庫（若連線失敗或無對應資料時，直接查表顯示該老師的地點簡稱）
        const fallbackRooms = {
            "洪欣怡": "異想C",
            "許杏凰": "異想E",
            "陳秋錡": "異想M",
            "孫瑞彤": "團諮室",
            "曾筱雯": "直播室"
        };

        let rawDatabase = []; // 存放從 Google 撈回來的原始陣列

        // 節次名稱與時間對照
        const periodConfig = [
            { id: 1, name: "第一節", time: "08:20-09:05" },
            { id: 2, name: "第二節", time: "09:15-10:00" },
            { id: 3, name: "第三節", time: "10:10-10:55" },
            { id: 4, name: "第四節", time: "11:05-11:50" },
            { id: 5, name: "第五節", time: "13:15-14:00" },
            { id: 6, name: "第六節", time: "14:10-14:55" },
            { id: 7, name: "第七節", time: "15:05-15:50" }
        ];

        // 初始化
        window.addEventListener("DOMContentLoaded", () => {
            initTableStructure();
            fetchCloudData();
            
            // 監聽下拉選單切換
            document.getElementById("teacher-select").addEventListener("change", (e) => {
                renderTeacherDiary(e.target.value);
            });
        });

        // 1. 建立空的 7 節表格架構
        function initTableStructure() {
            const tbody = document.getElementById("diary-tbody");
            tbody.innerHTML = "";
            
            periodConfig.forEach(p => {
                let rowHtml = `<tr data-period="${p.id}">
                    <td class="text-center font-bold flex flex-col justify-center items-center" style="height:88px; vertical-align:middle; line-height:1.2;">
                        <div>${p.name}</div>
                        <div class="text-[11px] font-normal text-gray-500 mt-1">${p.time}</div>
                    </td>`;
                for (let day = 1; day <= 5; day++) {
                    rowHtml += `<td data-day="${day}" class="relative flex flex-col justify-between">
                        <div class="course-title font-bold text-left leading-tight"></div>
                        <div class="flex justify-end items-center text-[11px] border-t border-gray-300 pt-1 mt-auto">
                            <span class="mr-3">缺席：</span>
                            <span class="border border-black w-3 h-3 inline-block mr-1"></span>
                            <span class="border border-black w-3 h-3 inline-block mr-1"></span>
                            <span class="border border-black w-3 h-3 inline-block"></span>
                        </div>
                    </td>`;
                }
                rowHtml += `</tr>`;
                tbody.innerHTML += rowHtml;
            });
        }

        // 2. 異步撈取 Google 試算表發布的 CSV
        function fetchCloudData() {
            const statusEl = document.getElementById("sync-status");
            // 加入時間戳記破解快取
            const finalUrl = csvUrl + "&t=" + new Date().getTime();

            fetch(finalUrl)
                .then(response => {
                    if (!response.ok) throw new Error("網路連線不穩定");
                    return response.text();
                })
                .then(text => {
                    parseCSV(text);
                    statusEl.innerText = "● 雲端資料同步成功";
                    statusEl.className = "text-xs text-green-400 ml-2";
                    
                    // 動態更新下拉選單中的老師名單（保持不重複）
                    refreshTeacherDropdown();
                    
                    // 預設渲染第一個老師
                    const currentTeacher = document.getElementById("teacher-select").value;
                    renderTeacherDiary(currentTeacher);
                })
                .catch(err => {
                    console.error(err);
                    statusEl.innerText = "⚠️ 讀取失敗，已載入本機防呆模板";
                    statusEl.className = "text-xs text-red-400 ml-2";
                    // 失敗時依然可以使用預設名單渲染防呆格線
                    renderTeacherDiary(document.getElementById("teacher-select").value);
                });
        }

        // 3. 解析 CSV 成為物件陣列
        function parseCSV(text) {
            const lines = text.split("\n").map(line => line.trim()).filter(line => line.length > 0);
            if (lines.length < 2) return;

            // 抓取表頭
            const headers = lines[0].split(",").map(h => h.trim().replace(/"/g, ""));
            
            // 尋找必要欄位索引
            const teacherIdx = headers.indexOf("特教教師");
            const groupIdx = headers.indexOf("分組名稱");
            const roomIdx = headers.indexOf("上課地點");
            const timeIdx = headers.indexOf("時間代碼");

            rawDatabase = [];

            for (let i = 1; i < lines.length; i++) {
                // 精準處理逗號（避免學生名單或多節次逗號爆開）
                const row = parseCSVLine(lines[i]);
                if (row.length < headers.length) continue;

                const teacher = row[teacherIdx]?.trim().replace(/"/g, "") || "";
                const group = row[groupIdx]?.trim().replace(/"/g, "") || "";
                const room = row[roomIdx]?.trim().replace(/"/g, "") || "";
                const timeStr = row[timeIdx]?.trim().replace(/"/g, "") || "";

                if (teacher) {
                    rawDatabase.push({ teacher, group, room, timeStr });
                }
            }
        }

        // 處理包含雙引號與逗號的特殊 CSV 行
        function parseCSVLine(line) {
            let arr = [];
            let current = "";
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                let char = line[i];
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    arr.push(current);
                    current = "";
                } else {
                    current += char;
                }
            }
            arr.push(current);
            return arr;
        }

        // 4. 動態更新教師下拉選單（連動優先）
        function refreshTeacherDropdown() {
            if (rawDatabase.length === 0) return;
            
            // 從資料中萃取出所有不重複的教師名字
            let teachers = [...new Set(rawDatabase.map(item => item.teacher))].filter(t => t);
            
            if (teachers.length > 0) {
                const select = document.getElementById("teacher-select");
                const savedValue = select.value; // 保留當前選擇
                
                select.innerHTML = "";
                teachers.forEach(t => {
                    const option = document.createElement("option");
                    option.value = t;
                    option.innerText = t + " 老師";
                    select.appendChild(option);
                });
                
                // 恢復原本選擇或預設第一個
                if (teachers.includes(savedValue)) {
                    select.value = savedValue;
                }
            }
        }

        // 5. 渲染指定老師的教室日誌課表
        function renderTeacherDiary(teacherName) {
            // 先清空課表內的所有文字欄位，保留底部缺席框
            document.querySelectorAll("#diary-tbody .course-title").forEach(div => div.innerText = "");
            
            // 更新基本個資顯示
            document.getElementById("info-teacher").innerText = teacherName;
            
            // 找出該教師對應的教室/地點（優先連動雲端，無資料則抓本機防呆）
            let matchedRoom = fallbackRooms[teacherName] || "特教教室";
            const teacherCourses = rawDatabase.filter(item => item.teacher === teacherName);
            if (teacherCourses.length > 0 && teacherCourses[0].room) {
                matchedRoom = teacherCourses[0].room;
            }
            
            // 轉換顯示名稱（例如 異想C -> 異想教室C）
            if (matchedRoom.startsWith("異想") && !matchedRoom.endsWith("教室")) {
                document.getElementById("title-classroom").innerText = `異想教室 ${matchedRoom.replace("異想", "")}`;
            } else {
                document.getElementById("title-classroom").innerText = matchedRoom;
            }

            // 開始將課程倒入表格
            teacherCourses.forEach(course => {
                // 解析時間代碼（可能單節 "11"，或多節 "22, 55, 43"）
                const tokens = course.timeStr.split(",").map(t => t.trim());
                
                tokens.forEach(token => {
                    if (token.length === 2) {
                        const day = parseInt(token[0]);     // 十位數為星期
                        const period = parseInt(token[1]);  // 個位數為節次
                        
                        // 尋找對應的格子
                        const cell = document.querySelector(`#diary-tbody tr[data-period="${period}"] td[data-day="${day}"] .course-title`);
                        if (cell) {
                            // 寫入組別名稱
                            cell.innerText = course.group;
                        }
                    }
                });
            });
        }
    </script>
</body>
</html>
