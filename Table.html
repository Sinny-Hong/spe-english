<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>臺南市立新市國民中學 - 個別學生抽離課表系統</title>
    <style>
        /* --- 1. 基礎正式公文視覺 (Word打字感) --- */
        body {
            font-family: "標楷體", "DFKai-SB", "新細明體", "PMingLiU", Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
            margin: 0;
            padding: 0;
        }

        /* 控制互動控制列 (列印時自動隱藏) */
        #control-panel {
            background-color: #f4f4f4;
            padding: 15px;
            border-bottom: 2px solid #000000;
            text-align: center;
            font-size: 16px;
        }
        #control-panel select, #control-panel button {
            font-size: 16px;
            padding: 6px 12px;
            margin: 0 10px;
            font-family: Arial, sans-serif;
        }

        /* --- 2. 嚴格 A4 尺寸排版控制 --- */
        .a4-page {
            width: 210mm;
            min-height: 295mm;
            box-sizing: border-box;
            padding: 15mm 15mm;
            margin: 10mm auto;
            background: #ffffff;
            position: relative;
            page-break-after: always;
        }

        /* 網頁瀏覽時的陰影效果，列印時自動不顯示 */
        @media screen {
            .a4-page {
                box-shadow: 0 0 10px rgba(0,0,0,0.3);
            }
        }

        /* --- 3. 公文標題與基本資料 --- */
        .doc-header {
            text-align: center;
            margin-bottom: 15px;
        }
        .doc-header h1 {
            font-size: 22pt;
            margin: 0 0 5px 0;
            letter-spacing: 2px;
        }
        .doc-header h2 {
            font-size: 15pt;
            margin: 0 0 15px 0;
            font-weight: normal;
        }
        .student-info {
            width: 100%;
            margin-bottom: 12px;
            font-size: 11.5pt;
            display: flex;
            justify-content: space-between;
            border-bottom: 1.5px solid #000000;
            padding-bottom: 5px;
        }

        /* --- 4. 課表主表格設計 (純黑細實線 Word 公文風格) --- */
        .timetable-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            margin-bottom: 15px;
        }
        .timetable-table th, .timetable-table td {
            border: 1px solid #000000;
            text-align: center;
            vertical-align: middle;
            padding: 4px;
            box-sizing: border-box;
        }
        
        /* 表頭欄寬嚴格配置 */
        .col-time { width: 14%; font-size: 11pt; font-weight: bold; }
        .col-day { width: 17.2%; font-size: 11.5pt; font-weight: bold; }

        .timetable-table th {
            background-color: #ffffff;
            height: 38px;
        }

        /* 節次作息欄：作息時間完整呈現 */
        .time-cell {
            line-height: 1.3;
        }
        .time-cell .period-name {
            font-size: 11pt;
            font-weight: bold;
            display: block;
            margin-bottom: 2px;
        }
        .time-cell .period-time {
            font-family: Arial, sans-serif;
            font-size: 9pt;
            display: block;
        }

        /* --- 5. 單格空間完全對分 (上半格/下半格) --- */
        .course-cell {
            height: 75px; /* 固定格子高度防止變形 */
            padding: 3px !important;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* 上半格：原班課程（自動分行） */
        .main-class-box {
            font-size: 10.5pt;
            line-height: 1.2;
            width: 100%;
            word-break: break-all;
            min-height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 下半格：特教抽離空間 */
        .sub-extract-box {
            width: 100%;
            min-height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 印章戳記樣式：只呈現科目名稱，避免擁擠 */
        .stamp-border {
            border: 2px solid #cc0000; /* 正式用印紅色細邊框 */
            color: #cc0000;
            font-weight: bold;
            font-size: 10.5pt;
            padding: 2px 3px;
            border-radius: 2px;
            width: 92%;
            margin: 0 auto;
            word-break: break-all;
            text-align: center;
            background-color: #fffafb; /* 微淡襯底使戳記更具實體感 */
        }

        /* --- 6. 底部動態查詢附表 (Word標準公文附表風格) --- */
        .footer-query-section {
            margin-top: 15px;
        }
        .footer-query-section .section-title {
            font-size: 11.5pt;
            font-weight: bold;
            margin-bottom: 6px;
            text-align: left;
        }
        .query-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 10.5pt;
        }
        .query-table th, .query-table td {
            border: 1px solid #000000;
            padding: 5px;
            text-align: center;
        }
        .query-table th {
            background-color: #ffffff;
            font-weight: bold;
        }

        /* --- 7. 列印特定排版優化 --- */
        @media print {
            #control-panel {
                display: none;
            }
            body {
                background-color: #ffffff;
            }
            .a4-page {
                margin: 0;
                box-shadow: none;
                padding: 10mm 15mm;
            }
        }
    </style>
</head>
<body>

    <div id="control-panel">
        <label for="student-selector"><b>請選取學生課表：</b></label>
        <select id="student-selector" onchange="renderSingleStudent()"></select>
        <button onclick="window.print()">🖨️ 列印本頁課表</button>
        <button onclick="switchToAllMode()">📄 切換全檔一鍵列印模式</button>
        <button onclick="switchToSingleMode()" id="btn-single-mode" style="display:none;">🔍 返回單頁切換</button>
        <span id="loading-text" style="color: blue; margin-left: 15px; font-weight: bold;">後台資料串接中...</span>
    </div>

    <div id="timetable-container"></div>

    <script>
        // 資料庫發布網址 (串接您的 A5彙整 活頁簿資料)
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR3l9LaUkxNMk32ndPvRfTx2wYRLipbIqC8o6M18mysH2dgrT6kE1Bu5EqrKNDesnsL9uVy0wGXgro8/pub?gid=338631519&single=true&output=csv';

        let globalData = [];
        let isAllMode = false;

        // 完整八節作息與時間並列對應表
        const timeConfig = [
            { period: "第一節", start: "08:20", end: "09:05" },
            { period: "第二節", start: "09:15", end: "10:00" },
            { period: "第三節", start: "10:10", end: "10:55" },
            { period: "第四節", start: "11:05", end: "11:50" },
            { period: "第五節", start: "13:15", end: "14:00" },
            { period: "第六節", start: "14:10", end: "14:55" },
            { period: "第七節", start: "15:05", end: "15:50" },
            { period: "第八節", start: "16:00", end: "16:45" }
        ];

        window.onload = function() {
            fetchCSV();
        };

        function fetchCSV() {
            fetch(csvUrl)
                .then(response => response.text())
                .then(text => {
                    parseCSV(text);
                    if(globalData.length > 0) {
                        document.getElementById('loading-text').innerText = `✅ 資料同步成功！共讀取 ${globalData.length} 筆學生資料`;
                        populateSelector();
                        renderSingleStudent();
                    } else {
                        document.getElementById('loading-text').innerHTML = '<span style="color:red;">❌ 解析後無學生資料，請確認後台分頁名稱。</span>';
                    }
                })
                .catch(error => {
                    console.error(error);
                    document.getElementById('loading-text').innerHTML = '<span style="color:red;">❌ 無法連線試算表，請確認已點擊「發布到網路」。</span>';
                });
        }

        // 解析 CSV 核心邏輯
        function parseCSV(text) {
            let lines = [];
            let row = [""];
            let inQuotes = false;

            // 確保處理斷行與引號的完整 CSV 解析器
            for (let i = 0; i < text.length; i++) {
                let r = text[i];
                if (r === '"') {
                    inQuotes = !inQuotes;
                } else if (r === ',' && !inQuotes) {
                    row.push('');
                } else if ((r === '\r' || r === '\n') && !inQuotes) {
                    if (r === '\r' && text[i+1] === '\n') { i++; }
                    lines.push(row);
                    row = [''];
                } else {
                    row[row.length - 1] += r;
                }
            }
            if (row.length > 1 || row[0] !== '') lines.push(row);
            if (lines.length === 0) return;

            // 清理欄位頭尾空白與怪異字元
            let headers = lines[0].map(h => h.trim().replace(/^"|"$/g, ""));
            
            for (let i = 1; i < lines.length; i++) {
                let currentline = lines[i];
                if (currentline.length < headers.length) continue;

                let rowObject = {};
                for (let j = 0; j < headers.length; j++) {
                    let key = headers[j];
                    let value = currentline[j] ? currentline[j].trim().replace(/^"|"$/g, "") : "";
                    if (key) {
                        rowObject[key] = value;
                    }
                }
                // 排除空白列
                if (rowObject["姓名"] && rowObject["姓名"] !== "姓名") {
                    globalData.push(rowObject);
                }
            }
        }

        function populateSelector() {
            const selector = document.getElementById('student-selector');
            selector.innerHTML = "";
            globalData.forEach((student, index) => {
                let opt = document.createElement('option');
                opt.value = index;
                opt.innerText = `${student["班級"] || ""} ${student["姓名"]}`;
                selector.appendChild(opt);
            });
        }

        function switchToSingleMode() {
            isAllMode = false;
            document.getElementById('student-selector').style.display = 'inline-block';
            document.getElementById('btn-single-mode').style.display = 'none';
            renderSingleStudent();
        }

        function switchToAllMode() {
            isAllMode = true;
            document.getElementById('student-selector').style.display = 'none';
            document.getElementById('btn-single-mode').style.display = 'inline-block';
            renderAllStudents();
        }

        function renderSingleStudent() {
            const selectedIndex = document.getElementById('student-selector').value;
            if(!globalData[selectedIndex]) return;
            const container = document.getElementById('timetable-container');
            container.innerHTML = generatePageHtml(globalData[selectedIndex]);
        }

        function renderAllStudents() {
            const container = document.getElementById('timetable-container');
            container.innerHTML = "";
            globalData.forEach(student => {
                container.innerHTML += generatePageHtml(student);
            });
        }

        // 動態網頁畫布核心
        function generatePageHtml(student) {
            let days = ["一", "二", "三", "四", "五"];
            let tableRowsHtml = "";
            let extractSummary = {}; // 用於統計底部的附表

            // 1. 產生 8 節課的週功課表
            timeConfig.forEach((time, tIndex) => {
                let pIndex = tIndex + 1; // 節次數字 1-8
                let rowHtml = `<tr>`;
                
                // 左側節次與時間並列欄
                rowHtml += `
                    <td class="time-cell">
                        <span class="period-name">${time.period}</span>
                        <span class="period-time">${time.start}<br>|<br>${time.end}</span>
                    </td>
                `;

                // 星期一到五的循環比對
                days.forEach(day => {
                    // 修正關鍵：嚴格呼叫與試算表欄位完全相符的「原一-1」與「特一-1」格式
                    let origKey = `原${day}-${pIndex}`;
                    let specKey = `特${day}-${pIndex}`;

                    let origValue = student[origKey] || "";
                    let specValue = student[specKey] || "";

                    // 上半格原班配課格式化（支援自動分行效果）
                    let displayOrig = "";
                    if(origValue && origValue.trim() !== "") {
                        if(origValue.includes('(')) {
                            displayOrig = origValue.replace('(', '<br>(');
                        } else if(origValue.includes('（')) {
                            displayOrig = origValue.replace('（', '<br>（');
                        } else {
                            displayOrig = origValue;
                        }
                    }

                    // 下半格特教抽離判定
                    let displaySpecBox = "";
                    if(specValue && specValue.trim() !== "" && specValue !== "0") {
                        // 清理文字，抽離格內只呈現「純科目名稱」，解決擁擠
                        let pureSubject = specValue.split('(')[0].split('（')[0].trim();
                        displaySpecBox = `<div class="stamp-border">${pureSubject}</div>`;

                        // 統計到最下方的對照附表中
                        if (!extractSummary[pureSubject]) {
                            extractSummary[pureSubject] = {
                                count: 0,
                                teacher: student["特教教師"] || "特教老師",
                                room: student["上課地點"] || "異想教室",
                                phone: student["上課電話"] || "-"
                            };
                        }
                        extractSummary[pureSubject].count++;
                    }

                    // 水平組裝格子
                    rowHtml += `
                        <td class="course-cell">
                            <div class="main-class-box">${displayOrig}</div>
                            <div class="sub-extract-box">${displaySpecBox}</div>
                        </td>
                    `;
                });

                rowHtml += `</tr>`;
                tableRowsHtml += rowHtml;
            });

            // 2. 產生底部的動態抽離細節對照附表
            let summaryRowsHtml = "";
            let hasExtract = Object.keys(extractSummary).length > 0;

            if (hasExtract) {
                for (let subName in extractSummary) {
                    let info = extractSummary[subName];
                    summaryRowsHtml += `
                        <tr>
                            <td><b>${subName}</b></td>
                            <td>${info.count} 節</td>
                            <td>${info.teacher}</td>
                            <td>${info.room}</td>
                            <td>${info.phone}</td>
                        </tr>
                    `;
                }
            } else {
                summaryRowsHtml = `<tr><td colspan="5" style="color: #555; padding: 10px; font-style: italic;">本學期此時段無抽離課程（全週於原班上課）</td></tr>`;
            }

            // 返回單頁 A4 公文格式樣板
            return `
                <div class="a4-page">
                    <div class="doc-header">
                        <h1>臺南市立新市國民中學</h1>
                        <h2>一一四學年度第二學期【個別學生抽離課表】</h2>
                    </div>

                    <div class="student-info">
                        <div><b>原班班級：</b>${student["班級"] || "---"}</div>
                        <div><b>學生姓名：</b><span style="font-size:14pt; font-weight:bold;">${student["姓名"] || "---"}</span></div>
                        <div><b>班級導師：</b>${student["導師"] || "---"}</div>
                        <div><b>特教個管：</b>${student["輔導"] || "---"}</div>
                    </div>

                    <table class="timetable-table">
                        <thead>
                            <tr>
                                <th class="col-time">時間 ＼ 星期</th>
                                <th class="col-day">星期一</th>
                                <th class="col-day">星期二</th>
                                <th class="col-day">星期三</th>
                                <th class="col-day">星期四</th>
                                <th class="col-day">星期五</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${tableRowsHtml}
                        </tbody>
                    </table>

                    <div class="footer-query-section">
                        <div class="section-title">📋 附表：特教抽離課程對照表（包含地點與聯絡電話）</div>
                        <table class="query-table">
                            <thead>
                                <tr>
                                    <th style="width: 25%;">抽離參與科目</th>
                                    <th style="width: 15%;">每週節數</th>
                                    <th style="width: 20%;">任課特教教師</th>
                                    <th style="width: 25%;">上課地點</th>
                                    <th style="width: 15%;">內線電話</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${summaryRowsHtml}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
