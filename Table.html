<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>新市國中異想教室 - 個別學生抽離課表系統</title>
    <style>
        /* 嚴格 A4 列印設定 */
        @page {
            size: A4 portrait;
            margin: 15mm 15mm 15mm 15mm;
        }

        body {
            font-family: "Microsoft JhengHei", "Noto Sans TC", Arial, sans-serif;
            color: #000000;
            background-color: #ffffff;
            margin: 0;
            padding: 0;
        }

        /* 介面操作區（列印時自動隱藏） */
        #control-panel {
            background-color: #f4f6f9;
            padding: 15px;
            border-bottom: 2px solid #ccd1d9;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .btn {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: 1px solid #a0a0a0;
            background-color: #ffffff;
            border-radius: 4px;
        }
        .btn:hover { background-color: #f0f0f0; }
        select {
            padding: 8px 15px;
            font-size: 16px;
            border-radius: 4px;
            border: 1px solid #a0a0a0;
        }

        /* 課表主容器 */
        .page-container {
            width: 180mm; /* A4寬度扣除邊距 */
            margin: 0 auto;
            page-break-after: always;
            position: relative;
        }

        /* 標題與正式公文質感基本資料 */
        h1.timetable-title {
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            margin: 0 0 10px 0;
            letter-spacing: 2px;
        }

        /* 學生基本資料行：完全去框、連成一行、外觀如Word打字 */
        .student-info-line {
            width: 100%;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 12px;
            padding-bottom: 5px;
            text-align: left;
            font-weight: normal;
        }
        .info-item {
            display: inline-block;
            margin-right: 25px;
        }

        /* 課表主表格 */
        .timetable-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed; /* 固定欄寬 */
        }
        .timetable-table th, .timetable-table td {
            border: 1px solid #000000; /* 正式公文黑框線 */
            text-align: center;
            vertical-align: middle;
            padding: 4px 2px;
        }
        
        /* 標頭與節次欄 */
        .timetable-table th {
            background-color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            height: 35px;
        }
        .time-col {
            width: 15%;
            font-size: 13px;
            font-weight: bold;
            line-height: 1.3;
        }

        /* 課表格子空間與字體極大化 */
        .course-cell {
            height: 72px; /* 固定的格子高度，確保A4不跑版 */
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 原班課程字體加大 */
        .regular-course {
            font-size: 18px; /* 儘量加大字體 */
            font-weight: bold;
            line-height: 1.2;
            width: 100%;
            word-break: break-all;
        }

        /* 抽離課程：紅色細實線印章框，只留課程名稱，字體加大 */
        .extracted-course {
            border: 1.5px solid #ff0000; /* 紅色細實線印章框 */
            color: #ff0000;
            font-size: 18px; /* 儘量加大字體 */
            font-weight: bold;
            padding: 3px 6px;
            margin-top: 4px;
            border-radius: 2px;
            display: inline-block;
            max-width: 90%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: 1px;
        }

        /* 最底下對照表：完全移除框線、整體靠左集中 */
        .footer-section {
            margin-top: 20px;
            width: 100%;
            text-align: left;
        }
        .footer-title {
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 8px;
            text-decoration: underline;
        }
        .footer-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-wrap: wrap;
            gap: 20px; /* 項目之間的間距 */
        }
        .footer-list li {
            font-size: 15px;
            line-height: 1.5;
        }

        /* 列印時隱藏控制面板 */
        @media print {
            #control-panel {
                display: none !important;
            }
            body {
                background-color: #ffffff;
            }
            .page-container {
                margin: 0;
                padding: 0;
            }
        }
    </style>
</head>
<body>

    <div id="control-panel">
        <label for="student-select" style="font-weight: bold; font-size: 16px;">選擇學生：</label>
        <select id="student-select" onchange="switchStudent(this.value)">
            <option value="">載入資料中...</option>
        </select>
        <button class="btn" onclick="window.print()">🖨️ 單頁列印 / 另存PDF</button>
        <button class="btn" onclick="printAll()">📚 全檔一鍵列印 (全班)</button>
        <span id="loading-status" style="color: blue; font-weight: bold;"></span>
    </div>

    <div id="timetable-output"></div>

    <script>
        // 請在此處替換為您的 Google 試算表 A5彙整 發布的 CSV 網址
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR3l9LaUkxNMk32ndPvRfTx2wYRLipbIqC8o6M18mysH2dgrT6kE1Bu5EqrKNDesnsL9uVy0wGXgro8/pub?gid=338631519&single=true&output=csv';

        // 預設作息時間配置
        const timeSlots = [
            { name: "第一節", time: "08:20<br>|<br>09:05" },
            { name: "第二節", time: "09:15<br>|<br>10:00" },
            { name: "第三節", time: "10:10<br>|<br>10:55" },
            { name: "第四節", time: "11:05<br>|<br>11:50" },
            { name: "第五節", time: "13:15<br>|<br>14:00" },
            { name: "第六節", time: "14:10<br>|<br>14:55" },
            { name: "第七節", time: "15:05<br>|<br>15:50" },
            { name: "第八節", time: "16:00<br>|<br>16:45" }
        ];

        const days = ["一", "二", "三", "四", "五"];
        let allStudentsData = [];

        // 初始化載入資料
        async function init() {
            const statusText = document.getElementById('loading-status');
            statusText.innerText = "正在連線後台資料庫...";
            try {
                const response = await fetch(csvUrl);
                const csvText = await response.text();
                allStudentsData = parseCSV(csvText);
                
                if(allStudentsData.length === 0) throw new Error("無有效學生資料");

                statusText.innerText = "資料連線成功！";
                populateSelect();
                // 預設渲染第一位學生
                renderTimetable(allStudentsData[0].name);
            } catch (error) {
                console.error(error);
                statusText.innerText = "連線失敗，請檢查CSV發布網址或網路連線。";
            }
        }

        // 簡易 CSV 解析器
        function parseCSV(text) {
            const lines = text.split('\n').map(line => line.trim()).filter(line => line.length > 0);
            if(lines.length < 1) return [];
            
            // 讀取表頭
            const headers = lines[0].split(',').map(h => h.trim());
            const dataRows = [];

            for(let i = 1; i < lines.length; i++) {
                const currentLine = lines[i].split(',').map(v => v.trim());
                if(currentLine.length < headers.length) continue;
                
                let rowObject = {};
                headers.forEach((header, index) => {
                    rowObject[header] = currentLine[index] || "";
                });
                dataRows.push(rowObject);
            }
            return dataRows;
        }

        // 填入下拉選單
        function populateSelect() {
            const select = document.getElementById('student-select');
            select.innerHTML = "";
            allStudentsData.forEach(student => {
                const opt = document.createElement('option');
                opt.value = student["姓名"];
                // 選單顯示 班級+姓名 方便點選
                opt.innerText = `${student["班級"] || ""} ${student["姓名"]}`;
                select.appendChild(opt);
            });
        }

        // 切換學生
        function switchStudent(name) {
            if(!name) return;
            renderTimetable(name);
        }

        // 渲染單張課表
        function renderTimetable(targetName) {
            const container = document.getElementById('timetable-output');
            const student = allStudentsData.find(s => s["姓名"] === targetName);
            if(!student) return;

            // 蒐集本頁需要呈現的特教老師清單（用於最下方對照表）
            let specialTeachers = new Set();

            let html = `
                <div class="page-container">
                    <h1 class="timetable-title">臺南市立新市國民中學 個別學生課表</h1>
                    
                    <div class="student-info-line">
                        <span class="info-item"><b>學生：</b>${student["班級"] || ""}${student["姓名"] || ""}</span>
                        <span class="info-item"><b>班級導師：</b>${student["班級導師"] || "無"}</span>
                        <span class="info-item"><b>個管教師：</b>${student["輔導教師"] || "無"}</span>
                    </div>

                    <table class="timetable-table">
                        <thead>
                            <tr>
                                <th style="width: 15%;">節次 \\ 星期</th>
                                <th style="width: 17%;">星期一</th>
                                <th style="width: 17%;">星期二</th>
                                <th style="width: 17%;">星期三</th>
                                <th style="width: 17%;">星期四</th>
                                <th style="width: 17%;">星期五</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            // 建立 8 節課的列
            timeSlots.forEach((slot, slotIdx) => {
                const slotNum = slotIdx + 1;
                html += `<tr>`;
                // 最左側作息時間欄
                html += `<td class="time-col"><b>${slot.name}</b><br><span style="font-size:11px; font-weight:normal;">${slot.time}</span></td>`;
                
                // 填入週一到週五的課程
                days.forEach(day => {
                    const originalKey = `原${day}${slotNum}`;
                    const specialKey = `特${day}${slotNum}`;

                    let originalContent = student[originalKey] || "";
                    let specialRaw = student[specialKey] || ""; // 格式通常為 "科目\n老師"

                    let specialCourse = "";
                    let specialTeacher = "";

                    if(specialRaw) {
                        // 處理可能包含換行或空格的特教欄位資料
                        let parts = specialRaw.split(/[\n\s]+/).filter(p => p.trim().length > 0);
                        specialCourse = parts[0] || "";
                        specialTeacher = parts[1] || "";
                        if(specialTeacher) {
                            specialTeachers.add(specialTeacher);
                        }
                    }

                    html += `<td><div class="course-cell">`;

                    if(specialCourse) {
                        // 有抽離課程：上方顯示原班課程，下方並列紅色印章框（只留課程名稱，不寫老師名字）
                        if(originalContent) {
                            html += `<div class="regular-course">${originalContent}</div>`;
                        }
                        html += `<div class="extracted-course">${specialCourse}</div>`;
                    } else {
                        // 無抽離課程：單純呈現原班課程
                        html += `<div class="regular-course">${originalContent || ""}</div>`;
                    }

                    html += `</div></td>`;
                });
                html += `</tr>`;
            });

            html += `
                        </tbody>
                    </table>

                    <div class="footer-section">
                        <div class="footer-title">◎ 特教任課教師對照資訊：</div>
                        <ul class="footer-list">
            `;

            if(specialTeachers.size > 0) {
                // (未來若串接第二個地點分頁，此處可改為自動比對撈出地點與分機)
                specialTeachers.forEach(teacher => {
                    html += `<li><b>${teacher} 老師</b> (地點：異想教室 / 分機：#6019)</li>`;
                });
            } else {
                html += `<li style="color:#666;">本週無抽離特教課程。</li>`;
            }

            html += `
                        </ul>
                    </div>
                </div>
            `;

            container.innerHTML = html;
        }

        // 全檔一鍵列印 (全班循環渲染)
        function printAll() {
            const container = document.getElementById('timetable-output');
            container.innerHTML = ""; // 清空

            // 將所有學生的課表全部接在一起渲染
            allStudentsData.forEach(student => {
                let specialTeachers = new Set();
                let html = `
                    <div class="page-container">
                        <h1 class="timetable-title">臺南市立新市國民中學 個別學生課表</h1>
                        
                        <div class="student-info-line">
                            <span class="info-item"><b>學生：</b>${student["班級"] || ""}${student["姓名"] || ""}</span>
                            <span class="info-item"><b>班級導師：</b>${student["班級導師"] || "無"}</span>
                            <span class="info-item"><b>個管教師：</b>${student["輔導教師"] || "無"}</span>
                        </div>

                        <table class="timetable-table">
                            <thead>
                                <tr>
                                    <th style="width: 15%;">節次 \\ 星期</th>
                                    <th style="width: 17%;">星期一</th>
                                    <th style="width: 17%;">星期二</th>
                                    <th style="width: 17%;">星期三</th>
                                    <th style="width: 17%;">星期四</th>
                                    <th style="width: 17%;">星期五</th>
                                </tr>
                            </thead>
                            <tbody>
                `;

                timeSlots.forEach((slot, slotIdx) => {
                    const slotNum = slotIdx + 1;
                    html += `<tr>`;
                    html += `<td class="time-col"><b>${slot.name}</b><br><span style="font-size:11px; font-weight:normal;">${slot.time}</span></td>`;
                    
                    days.forEach(day => {
                        const originalKey = `原${day}${slotNum}`;
                        const specialKey = `特${day}${slotNum}`;

                        let originalContent = student[originalKey] || "";
                        let specialRaw = student[specialKey] || "";

                        let specialCourse = "";
                        let specialTeacher = "";

                        if(specialRaw) {
                            let parts = specialRaw.split(/[\n\s]+/).filter(p => p.trim().length > 0);
                            specialCourse = parts[0] || "";
                            specialTeacher = parts[1] || "";
                            if(specialTeacher) specialTeachers.add(specialTeacher);
                        }

                        html += `<td><div class="course-cell">`;
                        if(specialCourse) {
                            if(originalContent) html += `<div class="regular-course">${originalContent}</div>`;
                            html += `<div class="extracted-course">${specialCourse}</div>`;
                        } else {
                            html += `<div class="regular-course">${originalContent || ""}</div>`;
                        }
                        html += `</div></td>`;
                    });
                    html += `</tr>`;
                });

                html += `
                            </tbody>
                        </table>

                        <div class="footer-section">
                            <div class="footer-title">◎ 特教任課教師對照資訊：</div>
                            <ul class="footer-list">
                `;

                if(specialTeachers.size > 0) {
                    specialTeachers.forEach(teacher => {
                        html += `<li><b>${teacher} 老師</b> (地點：異想教室 / 分機：#6019)</li>`;
                    });
                } else {
                    html += `<li style="color:#666;">本週無抽離特教課程。</li>`;
                }

                html += `
                            </ul>
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });

            // 觸發系統列印
            setTimeout(() => {
                window.print();
                // 列印完後自動恢復只顯示選單上指定的那位學生
                const currentSelected = document.getElementById('student-select').value;
                renderTimetable(currentSelected);
            }, 500);
        }

        // 網頁開啟後自動執行初始化
        window.onload = init;
    </script>
</body>
</html>
