    // 種子偽隨機洗牌演算法：確保不同課、不同組別算出截然不同的打亂順序，但每次計算結果百分之百固定不變
    function seedShuffle(array, seedString) {
      let h = 0;
      for (let i = 0; i < seedString.length; i++) {
        h = Math.imul(31, h) + seedString.charCodeAt(i) | 0;
      }
      function seededRandom() {
        let x = Math.sin(h++) * 10000;
        return x - Math.floor(x);
      }
      let shuffled = [...array];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(seededRandom() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

    // 初始化特定課程所有組別的固定打亂順序
    function initLessonOrders(lessonKey) {
      const groups = database[lessonKey];
      groups.forEach((groupData, idx) => {
        const orderKey = `${lessonKey}-${idx}`;
        let wordsArray = groupData.words.map(w => w.eng);
        // 使用課號與組別編號作為獨一無二的種子字串，確保四個組別序列完全不同
        quizOrders[orderKey] = seedShuffle(wordsArray, orderKey);
      });
    }

    function speakWord(word) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(word);
        utterance.lang = 'en-US';
        utterance.rate = 0.85; 
        window.speechSynthesis.speak(utterance);
      }
    }

    function speakQuizChain(chineseNum, englishText, onDone) {
      window.speechSynthesis.cancel();
      const uChinese = new SpeechSynthesisUtterance(chineseNum);
      uChinese.lang = 'zh-TW';
      uChinese.onend = function() {
        setTimeout(() => {
          const uEng1 = new SpeechSynthesisUtterance(englishText);
          uEng1.lang = 'en-US';
          uEng1.rate = 0.85;
          uEng1.onend = function() {
            setTimeout(() => {
              const uEng2 = new SpeechSynthesisUtterance(englishText);
              uEng2.lang = 'en-US';
              uEng2.rate = 0.85;
              if (onDone) uEng2.onend = onDone;
              window.speechSynthesis.speak(uEng2);
            }, 1200);
          };
          window.speechSynthesis.speak(uEng1);
        }, 400);
      };
      window.speechSynthesis.speak(uChinese);
    }

    function startGroupPreview(groupIndex) {
      const gData = database[currentLesson][groupIndex];
      const wordsArray = gData.words.map(w => w.eng);
      executePreviewLoop(wordsArray, 0);
    }

    function executePreviewLoop(wordsArray, index) {
      if (index < wordsArray.length) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(wordsArray[index]);
        utterance.lang = 'en-US';
        utterance.rate = 0.85;
        utterance.onend = function() {
          setTimeout(() => { executePreviewLoop(wordsArray, index + 1); }, 1500);
        };
        window.speechSynthesis.speak(utterance);
      }
    }

    function startGroupQuiz(groupIndex) {
      document.querySelectorAll(`input[data-gidx="${groupIndex}"]`).forEach(input => input.value = '');
      const orderKey = `${currentLesson}-${groupIndex}`;
      // 直接讀取已產生的固定隨機順序，達成完美重播與答案對齊
      executeAudioLoop(orderKey, 0);
    }

    function executeAudioLoop(orderKey, index) {
      const currentList = quizOrders[orderKey];
      if (index < currentList.length) {
        speakQuizChain(chineseTitles[index], currentList[index], () => {
          setTimeout(() => { executeAudioLoop(orderKey, index + 1); }, 3500);
        });
      }
    }

              <span class="font-chinese text-slate-500 text-[14px] pl-2 truncate text-right shrink-0 font-medium" style="max-width: 125px;">${wordItem.ch}</span>
            </div>

        } else {
          rowsHtml += `
            <div class="flex items-center px-1 py-1.5 opacity-0 pointer-events-none select-none">
              <span class="text-[15px]">(</span>
              <input type="text" class="w-7 h-5 border-b-2 text-[15px]">
              <span class="text-[15px]">)</span>
              <span class="ml-2 text-[15px]">Empty</span>
            </div>
          `;
        }
      }

      const actionButtons = isPrintMode ? '' : `
        <div class="flex gap-1.5">
          <button onclick="startGroupPreview(${groupIndex})" class="no-print bg-sky-500/90 hover:bg-sky-600 text-white text-[11px] font-bold py-0.5 px-2 rounded shadow">預習</button>
          <button onclick="startGroupQuiz(${groupIndex})" class="no-print bg-orange-400/90 hover:bg-orange-500 text-white text-[11px] font-bold py-0.5 px-2 rounded shadow">📢 小考</button>
        </div>
      `;

      // 核心改造：移除大包覆框，將組別與按鈕用灰色框線小卡（bg-slate-100）單獨框起，版面極度穩定
      return `
        <div class="bg-white flex flex-col justify-start flex-grow">
          <div class="flex justify-between items-center bg-slate-100/90 border border-slate-300 rounded-lg px-3 py-1.5 mb-2 shrink-0">
            <h3 class="text-[16px] font-bold text-slate-800 font-chinese tracking-wide">${groupData.gTitle}</h3>
            ${actionButtons}
          </div>
          <div class="flex flex-col flex-grow justify-start pl-1">
            ${rowsHtml}
          </div>
        </div>
      `;
    }

    function loadLesson(lessonKey) {
      currentLesson = lessonKey;
      showAnswersState = false;

      // 切換單元時自動生成該單元全新的固定打亂序列
      initLessonOrders(lessonKey);

      document.querySelectorAll('.lesson-btn').forEach(btn => {
        const k = btn.getAttribute('data-lesson');
        btn.className = (k === lessonKey) ? 
          "py-1.5 rounded-md text-xs font-semibold border transition font-chinese bg-red-600 text-white border-red-600 shadow-sm" :
          "py-1.5 rounded-md text-xs font-semibold border transition font-chinese bg-slate-50 text-slate-700 hover:bg-slate-200 border-slate-200";
      });

      document.getElementById('main-title').innerText = `八下 ${lessonKey} 英文科講義 聽力選擇卷`;
      const container = document.getElementById('groups-container');
      container.innerHTML = '';

      const groups = database[lessonKey];
      groups.forEach((groupData, idx) => {
        container.innerHTML += buildGroupHtml(groupData, idx, false);
      });

      bindInputLogic();
      applyMicroScaling();
    }

    function applyMicroScaling() {
      document.querySelectorAll('.word-eng-span').forEach(span => {
        const textLength = span.innerText.length;
        if (textLength > 18) {
          span.style.fontSize = "12.5px";
          span.style.letterSpacing = "-0.5px";
        } else if (textLength > 12) {
          span.style.fontSize = "14px";
        } else {
          span.style.fontSize = "16px";
        }
      });
    }

    // 初始化功能選單 (按鈕名稱調整為八下L1格式)
    function initApp() {
      const selectorContainer = document.getElementById('lesson-selectors');
      selectorContainer.innerHTML = '';
      Object.keys(database).forEach(key => {
        const btn = document.createElement('button');
        btn.innerText = `八下 ${key}`;
        btn.setAttribute('data-lesson', key);
        btn.className = "lesson-btn py-1.5 rounded-md text-xs font-semibold border transition font-chinese";
        btn.onclick = () => loadLesson(key);
        selectorContainer.appendChild(btn);
      });
      loadLesson("L4"); // 直接預設加載 L4 方便你立刻檢查原本溢出的部分
    }

    function bindInputLogic() {
      const inputsArray = Array.from(document.querySelectorAll('.answer-input'));
      inputsArray.forEach((input, index) => {
        input.addEventListener('input', function() {
          this.value = this.value.replace(/[^0-9]/g, '');
          const val = parseInt(this.value);
          if (val < 1 || val > 12) this.value = '';
          
          if (this.value !== '' && index < inputsArray.length - 1) {
            inputsArray[index + 1].focus();
          }
        });

        input.addEventListener('keydown', function(e) {
          if (e.key === 'Backspace' && this.value === '' && index > 0) {
            inputsArray[index - 1].focus();
          }
        });
      });
    }

    // 投影核對專用：答案字型與框線一律改為刺眼的紅色 (text-red-600)
    function toggleAnswers() {
      showAnswersState = !showAnswersState;
      document.querySelectorAll('.answer-input').forEach(input => {
        const groupIndex = input.getAttribute('data-gidx');
        const eng = input.getAttribute('data-eng');
        const orderKey = `${currentLesson}-${groupIndex}`;
        
        if (showAnswersState) {
          if (quizOrders[orderKey]) {
            input.value = quizOrders[orderKey].indexOf(eng) + 1;
          } else {
            input.value = "-";
          }
          input.classList.add('bg-red-50', 'text-red-600', 'border-red-500', 'font-extrabold');
        } else {
          input.value = '';
          input.classList.remove('bg-red-50', 'text-red-600', 'border-red-500', 'font-extrabold');
        }
      });
    }

    function clearAnswers() {
      // 重設清除時僅排空輸入框與停止語音，保留該課獨特的固定隨機序列，確保依然能對齊答案
      document.querySelectorAll('.answer-input').forEach(input => {
        input.value = '';
        input.classList.remove('bg-red-50', 'text-red-600', 'border-red-500', 'font-extrabold');
      });
      showAnswersState = false;
      if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    }

    function printAllLessons() {
      const printContainer = document.getElementById('print-all-container');
      printContainer.innerHTML = '';

      Object.keys(database).forEach(lessonKey => {
        const page = document.createElement('div');
        page.className = "print-page";

        // 列印前確保各單元的獨立固定隨機代碼存在
        initLessonOrders(lessonKey);

        let allGroupsHtml = '';
        database[lessonKey].forEach((groupData, idx) => {
          allGroupsHtml += buildGroupHtml(groupData, idx, true);
        });

        page.innerHTML = `
          <div class="border-b-4 border-double border-slate-400 pb-2 mb-4 shrink-0">
            <div class="flex justify-between items-end">
              <h1 class="title-large text-slate-800 tracking-wider font-chinese">八下 ${lessonKey} 英文科講義 聽力選擇卷</h1>
              <div class="flex gap-4 info-text text-slate-700 font-chinese mb-1">
                <div class="flex items-end">
                  <span class="border-b-2 border-slate-400 w-20 text-center h-7 inline-block"></span>
                  <span class="ml-1 shrink-0">班</span>
                </div>
                <div class="flex items-end">
                  <span class="shrink-0">姓名：</span>
                  <span class="border-b-2 border-slate-400 w-28 text-center h-7 inline-block"></span>
                </div>
              </div>
            </div>
            <div class="mt-2 flex justify-between items-center bg-slate-100 px-3 py-1 rounded border-l-4 border-slate-500 shrink-0">
              <span class="text-[14px] font-bold text-slate-700 font-chinese">◎錯字用紅筆訂正，中文、英文各 1 次。</span>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-x-6 gap-y-4 flex-grow mb-1 overflow-hidden">
            ${allGroupsHtml}
          </div>
          <div class="h-1 shrink-0"></div>
        `;
        printContainer.appendChild(page);
      });

      setTimeout(() => {
        applyMicroScaling();
        document.body.classList.add('printing-all');
        window.print();
        setTimeout(() => { document.body.classList.remove('printing-all'); }, 600);
      }, 50);
    }

    window.onload = initApp;
  </script>
</body>
</html>
