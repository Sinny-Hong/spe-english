<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>七下 課文翻譯理解互動講義看板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background-color: #f1f5f9;
    }
    .font-chinese { font-family: 'Noto Sans TC', sans-serif; }
    .font-english { font-family: 'Lexend', sans-serif; }
    
    /* 嚴格 A4 紙張骨架設定（死不跑版） */
    .page-a4 {
      width: 210mm;
      height: 297mm;
      background-color: #ffffff;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
      margin: 15px auto;
      padding: 12mm 15mm;
      box-sizing: border-box;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    /* 老師指定的精準固定字級規格 */
    .title-large { font-size: 24px; font-weight: 700; }
    .info-text { font-size: 16px; font-weight: 500; }
    
    /* 基礎骨架文字與行距（停止動態膨脹） */
    .text-main { font-size: 16.5px; font-weight: 500; line-height: 1.5; }
    .text-helper { font-size: 15px; font-weight: 400; line-height: 1.4; }
    
    .answer-input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
      background-color: #eff6ff;
    }

    /* 全球列印隱架空容器 */
    #print-all-container {
      display: none;
    }

    /* 高級列印流控制 */
    @media print {
      @page {
        size: A4;
        margin: 0;
      }
      body { background-color: #ffffff; margin: 0; padding: 0; }
      .no-print { display: none !important; }
      
      /* 強制輸出全彩色與網頁背景元素 */
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        color-adjust: exact !important;
      }
      
      /* 判斷：當正在執行「全12課列印」時的特殊遮蔽 */
      body.printing-all .page-a4 { display: none !important; }
      body.printing-all #print-all-container {
        display: block !important;
        width: 210mm;
      }
      
      /* 單頁列印（Ctrl+P）時維持原本看板輸出 */
      .page-a4 {
        box-shadow: none;
        border: none;
        margin: 0;
        padding: 12mm 15mm;
      }

      .print-page {
        width: 210mm;
        height: 297mm;
        padding: 12mm 15mm;
        box-sizing: border-box;
        background-color: #ffffff;
        page-break-after: always;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        overflow: hidden;
      }
      .print-page:last-child {
        page-break-after: avoid;
      }
    }
  </style>
</head>
<body class="p-0 m-0 min-h-screen flex flex-col items-center justify-start">

  <div class="no-print w-full max-w-[210mm] bg-white mt-4 p-4 rounded-xl shadow-md flex flex-col gap-3 border border-slate-200">
    <div class="flex flex-wrap gap-2 items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="inline-block w-2.5 h-2.5 bg-blue-500 rounded-full animate-pulse"></span>
        <span class="text-slate-700 font-medium text-[13px] font-chinese">📌 排版規範：1-3題水平橫排，4-10題垂直直排。如單題字數過長，系統會「獨立縮小該題」，全局骨架絕不跑版！</span>
      </div>
      <div class="flex gap-2">
        <button onclick="toggleAnswers()" class="px-3 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-lg text-xs transition shadow-sm font-chinese">顯示 / 隱藏答案</button>
        <button onclick="clearAnswers()" class="px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium rounded-lg text-xs transition border border-slate-300 font-chinese">重設清除</button>
        <button onclick="window.print()" class="px-3 py-1.5 bg-sky-600 hover:bg-sky-700 text-white font-medium rounded-lg text-xs transition shadow-sm font-chinese">列印當前課別(1頁)</button>
        <button onclick="printAllLessons()" class="px-3 py-1.5 bg-emerald-600 hover:bg-emerald-700 text-white font-medium rounded-lg text-xs transition shadow-sm font-bold font-chinese">🖨️ 一鍵列印全12課(12頁)</button>
      </div>
    </div>
    <div class="grid grid-cols-6 gap-1.5" id="lesson-selector-container"></div>
  </div>

  <div class="page-a4">
    <div class="pb-2 border-b-2 border-slate-300 shrink-0 mb-4">
      <div class="flex justify-between items-end">
        <h1 class="title-large text-slate-900 tracking-wider font-chinese leading-none" id="main-title">七下 課文翻譯理解講義</h1>
        <div class="flex gap-6 info-text font-medium text-slate-800 leading-none pb-0.5 font-chinese">
          <div>班級/座號：______</div>
          <div>姓名：__________</div>
        </div>
      </div>
    </div>

    <div class="flex flex-col space-y-4 overflow-hidden" id="questions-container"></div>
  </div>

  <div id="print-all-container"></div>

  <script>
    // 試算表 114G7-2 前端數據庫
    const database = {
      "L1對話": [
        { no: 1, q: "Do you like sports, Zac?", a: "運動", b1: "遊戲", b2: "畫圖" },
        { no: 2, q: "I'm on the school team.", a: "隊伍", b1: "時間", b2: "課堂" },
        { no: 3, q: "I practice basketball after school every day.", a: "練習", b1: "游泳", b2: "看書" },
        { no: 4, q: "Do you also play basketball on weekends?", a: "你也在週末打籃球嗎？", b1: "你放學後每天練習籃球嗎？", b2: "下次我可以加入你們嗎？" },
        { no: 5, q: "On Saturdays, I read at home.", a: "在星期六，我在家看書。", b1: "在星期日，我和朋友游泳。", b2: "我在空閒時間打籃球。" },
        { no: 6, q: "On Sundays, I swim with my friends.", a: "在星期日，我和我的朋友們游泳。", b1: "在星期六，我在家看書。", b2: "你在空閒時間做什麼？" },
        { no: 7, q: "Can I join you guys next time?", a: "下次我可以加入你們嗎？", b1: "你也喜歡運動嗎？", b2: "你週末都做些什麼？" },
        { no: 8, q: "He has brown eyes and nice hair.", a: "他有咖啡色的眼睛和好看的頭髮。", b1: "他是學校籃球隊的隊員。", b2: "他是 Yuki 的表哥。" },
        { no: 9, q: "他很可愛。", a: "He's cute.", b1: "That's Shin.", b2: "Do you know him?" },
        { no: 10, q: "他是 Yuki 的表哥。", a: "He's Yuki's cousin.", b1: "I'm on the school team.", b2: "I also swim on weekends." }
      ],
      "L1閱讀": [
        { no: 1, q: "Lorna is from the <span style='color: red; text-decoration: underline; text-underline-offset: 3px;'>USA</span>.", a: "美國", b1: "英國", b2: "日本" },
        { no: 2, q: "She's <span style='color: red; text-decoration: underline; text-underline-offset: 3px;'>new</span> to Bird's Creek.", a: "新來的", b1: "離開的", b2: "喜歡的" },
        { no: 3, q: "He is <span style='color: red; text-decoration: underline; text-underline-offset: 3px;'>strong</span> and tall.", a: "強壯的", b1: "傷心的", b2: "遲到的" },
        { no: 4, q: "Friends are <span style='color: red; text-decoration: underline; text-underline-offset: 3px;'>important to her</span>.", a: "朋友對她來說很重要。", b1: "朋友對他來說很重要。", b2: "朋友對我們來說很重要。" },
        { no: 5, q: "She's <span style='color: red; text-decoration: underline; text-underline-offset: 3px;'>always there for them</span>.", a: "她總是在那裡支持他們。", b1: "她從不留在那裡陪他們。", b2: "她只有星期日會去那裡。" },
        { no: 6, q: "He is a player in the <span style='color: red; text-decoration: underline; text-underline-offset: 3px;'>NBA</span>.", a: "他是一位 NBA 的球員。", b1: "他是一位學校籃球隊的隊員。", b2: "他是一位吉他老師。" },
        { no: 7, q: "He's also <span style='color: red; text-decoration: underline; text-underline-offset: 3px;'>good at music</span>.", a: "他也很擅長音樂。", b1: "他也很喜歡看書。", b2: "他也經常練習游泳。" },
        { no: 8, q: "Cassandra knows <span style='color: red; text-decoration: underline; text-underline-offset: 3px;'>everyone in Bird's Creek</span>.", a: "Cassandra 認識 Bird's Creek 的每個人。", b1: "Cassandra 認識 Gavin 的同班同學。", b2: "Cassandra 認識 Yuki 的表哥。" },
        { no: 9, q: "Gavin 和 Paul 對此感到<span style='color: red; text-decoration: underline; text-underline-offset: 3px;'>非常傷心</span>。", a: "Gavin and Paul are very sad about it.", b1: "Gavin doesn't really like her.", b2: "Friends are important to her." },
        { no: 10, q: "但她<span style='color: red; text-decoration: underline; text-underline-offset: 3px;'>總是遲到</span>。", a: "But she is always late for it.", b1: "He can play the guitar and the piano.", b2: "She's new to Bird's Creek." }
      ],
      "L2對話": [
        { no: 1, q: "Good morning, Yuki. You're an early bird.", a: "早起的人", b1: "晚睡的人", b2: "忙碌的人" },
        { no: 2, q: "My parents go to work at six.", a: "工作", b1: "上學", b2: "運動" },
        { no: 3, q: "They often wake me up before six.", a: "叫醒我", b1: "陪伴我", b2: "帶領我" },
        { no: 4, q: "Are you a morning person?", a: "你是個早起的人嗎？", b1: "你通常幾點去睡覺？", b2: "你週末都在做什麼？" },
        { no: 5, q: "What time do you usually go to bed?", a: "你通常幾點去睡覺？", b1: "你每天幾點起床？", b2: "你也在週末游泳嗎？" },
        { no: 6, q: "I seldom go to sleep before eleven.", a: "我很少在十一點前入睡。", b1: "我每天五點鐘起床。", b2: "我在補習班待到九點。" },
        { no: 7, q: "Sometimes, I even go to bed after twelve.", a: "有時候，我甚至在十二點後才上床睡覺。", b1: "我在星期六都在家看書。", b2: "下次我可以加入你們嗎？" },
        { no: 8, q: "I'm at cram school from six to nine.", a: "我從六點到九點在補習班。", b1: "我放學後每天練習籃球。", b2: "我和我的朋友們去游泳。" },
        { no: 9, q: "我每天五點起床。", a: "I get up at five every day.", b1: "That's late! It's not good for you.", b2: "Then I do my homework at home." },
        { no: 10, q: "我知道，但我沒辦法。", a: "I know, but I can't help it.", b1: "That's early.", b2: "That's too bad." }
      ],
      "L2閱讀": [], "L3對話": [], "L3閱讀": [], "L4對話": [], "L4閱讀": [], "L5對話": [], "L5閱讀": [], "L6對話": [], "L6閱讀": []
    };

    const lessonKeys = ["L1對話", "L1閱讀", "L2對話", "L2閱讀", "L3對話", "L3閱讀", "L4對話", "L4閱讀", "L5對話", "L5閱讀", "L6對話", "L6閱讀"];
    let currentLesson = "L1對話";
    let showAnswersState = false;

    // 建立控制按鈕
    const selectorContainer = document.getElementById('lesson-selector-container');
    lessonKeys.forEach(key => {
      const btn = document.createElement('button');
      btn.innerText = key;
      btn.id = `btn-${key}`;
      btn.className = `py-1 rounded-md text-xs font-semibold border transition font-chinese ${key === currentLesson ? 'bg-slate-800 text-white border-slate-800' : 'bg-slate-50 text-slate-700 hover:bg-slate-100 border-slate-200'}`;
      btn.onclick = () => loadLesson(key);
      selectorContainer.appendChild(btn);
    });

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    // 單題渲染工廠：實現 1-3 題橫排、4-10 題直排，並綁定「獨立字數微縮類別」
    function buildQuestionHtml(item) {
      const optionsArray = [
        { text: item.a, isCorrect: true },
        { text: item.b1, isCorrect: false },
        { text: item.b2, isCorrect: false }
      ];
      shuffleArray(optionsArray);

      let correctLetter = "A";
      optionsArray.forEach((opt, idx) => {
        if(opt.isCorrect) correctLetter = String.fromCharCode(65 + idx);
      });

      // 語音播放判定
      const hasChinese = /[\u4e00-\u9fa5]/.test(item.q);
      const ttsAction = hasChinese ? '' : `onclick="speakWord(this.innerText)"`;
      const cursorClass = hasChinese ? '' : 'cursor-pointer hover:text-blue-600 transition';

      let optionsHtml = '';
      if (item.no <= 3) {
        // 1-3題：水平橫排（嚴格限制在同一行，若字串太長會啟動 JS 單題微縮）
        optionsHtml = `
          <div class="pl-9 grid grid-cols-3 text-helper font-chinese text-slate-700 font-medium tracking-wide whitespace-nowrap opt-container">
            <div>(A) ${optionsArray[0].text}</div>
            <div>(B) ${optionsArray[1].text}</div>
            <div>(C) ${optionsArray[2].text}</div>
          </div>
        `;
      } else {
        // 4-10題：垂直直排（行距 py-0.5 死死固定）
        optionsHtml = `
          <div class="pl-9 flex flex-col space-y-0.5 text-helper font-chinese text-slate-700 font-medium tracking-wide opt-container">
            <div>(A) ${optionsArray[0].text}</div>
            <div>(B) ${optionsArray[1].text}</div>
            <div>(C) ${optionsArray[2].text}</div>
          </div>
        `;
      }

      // 回傳單一題目的獨立沙盒列項目 (單題長度過長時，JS 會直接對 .single-question-block 下手縮小)
      return `
        <div class="flex flex-col justify-start single-question-block transition-all duration-150">
          <div class="flex items-start">
            <span class="text-slate-800 font-bold mr-0.5 shrink-0 text-main">(</span>
            <input type="text" maxlength="1" data-answer="${correctLetter}" class="answer-input w-5 h-5 text-center font-bold text-blue-600 border-b border-slate-400 focus:outline-none uppercase bg-transparent text-main shrink-0">
            <span class="text-slate-800 font-bold mr-1 shrink-0 text-main">) ${item.no}.</span>
            <span ${ttsAction} class="${cursorClass} leading-normal text-main font-english font-medium flex-grow q-text-span">${item.q}</span>
          </div>
          ${optionsHtml}
        </div>
      `;
    }

    function getLessonQuestions(lessonKey) {
      let data = database[lessonKey];
      if (!data || data.length === 0) {
        data = Array.from({length: 10}, (_, i) => ({
          no: i + 1,
          q: `請於試算表資料庫中填寫 ${lessonKey} 第 ${i+1} 題的內容。`,
          a: "正確答案", b1: "模擬誘答一", b2: "模擬誘答二"
        }));
      }
      return data;
    }

    // 線上載入渲染
    function loadLesson(lessonKey) {
      currentLesson = lessonKey;
      showAnswersState = false;
      
      lessonKeys.forEach(key => {
        const btn = document.getElementById(`btn-${key}`);
        btn.className = key === lessonKey ? 
          "py-1 rounded-md text-xs font-semibold border transition font-chinese bg-slate-800 text-white border-slate-800" : 
          "py-1 rounded-md text-xs font-semibold border transition font-chinese bg-slate-50 text-slate-700 hover:bg-slate-100 border-slate-200";
      });

      document.getElementById('main-title').innerText = `七下 ${lessonKey} 課文翻譯理解講義`;

      const container = document.getElementById('questions-container');
      container.innerHTML = '';

      const questions = getLessonQuestions(lessonKey);

      // 分三層鷹架注入
      const levels = [
        { title: "基礎字詞理解 (第 1-3 題)", color: "green", border: "border-green-600", bg: "bg-green-50", text: "text-green-900", badge: "Level 1", start: 0, end: 3 },
        { title: "句意翻譯理解 (第 4-8 題)", color: "blue", border: "border-blue-600", bg: "bg-blue-50", text: "text-blue-900", badge: "Level 2", start: 3, end: 8 },
        { title: "綜合翻譯挑戰 (第 9-10 題)", color: "purple", border: "border-purple-600", bg: "bg-purple-50", text: "text-purple-900", badge: "Level 3", start: 8, end: 10 }
      ];

      levels.forEach(lvl => {
        const groupWrapper = document.createElement('div');
        groupWrapper.className = "flex flex-col space-y-2 shrink-0";

        let questionsHtml = '';
        for(let i = lvl.start; i < lvl.end; i++) {
          questionsHtml += buildQuestionHtml(questions[i]);
        }

        groupWrapper.innerHTML = `
          <h2 class="text-[14px] font-bold ${lvl.text} ${lvl.bg} border-l-4 ${lvl.border} px-2 py-0.5 rounded font-chinese flex items-center gap-2 mb-1 shrink-0">
            <span class="px-1 py-0.2 bg-slate-800 text-white text-[9px] rounded font-english tracking-wider">${lvl.badge}</span>
            <span>${lvl.title}</span>
          </h2>
          <div class="flex flex-col space-y-3.5 pl-1">
            ${questionsHtml}
          </div>
        `;
        container.appendChild(groupWrapper);
      });

      bindInputLogic();
      
      // 關鍵修復：啟動局部精準縮小機制，防止第十題溢出
      setTimeout(() => {
        applySingleQuestionMicroScaling(document.querySelectorAll('.single-question-block'));
      }, 50);
    }

    // 核心排版引擎：單題局部微縮機制（Cell Content Fit）
    function applySingleQuestionMicroScaling(blocks) {
      blocks.forEach(block => {
        const qText = block.querySelector('.q-text-span');
        const inputs = block.querySelectorAll('.answer-input');
        const brackets = block.querySelectorAll('span.text-main');
        const opts = block.querySelectorAll('.opt-container > div');

        // 一級偵測：如果長句字數過長，單題局部微縮至 14px，其餘題目維持 16.5px 不變
        if (qText.clientHeight > 30 || block.scrollWidth > block.clientWidth) { 
          qText.style.fontSize = "14.5px";
          qText.style.lineHeight = "1.3";
          inputs.forEach(el => { el.style.fontSize = "14.5px"; el.style.width = "18px"; el.style.height = "18px"; });
          brackets.forEach(el => el.style.fontSize = "14.5px");
          opts.forEach(el => el.style.fontSize = "13.5px");
        }

        // 二級偵測：如果是特長魔王句，單題深層局部微縮至 12.5px，確保絕不推擠下方的第 4~10 題
        if (qText.clientHeight > 45) {
          qText.style.fontSize = "12.5px";
          inputs.forEach(el => el.style.fontSize = "12.5px");
          brackets.forEach(el => el.style.fontSize = "12.5px");
          opts.forEach(el => el.style.fontSize = "11.5px");
        }
      });
    }

    // 一鍵生成全 12 課並啟動獨立 12 頁紙本列印
    function printAllLessons() {
      const printContainer = document.getElementById('print-all-container');
      printContainer.innerHTML = ''; // 沖刷暫存

      lessonKeys.forEach(key => {
        const page = document.createElement('div');
        page.className = "print-page";

        const questions = getLessonQuestions(key);

        let l1Html = '', l2Html = '', l3Html = '';
        for(let i=0; i<3; i++)  l1Html += buildQuestionHtml(questions[i]);
        for(let i=3; i<8; i++)  l2Html += buildQuestionHtml(questions[i]);
        for(let i=8; i<10; i++) l3Html += buildQuestionHtml(questions[i]);

        page.innerHTML = `
          <div class="pb-2 border-b-2 border-slate-300 shrink-0 mb-4">
            <div class="flex justify-between items-end">
              <h1 class="title-large text-slate-900 tracking-wider font-chinese leading-none">七下 ${key} 課文翻譯理解講義</h1>
              <div class="flex gap-6 info-text font-medium text-slate-800 leading-none pb-0.5 font-chinese">
                <div>班級/座號：______</div>
                <div>姓名：__________</div>
              </div>
            </div>
          </div>

          <div class="flex flex-col space-y-4 overflow-hidden">
            <div class="flex flex-col space-y-2 shrink-0">
              <h2 class="text-[14px] font-bold text-green-900 bg-green-50 border-l-4 border-green-600 px-2 py-0.5 rounded font-chinese flex items-center gap-2 mb-1 shrink-0">
                <span class="px-1 py-0.2 bg-slate-800 text-white text-[9px] rounded font-english tracking-wider">Level 1</span>
                <span>基礎字詞理解 (第 1-3 題)</span>
              </h2>
              <div class="flex flex-col space-y-3.5 pl-1 print-block-inner">${l1Html}</div>
            </div>

            <div class="flex flex-col space-y-2 shrink-0">
              <h2 class="text-[14px] font-bold text-blue-900 bg-blue-50 border-l-4 border-blue-600 px-2 py-0.5 rounded font-chinese flex items-center gap-2 mb-1 shrink-0">
                <span class="px-1 py-0.2 bg-slate-800 text-white text-[9px] rounded font-english tracking-wider">Level 2</span>
                <span>句意翻譯理解 (第 4-8 題)</span>
              </h2>
              <div class="flex flex-col space-y-3.5 pl-1 print-block-inner">${l2Html}</div>
            </div>

            <div class="flex flex-col space-y-2 shrink-0">
              <h2 class="text-[14px] font-bold text-purple-900 bg-purple-50 border-l-4 border-purple-600 px-2 py-0.5 rounded font-chinese flex items-center gap-2 mb-1 shrink-0">
                <span class="px-1 py-0.2 bg-slate-800 text-white text-[9px] rounded font-english tracking-wider">Level 3</span>
                <span>綜合翻譯挑戰 (第 9-10 題)</span>
              </h2>
              <div class="flex flex-col space-y-3.5 pl-1 print-block-inner">${l3Html}</div>
            </div>
          </div>
        `;
        printContainer.appendChild(page);
      });

      // 對後台生成的列印頁同步執行精準局部微縮
      setTimeout(() => {
        applySingleQuestionMicroScaling(printContainer.querySelectorAll('.single-question-block'));
        // 標註正在執行批次列印，通知印表機對準 12 頁容器
        document.body.classList.add('printing-all');
        window.print();
        
        // 列印預覽結束後清除狀態，還原網頁單頁看板
        setTimeout(() => {
          document.body.classList.remove('printing-all');
        }, 500);
      }, 50);
    }

    // 慢速美式發音引擎（0.80 特教標準速度）
    function speakWord(word) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const cleanWord = word.replace(/<[^>]*>/g, '').replace(/\.\.\./g, '');
        const utterance = new SpeechSynthesisUtterance(cleanWord);
        utterance.lang = 'en-US';
        utterance.rate = 0.8; 
        window.speechSynthesis.speak(utterance);
      }
    }

    // 線上核對答案開關
    function toggleAnswers() {
      showAnswersState = !showAnswersState;
      document.querySelectorAll('.answer-input').forEach(input => {
        const correctAnswer = input.getAttribute('data-answer');
        if (showAnswersState) {
          input.value = correctAnswer;
          input.classList.add('bg-blue-100', 'text-blue-800', 'border-blue-500');
        } else {
          input.value = '';
          input.classList.remove('bg-blue-100', 'text-blue-800', 'border-blue-500');
        }
      });
    }

    // 答案擦除
    function clearAnswers() {
      document.querySelectorAll('.answer-input').forEach(input => {
        input.value = '';
        input.classList.remove('bg-blue-100', 'text-blue-800', 'border-blue-500');
      });
      showAnswersState = false;
    }

    // 大寫鎖定、自動跳格、退格回跳無障礙邏輯
    function bindInputLogic() {
      const inputsArray = Array.from(document.querySelectorAll('.answer-input'));
      inputsArray.forEach((input, index) => {
        input.addEventListener('input', function() {
          this.value = this.value.toUpperCase();
          if (!/^[A-C]$/.test(this.value)) this.value = '';
          if (this.value !== '' && index < inputsArray.length - 1) {
            inputsArray[index + 1].focus();
          }
        });

        input.addEventListener('keydown', function(e) {
          if (e.key === 'Backspace' && this.value === '' && index > 0) {
            inputsArray[index - 1].focus();
          }
        });
      });
    }

    // 預設加載 L1對話
    window.onload = () => {
      loadLesson("L1對話");
    };
  </script>
</body>
</html>
