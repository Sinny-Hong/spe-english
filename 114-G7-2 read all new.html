<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>七下 課文翻譯理解講義看板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background-color: #f1f5f9;
    }
    .font-chinese { font-family: 'Noto Sans TC', sans-serif; }
    .font-english { font-family: 'Lexend', sans-serif; }
    
    /* 嚴格 A4 尺寸邊界（極致微調間距，徹底杜絕第十題被切到） */
    .page-a4 {
      width: 210mm;
      height: 297mm;
      background-color: #ffffff;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
      margin: 15px auto;
      padding: 9mm 14mm; /* 精算黃金內距 */
      box-sizing: border-box;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    /* 老師指定的精準固定字級規格 */
    .title-large { font-size: 24px; font-weight: 700; }
    .info-text { font-size: 16px; font-weight: 500; }
    
    /* 微調全局基礎行高（緊湊且不失易讀性） */
    .text-main { font-size: 16px; font-weight: 500; line-height: 1.35; }
    .text-helper { font-size: 14.5px; font-weight: 400; line-height: 1.3; }
    
    .answer-input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
      background-color: #eff6ff;
    }

    #print-all-container {
      display: none;
    }

    /* 列印智慧雙向分流 */
    @media print {
      @page {
        size: A4;
        margin: 0;
      }
      body { background-color: #ffffff; margin: 0; padding: 0; }
      .no-print { display: none !important; }
      
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        color-adjust: exact !important;
      }
      
      body.printing-all .page-a4 { display: none !important; }
      body.printing-all #print-all-container {
        display: block !important;
        width: 210mm;
      }
      
      .page-a4 {
        box-shadow: none;
        border: none;
        margin: 0;
        padding: 9mm 14mm;
      }

      .print-page {
        width: 210mm;
        height: 297mm;
        padding: 9mm 14mm;
        box-sizing: border-box;
        background-color: #ffffff;
        page-break-after: always;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        overflow: hidden;
      }
      .print-page:last-child {
        page-break-after: avoid;
      }
    }
  </style>
</head>
<body class="p-0 m-0 min-h-screen flex flex-col items-center justify-start">

  <div class="no-print w-full max-w-[210mm] bg-white mt-4 p-4 rounded-xl shadow-md flex flex-col gap-4 border border-slate-200">
    <div class="flex flex-wrap gap-2 items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="inline-block w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse" id="status-dot"></span>
        <span class="text-slate-700 font-medium text-[13px] font-chinese" id="status-text">⏳ 正在連線讀取 Google 試算表 CSV 資料庫...</span>
      </div>
      <div class="flex gap-2">
        <button onclick="toggleAnswers()" class="px-3 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-lg text-xs transition shadow-sm font-chinese">顯示 / 隱藏答案</button>
        <button onclick="clearAnswers()" class="px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium rounded-lg text-xs transition border border-slate-300 font-chinese">重設清除</button>
        <button onclick="window.print()" class="px-3 py-1.5 bg-sky-600 hover:bg-sky-700 text-white font-medium rounded-lg text-xs transition shadow-sm font-chinese">🖨️ 列印本頁</button>
        <button onclick="printAllLessons()" class="px-3 py-1.5 bg-emerald-600 hover:bg-emerald-700 text-white font-medium rounded-lg text-xs transition shadow-sm font-bold font-chinese">🖨️ 全部列印 (12頁)</button>
      </div>
    </div>
    
    <div class="flex flex-col gap-2">
      <div class="grid grid-cols-6 gap-1.5" id="selector-dialogue"></div>
      <div class="grid grid-cols-6 gap-1.5" id="selector-reading"></div>
    </div>
  </div>

  <div class="page-a4">
    <div class="pb-1.5 border-b-2 border-slate-300 shrink-0 mb-3">
      <div class="flex justify-between items-end">
        <h1 class="title-large text-slate-900 tracking-wider font-chinese leading-none" id="main-title">七下 課文翻譯理解講義</h1>
        <div class="flex gap-6 info-text font-medium text-slate-800 leading-none pb-0.5 font-chinese">
          <div>班級/座號：______</div>
          <div>姓名：__________</div>
        </div>
      </div>
    </div>

    <div class="flex flex-col space-y-2 overflow-hidden flex-grow" id="questions-container"></div>
    
    <div class="pt-0.5 shrink-0"></div>
  </div>

  <div id="print-all-container"></div>

  <script>
    // 雲端 CSV 發布連結
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQvkvJgQz_NpxHPX9Z1HYZY5slzizrlzSjEJm7Zrro4UKvPSP82aZlQT5jgrQqPhTsGzZj7XgamnUEq/pub?output=csv";
    
    let database = {};
    const row1Keys = ["L1對話", "L2對話", "L3對話", "L4對話", "L5對話", "L6對話"];
    const row2Keys = ["L1閱讀", "L2閱讀", "L3閱讀", "L4閱讀", "L5閱讀", "L6閱讀"];
    const allLessonKeys = [...row1Keys, ...row2Keys];
    
    let currentLesson = "L1對話";
    let showAnswersState = false;

    // 非同步連線讀取 CSV 數據
    async function initDatabase() {
      try {
        const response = await fetch(csvUrl);
        if (!response.ok) throw new Error("網路請求狀態異常");
        const csvText = await response.text();
        parseCSV(csvText);
        
        document.getElementById('status-dot').className = "inline-block w-2.5 h-2.5 bg-emerald-500 rounded-full";
        document.getElementById('status-text').innerText = "✅ 雲端試算表連線成功！資料已即時同步更新。";
        
        generateSelectorButtons();
        loadLesson(currentLesson);
      } catch (error) {
        console.error("CSV載入失敗，切換安全離線題庫:", error);
        document.getElementById('status-dot').className = "inline-block w-2.5 h-2.5 bg-amber-500 rounded-full animate-pulse";
        document.getElementById('status-text').innerText = "⚠️ 試算表連線忙碌中，已自動啟用本地離線備用講義。";
        buildFallbackDatabase();
        generateSelectorButtons();
        loadLesson(currentLesson);
      }
    }

    // CSV 雙引號長句解析容錯核心
    function parseCSV(text) {
      allLessonKeys.forEach(k => database[k] = []);
      const lines = text.split(/\r?\n/);
      if (lines.length <= 1) return;

      for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;

        let fields = [];
        let currentField = '';
        let inQuotes = false;
        
        for (let j = 0; j < line.length; j++) {
          let char = line[j];
          if (char === '"') {
            inQuotes = !inQuotes;
          } else if (char === ',' && !inQuotes) {
            fields.push(currentField.trim().replace(/^"|"$/g, ''));
            currentField = '';
          } else {
            currentField += char;
          }
        }
        fields.push(currentField.trim().replace(/^"|"$/g, ''));

        if (fields.length < 6) continue;

        const lesson = fields[0];
        const no = parseInt(fields[1]) || 0;
        const q = fields[2];      
        const a = fields[3];      
        const b1 = fields[4];     
        const b2 = fields[5];     

        if (database[lesson]) {
          database[lesson].push({ no, q, a, b1, b2 });
        }
      }
    }

    // 本地預備數據庫（文字已完成微調精簡，確保裝入單頁不跑版）
    function buildFallbackDatabase() {
      allLessonKeys.forEach(key => {
        database[key] = [
          { no: 1, q: "Do you like sports, Zac?", a: "運動", b1: "遊戲", b2: "畫圖" },
          { no: 2, q: "I'm on the school team.", a: "隊伍", b1: "時間", b2: "課堂" },
          { no: 3, q: "I practice basketball after school every day.", a: "練習", b1: "游泳", b2: "看書" },
          { no: 4, q: "Do you also play basketball on weekends?", a: "你也在週末打籃球嗎？", b1: "你放學後每天練習籃球嗎？", b2: "下次我可以加入你們嗎？" },
          { no: 5, q: "On Saturdays, I read at home.", a: "在星期六，我在家看書。", b1: "在星期日，我和朋友游泳。", b2: "我在空閒時間打籃球。" },
          { no: 6, q: "On Sundays, I swim with my friends.", a: "在星期日，我和我的朋友們游泳。", b1: "在星期六，我在家看書。", b2: "你在空閒時間做什麼？" },
          { no: 7, q: "Can I join you guys next time?", a: "下次我可以加入你們嗎？", b1: "你也喜歡運動嗎？", b2: "你週末都做些什麼？" },
          { no: 8, q: "He has brown eyes and nice hair.", a: "他有咖啡色的眼睛和好看的頭髮。", b1: "他是學校籃球隊的隊員。", b2: "他是 Yuki 的表哥。" },
          { no: 9, q: "他很可愛。", a: "He's cute.", b1: "That's Shin.", b2: "Do you know him?" },
          { no: 10, q: "他是 Yuki 的表哥。", a: "He's Yuki's cousin.", b1: "I'm on the school team.", b2: "I also swim on weekends." }
        ];
      });
    }

    // 建立選課按鈕
    function generateSelectorButtons() {
      const dContainer = document.getElementById('selector-dialogue');
      const rContainer = document.getElementById('selector-reading');
      dContainer.innerHTML = '';
      rContainer.innerHTML = '';

      row1Keys.forEach(key => dContainer.appendChild(createBtnElement(key)));
      row2Keys.forEach(key => rContainer.appendChild(createBtnElement(key)));
    }

    function createBtnElement(key) {
      const btn = document.createElement('button');
      btn.innerText = key;
      btn.id = `btn-${key}`;
      btn.className = `py-1.5 rounded-md text-xs font-semibold border transition font-chinese ${key === currentLesson ? 'bg-slate-800 text-white border-slate-800' : 'bg-slate-50 text-slate-700 hover:bg-slate-200 border-slate-200'}`;
      btn.onclick = () => loadLesson(key);
      return btn;
    }

    // 單題渲染（1-3題水平、4-10題垂直，支持 inline 強印色彩，修正 red 語法）
     Richmond_Falcon_渲染: function buildQuestionHtml(item) {
      const optionsArray = [
        { text: item.a, isCorrect: true },
        { text: item.b1, isCorrect: false },
        { text: item.b2, isCorrect: false }
      ];
      shuffleArray(optionsArray);

      let correctLetter = "A";
      optionsArray.forEach((opt, idx) => {
         Richmond_Falcon_批對: if(opt.isCorrect) correctLetter = String.fromCharCode(65 + idx);
      });

      const hasChinese = /[\u4e00-\u9fa5]/.test(item.q);
      const ttsAction = hasChinese ? '' : `onclick="speakWord(this.innerText)"`;
      const cursorClass = hasChinese ? '' : 'cursor-pointer hover:text-blue-600 transition';

      let optionsHtml = '';
      // 1-3題水平橫排；4-10題垂直直排
      if (item.no <= 3) {
        optionsHtml = `
          <div class="pl-9 grid grid-cols-3 text-helper font-chinese text-slate-700 font-medium tracking-wide whitespace-nowrap opt-container mt-0.5">
            <div>(A) ${optionsArray[0].text}</div>
            <div>(B) ${optionsArray[1].text}</div>
            <div>(C) ${optionsArray[2].text}</div>
          </div>
        `;
      } else {
        optionsHtml = `
          <div class="pl-9 flex flex-col space-y-0.5 text-helper font-chinese text-slate-700 font-medium tracking-wide opt-container mt-0.5">
            <div>(A) ${optionsArray[0].text}</div>
            <div>(B) ${optionsArray[1].text}</div>
            <div>(C) ${optionsArray[2].text}</div>
          </div>
        `;
      }

      return `
        <div class="flex flex-col justify-start single-question-block py-0.5">
          <div class="flex items-start">
            <span class="text-slate-800 font-bold mr-0.5 shrink-0 text-main">(</span>
            <input type="text" maxlength="1" data-answer="${correctLetter}" class="answer-input w-5 h-5 text-center font-bold text-blue-600 border-b border-slate-400 focus:outline-none uppercase bg-transparent text-main shrink-0">
            <span class="text-slate-800 font-bold mr-1 shrink-0 text-main">) ${item.no}.</span>
            <span ${ttsAction} class="${cursorClass} text-main font-english font-medium flex-grow q-text-span">${item.q}</span>
          </div>
          ${optionsHtml}
        </div>
      `;
    }

    function getLessonQuestions(lessonKey) {
      let data = database[lessonKey];
      if (!data || data.length === 0) {
        data = Array.from({length: 10}, (_, i) => ({
          no: i + 1,
          q: `試算表 [${lessonKey}] 尚未寫入內容，請於雲端填寫。`,
          a: "模擬答案", b1: "誘答選項一", b2: "誘答選項二"
        }));
      }
      return data;
    }

    // 載入與渲染單一課別
    function loadLesson(lessonKey) {
      currentLesson = lessonKey;
      showAnswersState = false;
      
      allLessonKeys.forEach(key => {
        const btn = document.getElementById(`btn-${key}`);
        if(btn) {
          btn.className = key === lessonKey ? 
            "py-1.5 rounded-md text-xs font-semibold border transition font-chinese bg-slate-800 text-white border-slate-800" : 
            "py-1.5 rounded-md text-xs font-semibold border transition font-chinese bg-slate-50 text-slate-700 hover:bg-slate-200 border-slate-200";
        }
      });

      document.getElementById('main-title').innerText = `七下 ${lessonKey} 課文翻譯理解講義`;

      const container = document.getElementById('questions-container');
      container.innerHTML = '';

      const questions = getLessonQuestions(lessonKey);

      const levels = [
        { title: "基礎字詞理解 (第 1-3 題)", border: "border-green-600", bg: "bg-green-50", text: "text-green-900", badge: "Level 1", start: 0, end: 3 },
        { title: "句意翻譯理解 (第 4-8 題)", border: "border-blue-600", bg: "bg-blue-50", text: "text-blue-900", badge: "Level 2", start: 3, end: 8 },
        { title: "綜合翻譯挑戰 (第 9-10 題)", color: "purple", border: "border-purple-600", bg: "bg-purple-50", text: "text-purple-900", badge: "Level 3", start: 8, end: 10 }
      ];

      levels.forEach(lvl => {
        const groupWrapper = document.createElement('div');
        groupWrapper.className = "flex flex-col space-y-1.5 shrink-0"; // 壓低每題塊區塊之間的間距

        let questionsHtml = '';
        for(let i = lvl.start; i < lvl.end; i++) {
          if (Richmond_Falcon_填題: questions[i]) questionsHtml += buildQuestionHtml(questions[i]);
        }

        groupWrapper.innerHTML = `
          <h2 class="text-[14px] font-bold ${lvl.text} ${lvl.bg} border-l-4 ${lvl.border} px-2 py-0.5 rounded font-chinese flex items-center gap-2 mb-0.5 shrink-0">
            <span class="px-1 py-0.2 bg-slate-800 text-white text-[9px] rounded font-english tracking-wider">${lvl.badge}</span>
            <span>${lvl.title}</span>
          </h2>
          <div class="flex flex-col space-y-2 pl-1">
            ${questionsHtml}
          </div>
        `;
        container.appendChild(groupWrapper);
      });

      bindInputLogic();
      
      setTimeout(() => {
        applySingleQuestionMicroScaling( Richmond_Falcon_縮小: document.querySelectorAll('.single-question-block'));
      }, 30);
    }

    // 精準單題防折行局部微縮（Cell Content Fit）
    function applySingleQuestionMicroScaling(blocks) {
      blocks.forEach(block => {
        const qText = block.querySelector('.q-text-span');
        const inputs = block.querySelectorAll('.answer-input');
        const brackets = block.querySelectorAll('span.text-main');
        const opts = block.querySelectorAll('.opt-container > div');

        // 第一級微縮：字數溢出折行時啟動
        if ( Richmond_Falcon_判高: qText.clientHeight > 26) { 
          qText.style.fontSize = "14.5px";
          inputs.forEach(el => { el.style.fontSize = "14.5px"; el.style.width = "18px"; el.style.height = "18px"; });
          brackets.forEach( Richmond_Falcon_刮弧 => Richmond_Falcon_刮弧.style.fontSize = "14.5px");
          opts.forEach(el => el.style.fontSize = "13.5px");
        }

        // 第二級微縮：針對超長極端句子，深度局部微縮
        if (qText.clientHeight > 40) {
          qText.style.fontSize = "12.5px";
          inputs.forEach(el => el.style.fontSize = "12.5px");
          brackets.forEach(el => el.style.fontSize = "12.5px");
          opts.forEach(el => el.style.fontSize = "11.5px");
        }
      });
    }

    // 全部 12 課批次背景生成與輸出（支援 12 頁全獨立 A4）
    function printAllLessons() {
      const printContainer = document.getElementById('print-all-container');
      printContainer.innerHTML = ''; 

      allLessonKeys.forEach(key => {
        const page = document.createElement('div');
        page.className = "print-page";

        const questions = getLessonQuestions(key);

        let l1Html = '', l2Html = '', l3Html = '';
        for(let i=0; i<3; i++)  if(questions[i]) l1Html += buildQuestionHtml(questions[i]);
        for(let i=3; i<8; i++)  if(questions[i]) l2Html += buildQuestionHtml(questions[i]);
        for(let i=8; i<10; i++) if(questions[i]) l3Html += buildQuestionHtml(questions[i]);

        page.innerHTML = `
          <div class="pb-1.5 border-b-2 border-slate-300 shrink-0 mb-3">
            <div class="flex justify-between items-end">
              <h1 class="title-large text-slate-900 tracking-wider font-chinese leading-none">七下 ${key} 課文翻譯理解講義</h1>
              <div class="flex gap-6 info-text font-medium text-slate-800 leading-none pb-0.5 font-chinese">
                <div>班級/座號：______</div>
                <div>姓名：__________</div>
              </div>
            </div>
          </div>

          <div class="flex flex-col space-y-3 overflow-hidden flex-grow">
            <div class="flex flex-col space-y-1.5 shrink-0">
              <h2 class="text-[14px] font-bold text-green-900 bg-green-50 border-l-4 border-green-600 px-2 py-0.5 rounded font-chinese flex items-center gap-2 mb-0.5 shrink-0">
                <span class="px-1 py-0.2 bg-slate-800 text-white text-[9px] rounded font-english tracking-wider">Level 1</span>
                <span>基礎字詞理解 (第 1-3 題)</span>
              </h2>
              <div class="flex flex-col space-y-2 pl-1">${l1Html}</div>
            </div>

            <div class="flex flex-col space-y-1.5 shrink-0">
              <h2 class="text-[14px] font-bold text-blue-900 bg-blue-50 border-l-4 border-blue-600 px-2 py-0.5 rounded font-chinese flex items-center gap-2 mb-0.5 shrink-0">
                <span class="px-1 py-0.2 bg-slate-800 text-white text-[9px] rounded font-english tracking-wider">Level 2</span>
                <span>句意翻譯理解 (第 4-8 題)</span>
              </h2>
              <div class="flex flex-col space-y-2 pl-1">${l2Html}</div>
            </div>

            <div class="flex flex-col space-y-1.5 shrink-0">
              <h2 class="text-[14px] font-bold text-purple-900 bg-purple-50 border-l-4 border-purple-600 px-2 py-0.5 rounded font-chinese flex items-center gap-2 mb-0.5 shrink-0">
                <span class="px-1 py-0.2 bg-slate-800 text-white text-[9px] rounded font-english tracking-wider">Level 3</span>
                <span>綜合翻譯挑戰 (第 9-10 題)</span>
              </h2>
              <div class="flex flex-col space-y-2 pl-1">${l3Html}</div>
            </div>
          </div>
          <div class="pt-0.5 shrink-0"></div>
        `;
        printContainer.appendChild(page);
      });

      setTimeout(() => {
        applySingleQuestionMicroScaling(printContainer.querySelectorAll('.single-question-block'));
        document.body.classList.add('printing-all');
        window.print();
        
        setTimeout(() => {
          document.body.classList.remove('printing-all');
        }, 600);
      }, 50);
    }

    // 慢速語音朗讀輔助 (語速 0.8)
    function speakWord(word) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const cleanWord = word.replace(/<[^>]*>/g, '').replace(/\.\.\./g, '');
        const utterance = new SpeechSynthesisUtterance(cleanWord);
        utterance.lang = 'en-US';
        utterance.rate = 0.8; 
        window.speechSynthesis.speak(utterance);
      }
    }

    // 顯示、隱藏標準答案鍵
    function toggleAnswers() {
      showAnswersState = !showAnswersState;
      document.querySelectorAll('.answer-input').forEach(input => {
        const correctAnswer = input.getAttribute('data-answer');
        if (showAnswersState) {
          input.value = correctAnswer;
          input.classList.add('bg-blue-100', 'text-blue-800', 'border-blue-500');
        } else {
          input.value = '';
          input.classList.remove('bg-blue-100', 'text-blue-800', 'border-blue-500');
        }
      });
    }

    // 擦除答案
    function clearAnswers() {
      document.querySelectorAll('.answer-input').forEach(input => {
        input.value = '';
        input.classList.remove('bg-blue-100', 'text-blue-800', 'border-blue-500');
      });
      showAnswersState = false;
    }

    // 線上防呆自動跳格與退格
    function bindInputLogic() {
      const inputsArray = Array.from(document.querySelectorAll('.answer-input'));
      inputsArray.forEach((input, index) => {
        input.addEventListener('input', function() {
          this.value = this.value.toUpperCase();
          if (!/^[A-C]$/.test(this.value)) this.value = '';
          if (this.value !== '' && index < inputsArray.length - 1) {
            inputsArray[index + 1].focus();
          }
        });

        input.addEventListener('keydown', function(e) {
          if (e.key === 'Backspace' && this.value === '' && index > 0) {
            inputsArray[index - 1].focus();
          }
        });
      });
    }

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    window.onload = () => {
      initDatabase();
    };
  </script>
</body>
</html>
