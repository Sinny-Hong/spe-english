        const utterance = new SpeechSynthesisUtterance(word);
        utterance.lang = 'en-US';
        utterance.rate = 0.85;

      }
    }

    function seededShuffle(array, seedStr) {
      let hash = 0;
      for (let i = 0; i < seedStr.length; i++) {
        hash = seedStr.charCodeAt(i) + ((hash << 5) - hash);
      }
      let shuffled = [...array];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.abs((hash + i) % (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

    // 核心排版：移除了 1~12 題之間的一般格線，僅保留 Part A/B 中央的大虛線
    function buildFixedGroupHtml(groupData, groupIdx) {
      const totalWords = groupData.words;
      const half = Math.ceil(totalWords.length / 2);
      
      const partA_Words = totalWords.slice(0, half);
      const partB_Words = totalWords.slice(half);

      const shuffledA = seededShuffle(partA_Words, `${currentLesson}-${groupIdx}-A`);
      const shuffledB = seededShuffle(partB_Words, `${currentLesson}-${groupIdx}-B`);

      let rowsHtml = '';

      for (let i = 0; i < 12; i++) {
        let isPartB = i >= 6;
        let localIdx = isPartB ? i - 6 : i;
        
        let currentLeftList = isPartB ? partB_Words : partA_Words;
        let currentRightList = isPartB ? shuffledB : shuffledA;

        let leftItem = currentLeftList[localIdx];  
        let rightItem = currentRightList[localIdx]; 

        // 去除一般 border-b 橫線，僅在第 6 題完結處加上強烈的分隔線
        let rowClass = "flex items-center justify-between row-item px-1 quiz-row";
        if (i === 6) {
          rowClass += " border-t-2 border-dashed border-slate-300 pt-0.5";
        }

        // 左側出題：點擊整列會觸發語音讀音，同時將此題鎖定為大電視作答目標
        let leftColHtml = '';
        if (leftItem) {
          const correctAnsLetter = optLetters[currentRightList.findIndex(x => x.ch === leftItem.ch)];

          leftColHtml = `
            <div class="flex items-center flex-grow truncate h-[28px] pr-2 rounded cursor-pointer transition select-none" onclick="setActiveRow(this, '${leftItem.eng.replace(/'/g, "\\'")}')">
              <span class="text-[14px] font-bold text-slate-700 shrink-0">(</span>
              <input type="text" maxlength="1" data-ans="${correctAnsLetter}" readonly class="match-input w-5 h-5 text-center font-black text-red-600 focus:outline-none bg-transparent text-[14px] p-0 shrink-0 cursor-pointer pointer-events-none">
              <span class="text-[14px] font-bold text-slate-700 shrink-0 mr-2">)</span>
              <span class="font-bold text-slate-400 text-[12px] font-english mr-1.5 shrink-0">${localIdx + 1}.</span>
              <span class="font-english font-medium text-slate-800 text-[15.5px] tracking-tight truncate word-span leading-none">${leftItem.eng}</span>
            </div>
          `;
        } else {
          leftColHtml = `<div class="flex-grow h-[28px] opacity-0 pointer-events-none"></div>`;
        }

        // 右側中文答案：融合為一個整合大框，並添加大電視點擊一鍵填入功能
        let rightColHtml = '';
        if (rightItem) {
          const letterLabel = optLetters[localIdx];
          
          let radiusClass = "rounded-none";
          if (localIdx === 0) radiusClass = "rounded-t";
          if (localIdx === currentRightList.length - 1 || localIdx === 5) radiusClass = "rounded-b";

          rightColHtml = `
            <div onclick="selectChineseAnswer('${letterLabel}')" class="flex items-center bg-sky-100 border-x border-sky-300 ${radiusClass} ${localIdx === 0 ? 'border-t' : ''} ${localIdx === currentRightList.length - 1 || localIdx === 5 ? 'border-b' : ''} px-2 w-[115px] h-[30px] shrink-0 shadow-sm cursor-pointer hover:bg-sky-200 transition">
              <span class="font-bold text-red-600 text-[13px] font-english mr-1 shrink-0">${letterLabel}.</span>
              <span class="font-chinese text-slate-800 text-[13px] font-medium truncate flex-grow leading-none">${rightItem.ch}</span>
            </div>
          `;
        } else {
          rightColHtml = `<div class="w-[115px] h-[30px] shrink-0 opacity-0 pointer-events-none"></div>`;
        }

        rowsHtml += `
          <div class="${rowClass}">
            ${leftColHtml}
            ${rightColHtml}
          </div>
        `;
      }

      return `
        <div class="bg-white flex flex-col justify-start flex-grow">
          <div class="flex justify-between items-center bg-slate-100 border border-slate-300 rounded-lg px-3 py-1.5 mb-1 shrink-0">
            <h3 class="text-[15.5px] font-bold text-slate-800 font-chinese tracking-wide">${groupData.gTitle}</h3>
          </div>
          <div class="flex flex-col flex-grow justify-start">
            ${rowsHtml}
          </div>
        </div>
      `;
    }

    // 大電視專用：點擊左側英文列，高亮亮起黃底，並進入準備填入狀態
    function setActiveRow(element, engWord) {
      // 先清除全網頁所有其他橫列的黃色亮底
      document.querySelectorAll('.quiz-row').forEach(row => row.classList.remove('active-row'));
      
      // 找到目前點擊的這一行整列變黃色
      const parentRow = element.closest('.quiz-row');
      parentRow.classList.add('active-row');
      
      // 鎖定裡面的 input 框作為稍後的填字目標
      activeInput = parentRow.querySelector('.match-input');
      
      // 同步發出慢速英語發音
      speakWord(engWord);
    }

    // 大電視專用：點擊右側中文大藍框的任一選項，自動把代號抓去黃色格子裡
    function selectChineseAnswer(letter) {
      if (activeInput) {
        // 填入大寫字母代號
        activeInput.value = letter;
        activeInput.classList.add('bg-red-50', 'text-red-600');
        
        // 自動尋找下一題（下一個 input），幫老師或學生自動啟動下一題的黃底，免去重複點選的麻煩
        const allInputs = Array.from(document.querySelectorAll('.match-input'));
        const currentIndex = allInputs.indexOf(activeInput);
        
        // 清除當前黃底
        activeInput.closest('.quiz-row').classList.remove('active-row');
        
        if (currentIndex !== -1 && currentIndex < allInputs.length - 1) {
          const nextInput = allInputs[currentIndex + 1];
          const nextRow = nextInput.closest('.quiz-row');
          
          // 如果下一題是有題目的（非空白格），就自動幫他亮起下一題
          if (nextRow && !nextRow.classList.contains('opacity-0')) {
            nextRow.classList.add('active-row');
            activeInput = nextInput;
          } else {
            activeInput = null;
          }
        } else {
          activeInput = null;
        }
      }
    }

    function loadLesson(lessonKey) {
      currentLesson = lessonKey;
      showAnswersState = false;
      activeInput = null;

      document.querySelectorAll('.lesson-btn').forEach(btn => {
        const k = btn.getAttribute('data-lesson');
        btn.className = (k === lessonKey) ? 
          "py-1.5 rounded-md text-xs font-semibold border transition font-chinese bg-red-600 text-white border-red-600 shadow-sm" :
          "py-1.5 rounded-md text-xs font-semibold border transition font-chinese bg-slate-50 text-slate-700 hover:bg-slate-200 border-slate-200";
      });

      document.getElementById('main-title').innerText = `七下 ${lessonKey} 英文科講義 中英文配對卷`;
      const container = document.getElementById('groups-container');
      container.innerHTML = '';

      const groups = database[lessonKey];
      groups.forEach((groupData, idx) => {
        container.innerHTML += buildFixedGroupHtml(groupData, idx);
      });

      applyMicroScaling();
    }

    function applyMicroScaling() {
      document.querySelectorAll('.word-span').forEach(span => {
        const textLength = span.innerText.length;
        if (textLength > 20) {
          span.style.fontSize = "12px";
          span.style.letterSpacing = "-0.5px";
        } else if (textLength > 14) {
          span.style.fontSize = "13.5px";
        } else {
          span.style.fontSize = "15.5px";
        }
      });
    }

    function initApp() {
      const selectorContainer = document.getElementById('lesson-selectors');
      selectorContainer.innerHTML = '';
      Object.keys(database).forEach(key => {
        const btn = document.createElement('button');
        btn.innerText = `七下 ${key}`;
        btn.setAttribute('data-lesson', key);
        btn.className = "lesson-btn py-1.5 rounded-md text-xs font-semibold border transition font-chinese";
        btn.onclick = () => loadLesson(key);
        selectorContainer.appendChild(btn);
      });
      loadLesson("L1");
    }

    function toggleAnswers() {
      showAnswersState = !showAnswersState;
      document.querySelectorAll('.match-input').forEach(input => {
        const ans = input.getAttribute('data-ans');
        if (showAnswersState) {
          input.value = ans;
          input.classList.add('bg-red-50', 'text-red-600');
        } else {
          input.value = '';
          input.classList.remove('bg-red-50', 'text-red-600');
        }
      });
    }

    function clearAnswers() {
      document.querySelectorAll('.match-input').forEach(input => {
        input.value = '';
        input.classList.remove('bg-red-50', 'text-red-600');
      });
      document.querySelectorAll('.quiz-row').forEach(row => row.classList.remove('active-row'));
      showAnswersState = false;
      activeInput = null;
    }

    function printAllLessons() {
      const printContainer = document.getElementById('print-all-container');
      printContainer.innerHTML = '';

      Object.keys(database).forEach(lessonKey => {
        const page = document.createElement('div');
        page.className = "print-page";

        const savedLesson = currentLesson;
        currentLesson = lessonKey;
        
        let allGroupsHtml = '';
        database[lessonKey].forEach((groupData, idx) => {
          allGroupsHtml += buildFixedGroupHtml(groupData, idx);
        });

        currentLesson = savedLesson;

        page.innerHTML = `
          <div class="border-b-4 border-double border-slate-400 pb-2 mb-4 shrink-0">
            <div class="flex justify-between items-end">
              <h1 class="title-large text-slate-800 tracking-wider font-chinese">七下 ${lessonKey} 英文科講義 中英文配對卷</h1>
              <div class="flex gap-4 info-text text-slate-700 font-chinese mb-1">
                <div class="flex items-end">
                  <span class="border-b-2 border-slate-400 w-20 text-center h-7 inline-block"></span>
                  <span class="ml-1 shrink-0">班</span>
                </div>
                <div class="flex items-end">
                  <span class="shrink-0">姓名：</span>
                  <span class="border-b-2 border-slate-400 w-28 text-center h-7 inline-block"></span>
                </div>
              </div>
            </div>
            <div class="mt-2 flex justify-between items-center bg-slate-100 px-3 py-1 rounded border-l-4 border-slate-500 shrink-0">
              <span class="text-[14px] font-bold text-slate-700 font-chinese">◎ 請將正確英文單字的代號填入括號中。錯字用紅筆訂正，中文、英文各 1 次。</span>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-x-6 gap-y-4 flex-grow mb-1 overflow-hidden">
            ${allGroupsHtml}
          </div>
          <div class="h-1 shrink-0"></div>
        `;
        printContainer.appendChild(page);
      });

      setTimeout(() => {
        applyMicroScaling();
        document.body.classList.add('printing-all');
        window.print();
        setTimeout(() => { document.body.classList.remove('printing-all'); }, 600);
      }, 50);
    }

    window.onload = initApp;
  </script>
</body>
</html>
