    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
        }
        .bubble-font {
            font-family: 'Fredoka', 'Noto Sans TC', sans-serif;
        }
        
        /* 螢幕上隱藏列印專用表頭 */
        .print-only-header {
            display: none;
        }

        /* 答對答錯亮燈樣式 */
        .glow-correct {
            box-shadow: 0 0 12px rgba(34, 197, 94, 0.5);
            border-color: #22c55e !important;
            background-color: #f0fdf4 !important;
        }
        .glow-incorrect {
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.5);
            border-color: #ef4444 !important;
            background-color: #fef2f2 !important;
        }

        /* ------------------ 列印樣式 (A4 雙欄並排，一頁兩關) ------------------ */
        @media print {
            @page {
                size: A4 portrait;
                margin: 0.8cm 1cm;
            }
            body {
                background-color: white !important;
                color: black !important;
                font-size: 11pt;
            }
            /* 隱藏網頁上所有不必要控制件 */
            .no-print {
                display: none !important;
            }
            /* 顯示每一頁頂部的列印專用表頭 */
            .print-only-header {
                display: block !important;
            }
            /* 移除網頁卡片的背景與陰影 */
            .level-card {
                box-shadow: none !important;
                border: none !important;
                background: transparent !important;
                margin: 0 !important;
                padding: 0 !important;
                page-break-inside: avoid !important;
            }
            /* 強制雙欄左右並排 (左邊32% 圖片，右邊68% 題目) */
            .grid-cols-custom {
                display: grid !important;
                grid-template-columns: 32% 68% !important;
                gap: 1.5rem !important;
                align-items: center !important;
            }
            /* 每兩關強迫換一頁 */
            .print-page-wrapper {
                page-break-after: always !important;
                display: block !important;
                margin-bottom: 0 !important;
                padding-bottom: 0 !important;
            }
            /* 確保 SVG 圖片完美顯色與大小 */
            svg {
                max-width: 100% !important;
                height: auto !important;
            }
            /* 答題底槓長度 */
            .print-underline-short {
                border-bottom: 2px solid #000000 !important;
                width: 2.2rem !important;
                display: inline-block !important;
                height: 1.2rem;
                vertical-align: bottom;
            }
            .print-underline-long {
                border-bottom: 2px solid #000000 !important;
                width: 9rem !important;
                display: inline-block !important;
                height: 1.2rem;
                vertical-align: bottom;
            }
        }
    </style>
</head>

        // 渲染 5 題測驗內容

                // 處理題目文字與讀報綁定
                let questionText = qObj.q;
                let finalQuestionHTML = '';

                if (currentMode === 'fill') {

                                const isSelected = savedAns === letter;
                                return `
                                    <button onclick="selectAnswer('${lvlId}', ${idx}, '${letter}')" class="px-3 py-1 text-xs rounded-lg font-bold border-2 transition-all ${isSelected ? 'bg-indigo-600 border-slate-900 text-white' : 'bg-slate-50 border-slate-200 text-slate-700 hover:bg-slate-100'}">
                                        (${letter}) ${opt}
                                    </button>
                                `;
                            }).join('')}
                        </div>
                    `;
                }

                // 反饋解析欄 (預設隱藏)
                const noteHTML = qObj.note ? `
                    <div id="note-${lvlId}-${idx}" class="text-[11px] text-slate-500 bg-slate-50 p-1.5 rounded-lg mt-0.5 hidden no-print">
                        <span class="font-bold text-slate-700">解析：</span>${qObj.note}
                    </div>
                ` : '';

                html += `
                    <div class="flex flex-col border-b border-slate-100/50 pb-1.5 last:border-none" id="qrow-${lvlId}-${idx}">
                        <div class="flex items-center">
                            <!-- 作答空白與互動區 -->
                            ${frontUnderlineHTML}
                            ${interactiveControlHTML}
                            
                            <!-- 題目文字 -->
                            <div class="text-xs sm:text-sm font-bold text-slate-700 leading-relaxed print:text-black">
                                ${finalQuestionHTML}
                            </div>
                        </div>
                        ${mcqDropdownHTML}
                        ${noteHTML}
                    </div>
                `;
            });

            return html;
        }

        // ==========================================
        // 判別生理性別以渲染黑白高辨識度 SVG 標誌
        // ==========================================
        function getGender(name, relation) {
            const femaleKeywords = ["Mother", "Grandmother", "Daughter", "Aunt", "Sister", "Wife", "Girl"];
            if (femaleKeywords.some(kw => relation.includes(kw))) return "female";
            
            const females = ["Mary", "Amy", "Lisa", "Lily", "Rose", "Helen", "Emma", "Lucy", "Judith", "Heather"];
            if (females.includes(name)) return "female";
            
            return "male";
        }

        // ==========================================
        // 繪製家庭樹 SVG 向量圖系統
        // ==========================================
        function drawFamilyTree(lvlId) {
            const data = levelsData[lvlId];
            const container = document.getElementById(`tree-svg-container-${lvlId}`);
            if (!container) return;

            let svgHTML = '';

            if (data.model === "A") {
                svgHTML = `
                    <svg viewBox="0 0 400 240" class="w-full h-auto" xmlns="http://www.w3.org/2000/svg">
                        <path d="M 120 60 L 280 60" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" />
                        <path d="M 200 60 L 200 125" stroke="#94A3B8" stroke-width="3" />
                        <path d="M 120 125 L 280 125" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" />
                        <path d="M 120 125 L 120 170" stroke="#94A3B8" stroke-width="3" />
                        <path d="M 280 125 L 280 170" stroke="#94A3B8" stroke-width="3" />

                        ${renderNodeSVG(120, 60, data.roles.father, "👔 Father", lvlId)}
                        ${renderNodeSVG(280, 60, data.roles.mother, "👚 Mother", lvlId)}
                        ${renderNodeSVG(120, 180, data.roles.son, "👦 Son", lvlId)}
                        ${renderNodeSVG(280, 180, data.roles.daughter, "👧 Daughter", lvlId)}
                    </svg>
                `;
            } else if (data.model === "B") {
                svgHTML = `
                    <svg viewBox="0 0 400 320" class="w-full h-auto" xmlns="http://www.w3.org/2000/svg">
                        <path d="M 120 50 L 280 50" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" />
                        <path d="M 200 50 L 200 110" stroke="#94A3B8" stroke-width="3" />
                        <path d="M 120 110 L 200 110" stroke="#94A3B8" stroke-width="3" />
                        <path d="M 120 110 L 120 150" stroke="#94A3B8" stroke-width="3" />
                        
                        <path d="M 120 160 L 280 160" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" />
                        <path d="M 200 160 L 200 250" stroke="#94A3B8" stroke-width="3" />

                        ${renderNodeSVG(120, 50, data.roles.grandfather, "👴 Grandfather", lvlId)}
                        ${renderNodeSVG(280, 50, data.roles.grandmother, "👵 Grandmother", lvlId)}
                        ${renderNodeSVG(120, 160, data.roles.father, "👔 Father", lvlId)}
                        ${renderNodeSVG(280, 160, data.roles.mother, "👚 Mother", lvlId)}
                        ${renderNodeSVG(200, 260, data.roles.son, "👦 Children", lvlId)}
                    </svg>
                `;
            } else if (data.model === "C") {
                svgHTML = `
                    <svg viewBox="0 0 460 330" class="w-full h-auto" xmlns="http://www.w3.org/2000/svg">
                        <path d="M 180 45 L 300 45" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" />
                        <path d="M 240 45 L 240 95" stroke="#94A3B8" stroke-width="3" />
                        <path d="M 120 95 L 360 95" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" />
                        
                        <path d="M 120 95 L 120 145" stroke="#94A3B8" stroke-width="3" />
                        <path d="M 360 95 L 360 145" stroke="#94A3B8" stroke-width="3" />
                        
                        <path d="M 120 145 L 220 145" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" />
                        <path d="M 170 145 L 170 210" stroke="#94A3B8" stroke-width="3" />
                        <path d="M 90 210 L 250 210" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" />
                        <path d="M 90 210 L 90 250" stroke="#94A3B8" stroke-width="3" />
                        <path d="M 250 210 L 250 250" stroke="#94A3B8" stroke-width="3" />
                        
                        <path d="M 360 145 L 360 250" stroke="#94A3B8" stroke-width="3" />

                        ${renderNodeSVG(180, 45, data.roles.grandfather, "👴 Grandfather", lvlId)}
                        ${renderNodeSVG(300, 45, data.roles.grandmother, "👵 Grandmother", lvlId)}
                        ${renderNodeSVG(120, 145, data.roles.father, "👔 Father", lvlId)}
                        ${renderNodeSVG(220, 145, data.roles.mother, "👚 Mother", lvlId)}
                        ${renderNodeSVG(360, 145, data.roles.uncle, "👤 Uncle/Aunt", lvlId)}
                        ${renderNodeSVG(90, 260, data.roles.son, "👦 Son", lvlId)}
                        ${renderNodeSVG(250, 260, data.roles.daughter, "👧 Daughter", lvlId)}
                        ${renderNodeSVG(360, 260, data.roles.cousin, "🧒 Cousin", lvlId)}
                    </svg>
                `;
            }

            container.innerHTML = svgHTML;
        }

        // 渲染單個高對比男女廁所圖示與生物符號 (大幅拉大人像路徑，黑白印出保證極高區隔性)
        function renderNodeSVG(cx, cy, name, relation, lvlId) {
            const gender = getGender(name, relation);
            
            // 橘色和紫色高對比色系
            const bgFill = (gender === "female") ? "#F97316" : "#8B5CF6"; 
            
            let frameSVG = '';
            let toiletFigureSVG = '';
            let sexSymbolSVG = '';

            if (gender === "female") {
                // 女生：亮橘色正圓形外框 + 大裙子人像 + ♀ 符號
                frameSVG = `<circle cx="${cx}" cy="${cy}" r="21" fill="${bgFill}" stroke="#090d16" stroke-width="2.5" />`;
                
                // 拉大比例的裙子路徑
                toiletFigureSVG = `
                    <circle cx="${cx - 4}" cy="${cy - 8}" r="4.5" fill="white" />
                    <path d="M ${cx - 4} cy-1 L ${cx - 9.5} ${cy + 10} h 11 L ${cx + 1.5} ${cy - 1.5} z" fill="white" />
                    <rect x="${cx - 5.5}" y="${cy + 10}" width="1.2" height="6.5" fill="white" rx="0.5" />
                    <rect x="${cx - 1.5}" y="${cy + 10}" width="1.2" height="6.5" fill="white" rx="0.5" />
                `;
                
                // 生物學雌性符號 ♀ (置於右側)
                sexSymbolSVG = `
                    <circle cx="${cx + 11}" cy="${cy + 2}" r="3" stroke="white" stroke-width="1.5" fill="none" />
                    <path d="M ${cx + 11} ${cy + 5} v 6.5 m -2.5 -3.5 h 5" stroke="white" stroke-width="1.5" stroke-linecap="round" />
                `;
            } else {
                // 男生：深紫色圓角正方形外框 + 大褲子人像 + ♂ 符號
                frameSVG = `<rect x="${cx - 21}" y="${cy - 21}" width="42" height="42" rx="7" fill="${bgFill}" stroke="#090d16" stroke-width="2.5" />`;
                
                // 拉大比例的褲子路徑
                toiletFigureSVG = `
                    <circle cx="${cx - 4}" cy="${cy - 8}" r="4.5" fill="white" />
                    <path d="M ${cx - 8.5} ${cy - 1.5} h 9 v 11 h -1.8 v 7 h -1.8 v -7 h -1.8 v 7 h -1.8 v -7 h -1.8 z" fill="white" />
                `;
                
                // 生物學雄性符號 ♂ (置於右側)
                sexSymbolSVG = `
                    <circle cx="${cx + 10}" cy="${cy + 6}" r="3" stroke="white" stroke-width="1.5" fill="none" />
                    <path d="M ${cx + 12} ${cy + 4} l 4.5 -4.5 m -3.5 0 h 3.5 v 3.5" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none" />
                `;
            }

            return `
                <g id="node-${lvlId}-${name}" class="cursor-pointer transition-all duration-300 transform origin-center hover:scale-105">
                    ${frameSVG}
                    ${toiletFigureSVG}
                    ${sexSymbolSVG}

                    <!-- 角色名字高對比標籤 -->
                    <rect x="${cx - 30}" y="${cy + 25}" width="60" height="18" rx="4" fill="#1e293b" stroke="#ffffff" stroke-width="1.5" />
                    <text x="${cx}" y="${cy + 37}" font-family="Noto Sans TC" font-size="9" font-weight="900" fill="#ffffff" text-anchor="middle">
                        ${name}
                    </text>
                </g>
            `;
        }

        // ==========================================
        // 點選與互動答題核心邏輯
        // ==========================================
        
        // 語音播報 (TTS) 直接與英文文本綁定
        function speakText(text) {
            // 清理掉橫線符號，讓語音流暢讀出 "blank"
            let cleanText = text.replace(/_______/g, "blank").replace(/______/g, "blank").replace(/____/g, "blank");
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'en-US';
            utterance.rate = 0.8; // 稍微放慢語速，利於特教與資源班學生理解
            
            window.speechSynthesis.cancel(); // 清空正在播放的語音
            window.speechSynthesis.speak(utterance);
        }

        // 選擇題：切換選項展開狀態
        function toggleMCQOptions(lvlId, qIdx) {
            const key = `${lvlId}-${qIdx}`;
            if (activeMCQKey === key) {
                activeMCQKey = null;
            } else {
                activeMCQKey = key;
            }
            renderAllLevels();
        }

        // 點選答案 (是非與選擇)
        function selectAnswer(lvlId, qIdx, value) {
            userAnswers[lvlId][currentMode][qIdx] = value;
            activeMCQKey = null; // 收合選擇題選項
            
            // 局部渲染該關卡的題目區，防止卡頓
            const qListContainer = document.getElementById(`questions-list-${lvlId}`);
            qListContainer.innerHTML = renderQuestionsHTML(lvlId);
        }

        // 填空配對：高亮選取的空格並喚醒底部字彙池
        function highlightBlank(lvlId, qIdx) {
            selectedBlankKey = `${lvlId}-${qIdx}`;
            
            const qListContainer = document.getElementById(`questions-list-${lvlId}`);
            qListContainer.innerHTML = renderQuestionsHTML(lvlId);
            renderVocabPool();
        }

        // 渲染底部浮動字彙池
        function renderVocabPool() {
            const container = document.getElementById('vocab-buttons');
            if (!container) return;

            const words = [
                "father", "mother", "brother", "sister", "son", "daughter", 
                "husband", "wife", "grandfather", "grandmother", "grandson", 
                "granddaughter", "uncle", "aunt", "cousin", "parents", "children"
            ];

            container.innerHTML = words.map(word => `
                <button onclick="fillWordToSelected('${word}')" class="bg-slate-800 hover:bg-slate-700 active:bg-indigo-600 text-slate-100 font-extrabold px-3 py-2 rounded-xl border border-slate-700 transition-all text-xs sm:text-sm tracking-wide uppercase">
                    ${word}
                </button>
            `).join('');
        }

        // 字彙填入已選空格
        function fillWordToSelected(word) {
            if (!selectedBlankKey) {
                showModal("💡 操作提示", "請先點擊上方題目中句尾的橫線 [ ______ ]，再點點看我幫你填入喔！", "📝");
                return;
            }

            const [lvlId, qIdxStr] = selectedBlankKey.split('-');
            const qIdx = parseInt(qIdxStr);

            userAnswers[lvlId]['fill'][qIdx] = word;
            selectedBlankKey = null; // 清除選取狀態

            const qListContainer = document.getElementById(`questions-list-${lvlId}`);
            qListContainer.innerHTML = renderQuestionsHTML(lvlId);
            renderVocabPool();
        }

        // 清除選取的填空
        function clearSelectedBlank() {
            selectedBlankKey = null;
            renderAllLevels();
        }

        // ==========================================
        // 獨立三劍客按鈕事件 (提示、批改、解答)
        // ==========================================

        // 1. 提示 (Hint) - 閃爍當前家庭樹上所有角色
        function triggerHint(lvlId) {
            const data = levelsData[lvlId];
            const rolesObj = data.roles;
            
            Object.values(rolesObj).forEach(name => {
                const element = document.getElementById(`node-${lvlId}-${name}`);
                if (element) {
                    element.classList.add('animate-bounce');
                    setTimeout(() => {
                        element.classList.remove('animate-bounce');
                    }, 3000);
                }
            });

            showModal("💡 提示啟動", `看清楚左邊家庭樹上的連線！<br><b class="text-indigo-600">圓圈 (♀) 代表女生角色，方框 (♂) 代表男生角色。</b>`, "🌟");
        }

        // 2. 獨立批改 (Check)
        function checkAnswers(lvlId) {
            const data = levelsData[lvlId];
            const qList = data.questions[currentMode];
            const answers = userAnswers[lvlId][currentMode];

            let correctCount = 0;
            let unansweredCount = 0;

            qList.forEach((qObj, idx) => {
                const userAns = answers[idx];
                const realAns = qObj.a;
                const rowElement = document.getElementById(`qrow-${lvlId}-${idx}`);

                if (!userAns || userAns === "") {
                    unansweredCount++;
                    rowElement.className = "flex flex-col border-b border-slate-100/50 pb-1.5 last:border-none";
                } else if (userAns.toLowerCase().trim() === realAns.toLowerCase().trim()) {
                    correctCount++;
                    rowElement.className = "flex flex-col border border-emerald-200 bg-emerald-50/50 p-1.5 rounded-xl mb-1 transition-all duration-300 glow-correct";
                } else {
                    rowElement.className = "flex flex-col border border-rose-200 bg-rose-50/50 p-1.5 rounded-xl mb-1 transition-all duration-300 glow-incorrect";
                }
            });

            if (unansweredCount > 0) {
                showModal("✏️ 還沒寫完", `這一關還有 ${unansweredCount} 題沒有填答。請組員再確認看看！`, "⚠️");
            } else if (correctCount === 5) {
                showModal("🏆 太厲害了！", `太強了！本關 5 題全部答對，這組同學拿到了 100 滿分！`, "🎉");
            } else {
                showModal("📢 加油加油", `作答完畢！答對了 ${correctCount} 題。可以點擊右側的「🔑 解答」來學習正確答案與解析。`, "💪");
            }
        }

        // 3. 獨立解答 (Answer Key) - 動態批改填入並顯示中文解析
        function toggleAnswerKey(lvlId) {
            const data = levelsData[lvlId];
            const qList = data.questions[currentMode];
            const btn = document.getElementById(`btn-ans-${lvlId}`);

            const isRevealed = btn.classList.contains('bg-rose-600');

            qList.forEach((qObj, idx) => {
                const noteElement = document.getElementById(`note-${lvlId}-${idx}`);
                
                if (noteElement) {
                    if (!isRevealed) {
                        noteElement.classList.remove('hidden');
                        
                        if (currentMode === 'tf') {
                            const optBtn = document.getElementById(`opt-${lvlId}-${idx}-${qObj.a}`);
                            if (optBtn) optBtn.classList.add('ring-4', 'ring-emerald-400');
                        } else if (currentMode === 'mcq') {
                            // MCQ 如果處於未選，點選解答直接高亮
                            userAnswers[lvlId][currentMode][idx] = qObj.a;
                        } else if (currentMode === 'fill') {
                            userAnswers[lvlId][currentMode][idx] = qObj.a;
                        }
                    } else {
                        noteElement.classList.add('hidden');
                        
                        if (currentMode === 'tf') {
                            ['O', 'X'].forEach(o => {
                                const optBtn = document.getElementById(`opt-${lvlId}-${idx}-${o}`);
                                if (optBtn) optBtn.classList.remove('ring-4', 'ring-emerald-400');
                            });
                        } else if (currentMode === 'mcq' || currentMode === 'fill') {
                            userAnswers[lvlId][currentMode][idx] = "";
                        }
                    }
                }
            });

            if (!isRevealed) {
                btn.className = "bg-rose-600 hover:bg-rose-500 border border-rose-700 text-white font-bold px-2 py-0.5 rounded-lg text-[10px] sm:text-xs flex items-center gap-0.5";
                btn.innerHTML = `<i class="fa-solid fa-eye-slash"></i> 隱藏`;
            } else {
                btn.className = "bg-slate-100 hover:bg-slate-200 border border-slate-300 text-slate-700 font-bold px-2 py-0.5 rounded-lg text-[10px] sm:text-xs flex items-center gap-0.5";
                btn.innerHTML = `<i class="fa-solid fa-key"></i> 解答`;
            }

            renderAllLevels();
        }

        // ==========================================
        // 自訂對話視窗元件 (取代 Alert/Confirm)
        // ==========================================
        function showModal(title, text, iconEmoji) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerHTML = text;
            document.getElementById('modal-icon').innerText = iconEmoji;
            
            const modal = document.getElementById('custom-modal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('modal-content').classList.remove('scale-95');
                document.getElementById('modal-content').classList.add('scale-100');
            }, 50);
        }

        function closeModal() {
            document.getElementById('modal-content').classList.remove('scale-100');
            document.getElementById('modal-content').classList.add('scale-95');
            setTimeout(() => {
                document.getElementById('custom-modal').classList.add('hidden');
            }, 150);
        }
    </script>
</body>
</html>
