    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
            -webkit-user-select: none;
            user-select: none;
        }
        .bubble-font {
            font-family: 'Fredoka', 'Noto Sans TC', sans-serif;
        }
        
        /* 螢幕上隱藏列印專用表頭 */
        .print-only-header {
            display: none;
        }

        /* 答對答錯亮燈與網頁邊框樣式 */
        .glow-correct {
            border-color: #22c55e !important;
            background-color: #f0fdf4 !important;
        }
        .glow-incorrect {
            border-color: #ef4444 !important;
            background-color: #fef2f2 !important;
        }

        /* ------------------ 列印樣式 (A4 雙欄左右並排，一頁兩關) ------------------ */
        @media print {
            @page {
                size: A4 portrait;
                margin: 0.8cm 1cm;
            }
            body {
                background-color: white !important;
                color: black !important;
                font-size: 11pt;
            }
            .no-print {
                display: none !important;
            }
            .print-only-header {
                display: block !important;
            }
            .level-card {
                box-shadow: none !important;
                border: none !important;
                background: transparent !important;
                margin: 0 !important;
                padding: 0 !important;
                page-break-inside: avoid !important;
            }
            /* 強制雙欄絕對左右並排 (左邊 32% 圖片，右邊 68% 題目) */
            .grid-cols-custom {
                display: grid !important;
                grid-template-columns: 32% 68% !important;
                gap: 1.5rem !important;
                align-items: center !important;
            }
            /* 每兩關強迫換一頁 */
            .print-page-wrapper {
                page-break-after: always !important;
                display: block !important;
            }
            svg {
                max-width: 100% !important;
                height: auto !important;
            }
            /* 列印底槓樣式 */
            .print-underline-short {
                border-bottom: 2px solid #000000 !important;
                width: 2.2rem !important;
                display: inline-block !important;
                height: 1.2rem;
                text-align: center;
                font-weight: bold;
            }
            .print-underline-long {
                border-bottom: 2px solid #000000 !important;
                width: 10rem !important;
                display: inline-block !important;
                height: 1.2rem;
                text-align: center;
                font-weight: bold;
            }
            .print-note {
                display: block !important;
                color: #334155 !important;
                font-size: 9.5pt !important;
                margin-top: 2px !important;
                padding-left: 2.5rem !important;
            }
        }
    </style>

        let currentMode = 'tf';
        let userAnswers = {};
        let selectedBlankKey = null; // 綁定 "關卡編號-題目索引"
        let globalTeacherAnswerMode = false; // 是否一鍵開啟教師版列印解答

        // 監聽鍵盤快捷，避免誤觸
        window.onload = function() {
            initAnswersState();
            renderAllLevels();
            renderVocabPool();
        };

        function initAnswersState() {
            Object.keys(levelsData).forEach(lvlId => {
                userAnswers[lvlId] = { tf: Array(5).fill(null), mcq: Array(5).fill(null), fill: Array(5).fill("") };
            });
        }

        // 一鍵切換全域教師版解答列印
        function toggleTeacherVersionGlobal() {
            globalTeacherAnswerMode = !globalTeacherAnswerMode;
            const btn = document.getElementById('btn-teacher-global');
            
            if (globalTeacherAnswerMode) {
                btn.className = "bg-amber-500 hover:bg-amber-400 text-slate-900 font-bold px-2 py-1 rounded-lg text-[11px] sm:text-xs flex items-center gap-1 border-2 border-slate-950 shadow-md";
                btn.querySelector('span').innerText = "解答版已開啟";
                
                // 強制將所有後台真實答案填入網頁顯示
                Object.keys(levelsData).forEach(lvlId => {
                    const data = levelsData[lvlId];
                    data.questions[currentMode].forEach((q, idx) => {
                        userAnswers[lvlId][currentMode][idx] = q.a;
                    });
                });
            } else {
                btn.className = "bg-slate-700 hover:bg-slate-600 text-amber-400 font-bold px-2 py-1 rounded-lg text-[11px] sm:text-xs flex items-center gap-1 border border-amber-400/30";
                btn.querySelector('span').innerText = "切換解答版";
                initAnswersState();
            }
            renderAllLevels();
        }

        function switchMode(mode) {
            currentMode = mode;
            selectedBlankKey = null;
            if (globalTeacherAnswerMode) {
                // 如果開啟了解答版，切換模式時也要自動填滿答案
                Object.keys(levelsData).forEach(lvlId => {
                    levelsData[lvlId].questions[currentMode].forEach((q, idx) => {
                        userAnswers[lvlId][currentMode][idx] = q.a;
                    });
                });
            }
            
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.className = "mode-btn px-3 py-1 rounded-md font-bold transition-all text-[11px] sm:text-xs flex items-center gap-1 text-slate-400 hover:text-white";
            });
            document.getElementById(`btn-mode-${mode}`).className = "mode-btn px-3 py-1 rounded-md font-bold transition-all text-[11px] sm:text-xs flex items-center gap-1 bg-indigo-600 text-white";

            renderAllLevels();
            document.getElementById('fill-word-pool').className = (mode === 'fill') ? "fixed bottom-0 left-0 w-full bg-slate-900 border-t-2 border-slate-950 py-2.5 px-3 shadow-2xl z-40 no-print" : "hidden";
        }

        function renderAllLevels() {
            const container = document.getElementById('levels-container');
            container.innerHTML = '';
            const levelKeys = Object.keys(levelsData);
            
            for (let i = 0; i < levelKeys.length; i += 2) {
                const pageWrapper = document.createElement('div');
                pageWrapper.className = "print-page-wrapper space-y-6 print:space-y-0 print:py-2";
                
                const titleText = currentMode === 'tf' ? '（是非題篇）' : currentMode === 'mcq' ? '（選擇題篇）' : '（填空配對篇）';
                pageWrapper.innerHTML = `
                    <div class="print-only-header w-full border-b-4 border-slate-900 pb-1.5 mb-4">
                        <div class="flex justify-between items-end">
                            <span class="text-xl font-black text-slate-900 tracking-wide">英文科講義—家庭樹${titleText}${globalTeacherAnswerMode ? ' <教師解答版>' : ''}</span>
                            <div class="flex gap-6 text-sm font-extrabold text-slate-900">
                                <div>班級：<span class="border-b-2 border-slate-900 w-24 inline-block"></span></div>
                                <div>姓名：<span class="border-b-2 border-slate-900 w-32 inline-block"></span></div>
                            </div>
                        </div>
                    </div>
                `;

                pageWrapper.appendChild(createLevelCard(levelKeys[i]));
                if (i + 1 < levelKeys.length) {
                    pageWrapper.appendChild(createLevelCard(levelKeys[i + 1]));
                }
                container.appendChild(pageWrapper);
            }

            levelKeys.forEach(lvlId => { drawFamilyTree(lvlId); });
        }

        function createLevelCard(lvlId) {
            const data = levelsData[lvlId];
            const card = document.createElement('div');
            card.className = "level-card bg-white rounded-2xl border-2 border-slate-200 shadow-sm p-4 print:p-0 print:my-2 transition-all duration-300";
            
            // 是否處於單獨開啟解答狀態
            const isLocalAnsRevealed = document.getElementById(`btn-ans-${lvlId}`)?.classList.contains('bg-rose-600') || globalTeacherAnswerMode;

            card.innerHTML = `
                <div class="flex items-center justify-between border-b-2 border-slate-100 pb-1.5 mb-3 print:pb-1 print:mb-1.5">
                    <span class="bubble-font text-xs sm:text-sm font-black text-slate-900 print:text-black">${data.name}</span>

                        <button onclick="toggleAnswerKey('${lvlId}')" id="btn-ans-${lvlId}" class="${isLocalAnsRevealed ? 'bg-rose-600 border-rose-700 text-white' : 'bg-slate-100 border-slate-300 text-slate-700'} border font-bold px-2 py-0.5 rounded-lg text-[10px] sm:text-xs flex items-center gap-0.5">

            return card;
        }

        function renderQuestionsHTML(lvlId, isAnsRevealed) {
            const data = levelsData[lvlId];
            const qList = data.questions[currentMode];
            let html = '';

            qList.forEach((qObj, idx) => {
                const qNum = idx + 1;
                const savedAns = userAnswers[lvlId][currentMode][idx];

                let frontUnderlineHTML = ''; // 前方極短作答底槓
                let interactiveControlHTML = ''; // 網頁版並排按鈕區
                let printOptionsSuffixHTML = ''; // 選擇題句尾列印選項

                if (currentMode === 'tf') {
                    // 是非題：列印版前方留一格填入正解
                    const tfPrintText = globalTeacherAnswerMode ? qObj.a : "";
                    frontUnderlineHTML = `<div class="print-underline-short print-only-blank mr-2">${tfPrintText}</div>`;
                    interactiveControlHTML = `
                        <div class="flex gap-1 mr-3 no-print shrink-0">
                            <button onclick="selectAnswer('${lvlId}', ${idx}, 'O')" class="w-8 h-7 rounded-md font-bold border-2 ${savedAns === 'O' ? 'bg-emerald-500 border-slate-900 text-white scale-105' : 'bg-slate-100 border-slate-200 text-slate-700 hover:bg-slate-200'}" id="opt-${lvlId}-${idx}-O">O</button>
                            <button onclick="selectAnswer('${lvlId}', ${idx}, 'X')" class="w-8 h-7 rounded-md font-bold border-2 ${savedAns === 'X' ? 'bg-rose-500 border-slate-900 text-white scale-105' : 'bg-slate-100 border-slate-200 text-slate-700 hover:bg-slate-200'}" id="opt-${lvlId}-${idx}-X">X</button>
                        </div>
                    `;
                } else if (currentMode === 'mcq') {
                    // 選擇題：列印版前方留一格填入正解
                    const mcqPrintText = globalTeacherAnswerMode ? qObj.a : "";
                    frontUnderlineHTML = `<div class="print-underline-short print-only-blank mr-2">${mcqPrintText}</div>`;
                    
                    // 下置選項在同一行水平橫向排開
                    interactiveControlHTML = `
                        <div class="flex gap-1.5 mr-3 no-print shrink-0">
                            ${['A', 'B', 'C'].map(letter => `
                                <button onclick="selectAnswer('${lvlId}', ${idx}, '${letter}')" class="w-7 h-7 rounded-md font-bold border-2 text-[11px] ${savedAns === letter ? 'bg-indigo-600 border-slate-900 text-white scale-105' : 'bg-slate-100 border-slate-200 text-slate-700 hover:bg-slate-200'}">
                                    ${letter}
                                </button>
                            `).join('')}
                        </div>
                    `;
                    printOptionsSuffixHTML = `<span class="print-only-blank text-[10px] font-bold text-slate-800 ml-3">(A) ${qObj.options[0]} &nbsp; (B) ${qObj.options[1]} &nbsp; (C) ${qObj.options[2]}</span>`;
                }

                let finalQuestionHTML = '';
                if (currentMode === 'fill') {
                    // 填空配對：前方不加框，句尾長實線填詞
                    const isSelected = selectedBlankKey === `${lvlId}-${idx}`;
                    const displayText = savedAns ? savedAns : "__________________";
                    const fillPrintText = globalTeacherAnswerMode ? qObj.a : "";

                    finalQuestionHTML = `
                        <span onclick="speakText('${qObj.q}')" class="cursor-pointer hover:text-indigo-600 transition-colors">
                            ${qNum}. ${qObj.q.replace(/_______/g, "").replace(/______/g, "")}

                        <button onclick="highlightBlank('${lvlId}', ${idx})" class="border-b-2 border-slate-900 font-extrabold px-3 min-w-[6.5rem] text-xs text-center ${isSelected ? 'border-amber-500 text-amber-600 bg-amber-50 rounded' : savedAns ? 'text-indigo-700' : 'text-slate-300'} no-print">

                        <div class="print-underline-long print-only-blank ml-1">${fillPrintText}</div>
                    `;
                } else {
                    finalQuestionHTML = `
                        <span onclick="speakText('${qObj.q}')" class="cursor-pointer hover:text-indigo-600 transition-colors">
                            ${qNum}. ${qObj.q}
                        </span>
                        ${printOptionsSuffixHTML}
                    `;
                }

                // 當點擊解答或開啟解答版時，解析會一併彈出
                const noteHTML = (qObj.note && isAnsRevealed) ? `
                    <div id="note-${lvlId}-${idx}" class="text-[10px] text-slate-500 bg-slate-50 p-1 rounded-md mt-0.5 print-note">

                ` : '';

                html += `
                    <div class="flex flex-col border-b border-slate-100/60 pb-1 last:border-none" id="qrow-${lvlId}-${idx}">
                        <div class="flex items-center">

                                ${finalQuestionHTML}
                            </div>
                        </div>
                        ${noteHTML}
                    </div>
                `;
            });

            return html;
        }

        function getGender(name, relation) {
            const femaleKeywords = ["Mother", "Grandmother", "Daughter", "Aunt", "Sister", "Wife", "Girl"];
            if (femaleKeywords.some(kw => relation.includes(kw))) return "female";
            return ["Mary", "Amy", "Lisa", "Lily", "Rose", "Helen", "Emma", "Lucy", "Judith", "Heather"].includes(name) ? "female" : "male";
        }

                    <svg viewBox="0 0 400 320" class="w-full h-auto" xmlns="http://www.w3.org/2000/svg">
                        <path d="M 120 50 L 280 50" stroke="#94A3B8" stroke-width="2.5" />
                        <path d="M 200 50 L 200 110" stroke="#94A3B8" stroke-width="2.5" />
                        <path d="M 120 110 L 200 110" stroke="#94A3B8" stroke-width="2.5" />
                        <path d="M 120 110 L 120 150" stroke="#94A3B8" stroke-width="2.5" />
                        <path d="M 120 160 L 280 160" stroke="#94A3B8" stroke-width="2.5" />
                        <path d="M 200 160 L 200 250" stroke="#94A3B8" stroke-width="2.5" />
                        ${renderNodeSVG(120, 50, data.roles.grandfather, "Grandfather", lvlId)}
                        ${renderNodeSVG(280, 50, data.roles.grandmother, "Grandmother", lvlId)}
                        ${renderNodeSVG(120, 160, data.roles.father, "Father", lvlId)}
                        ${renderNodeSVG(280, 160, data.roles.mother, "Mother", lvlId)}
                        ${renderNodeSVG(200, 260, data.roles.son, "Son", lvlId)}
                    </svg>
                `;
            } else if (data.model === "C") {
                svgHTML = `
                    <svg viewBox="0 0 460 330" class="w-full h-auto" xmlns="http://www.w3.org/2000/svg">
                        <path d="M 180 45 L 300 45" stroke="#94A3B8" stroke-width="2.5" />
                        <path d="M 240 45 L 240 95" stroke="#94A3B8" stroke-width="2.5" />
                        <path d="M 120 95 L 360 95" stroke="#94A3B8" stroke-width="2.5" />
                        <path d="M 120 95 L 120 145" stroke="#94A3B8" stroke-width="2.5" />
                        <path d="M 360 95 L 360 145" stroke="#94A3B8" stroke-width="2.5" />
                        <path d="M 120 145 L 220 145" stroke="#94A3B8" stroke-width="2.5" />
                        <path d="M 170 145 L 170 210" stroke="#94A3B8" stroke-width="2.5" />
                        <path d="M 90 210 L 250 210" stroke="#94A3B8" stroke-width="2.5" />
                        <path d="M 90 210 L 90 250" stroke="#94A3B8" stroke-width="2.5" />
                        <path d="M 250 210 L 250 250" stroke="#94A3B8" stroke-width="2.5" />
                        <path d="M 360 145 L 360 250" stroke="#94A3B8" stroke-width="2.5" />
                        ${renderNodeSVG(180, 45, data.roles.grandfather, "Grandfather", lvlId)}
                        ${renderNodeSVG(300, 45, data.roles.grandmother, "Grandmother", lvlId)}
                        ${renderNodeSVG(120, 145, data.roles.father, "Father", lvlId)}
                        ${renderNodeSVG(220, 145, data.roles.mother, "Mother", lvlId)}
                        ${renderNodeSVG(360, 145, data.roles.uncle, "Uncle", lvlId)}
                        ${renderNodeSVG(90, 260, data.roles.son, "Son", lvlId)}
                        ${renderNodeSVG(250, 260, data.roles.daughter, "Daughter", lvlId)}
                        ${renderNodeSVG(360, 260, data.roles.cousin, "Cousin", lvlId)}
                    </svg>
                `;
            }
            container.innerHTML = svgHTML;
        }

        function renderNodeSVG(cx, cy, name, relation, lvlId) {
            const gender = getGender(name, relation);
            const bgFill = (gender === "female") ? "#F97316" : "#8B5CF6"; 
            
            let frameSVG = '';
            let toiletFigureSVG = '';

            if (gender === "female") {
                // 女生：正圓形外框 + 圓形頭與大正三角形 △ 身體反白
                frameSVG = `<circle cx="${cx}" cy="${cy}" r="21" fill="${bgFill}" stroke="#000000" stroke-width="2" />`;
                toiletFigureSVG = `
                    <circle cx="${cx}" cy="${cy - 8}" r="4.5" fill="white" />
                    <polygon points="${cx},${cy-2.5} ${cx-8.5},${cy+11} ${cx+8.5},${cy+11}" fill="white" />
                `;
            } else {
                // 男生：圓角正方形外框 + 圓形頭與大倒三角形 ▽ 身體反白
                frameSVG = `<rect x="${cx - 21}" y="${cy - 21}" width="42" height="42" rx="6" fill="${bgFill}" stroke="#000000" stroke-width="2" />`;
                toiletFigureSVG = `
                    <circle cx="${cx}" cy="${cy - 8}" r="4.5" fill="white" />
                    <polygon points="${cx-8},${cy-2} ${cx+8},${cy-2} ${cx},${cy+11.5}" fill="white" />
                `;
            }

            return `
                <g id="node-${lvlId}-${name}">
                    ${frameSVG}
                    ${toiletFigureSVG}
                    <!-- 名字改為白底黑字加外框、字體加粗放大 -->
                    <rect x="${cx - 28}" y="${cy + 25}" width="56" height="17" rx="3" fill="#FFFFFF" stroke="#000000" stroke-width="2" />
                    <text x="${cx}" y="${cy + 37}" font-family="Noto Sans TC" font-size="10.5" font-weight="900" fill="#000000" text-anchor="middle">
                        ${name}
                    </text>
                </g>
            `;
        }

        // 點英文任何地方即可觸發極速讀報 (TTS)
        function speakText(text) {
            let cleanText = text.replace(/_______/g, "blank").replace(/______/g, "blank");
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'en-US';
            utterance.rate = 0.75; // 放慢語速輔助資源班聆聽
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }

        function selectAnswer(lvlId, qIdx, value) {
            userAnswers[lvlId][currentMode][qIdx] = value;
            const qListContainer = document.getElementById(`questions-list-${lvlId}`);
            qListContainer.innerHTML = renderQuestionsHTML(lvlId, document.getElementById(`btn-ans-${lvlId}`)?.classList.contains('bg-rose-600') || globalTeacherAnswerMode);
        }

        function highlightBlank(lvlId, qIdx) {
            selectedBlankKey = `${lvlId}-${qIdx}`;
            const qListContainer = document.getElementById(`questions-list-${lvlId}`);
            qListContainer.innerHTML = renderQuestionsHTML(lvlId, document.getElementById(`btn-ans-${lvlId}`)?.classList.contains('bg-rose-600') || globalTeacherAnswerMode);
            renderVocabPool();
        }

        function renderVocabPool() {
            const container = document.getElementById('vocab-buttons');
            if (!container) return;
            const words = ["father", "mother", "brother", "sister", "son", "daughter", "husband", "wife", "grandfather", "grandmother", "grandson", "granddaughter", "uncle", "aunt", "cousin"];
            container.innerHTML = words.map(word => `<button onclick="fillWordToSelected('${word}')" class="bg-slate-800 hover:bg-slate-700 active:bg-indigo-600 text-white font-bold px-3 py-1.5 rounded-lg border border-slate-700 text-xs sm:text-sm tracking-wide lowercase">${word}</button>`).join('');
        }

        function fillWordToSelected(word) {
            if (!selectedBlankKey) return;
            const [lvlId, qIdxStr] = selectedBlankKey.split('-');
            userAnswers[lvlId]['fill'][parseInt(qIdxStr)] = word;
            selectedBlankKey = null;
            renderAllLevels();
            renderVocabPool();
        }

        function clearSelectedBlank() { selectedBlankKey = null; renderAllLevels(); }

        function checkAnswers(lvlId) {
            const qList = levelsData[lvlId].questions[currentMode];
            const answers = userAnswers[lvlId][currentMode];
            let correctCount = 0;

            qList.forEach((qObj, idx) => {
                const userAns = answers[idx];
                const rowElement = document.getElementById(`qrow-${lvlId}-${idx}`);
                if (userAns && userAns.toLowerCase().trim() === qObj.a.toLowerCase().trim()) {
                    correctCount++;
                    rowElement.className = "flex flex-col border p-1.5 rounded-xl mb-0.5 glow-correct";
                } else if (userAns) {
                    rowElement.className = "flex flex-col border p-1.5 rounded-xl mb-0.5 glow-incorrect";
                }
            });

            if (correctCount === 5) showModal("🏆 太完美了！", "本關 5 題全對！這組同學獲得 100 分滿分！", "🎉");
            else showModal("📢 批改完畢", `這關共答對了 ${correctCount} 題，加油！`, "💪");
        }

        // 獨立解答按鈕：一鍵填入真實解答並浮現中文解析
        function toggleAnswerKey(lvlId) {
            if (globalTeacherAnswerMode) return; // 全域模式下鎖定獨立按鈕
            
            const btn = document.getElementById(`btn-ans-${lvlId}`);
            const isRevealed = btn.classList.contains('bg-rose-600');
            
            if (!isRevealed) {
                // 填入寫死的正確答案
                levelsData[lvlId].questions[currentMode].forEach((q, idx) => {
                    userAnswers[lvlId][currentMode][idx] = q.a;
                });
                btn.className = "bg-rose-600 border-rose-700 text-white font-bold px-2 py-0.5 rounded-lg text-[10px] sm:text-xs flex items-center gap-0.5";
                btn.innerText = "隱藏";
            } else {
                // 淨空答案
                levelsData[lvlId].questions[currentMode].forEach((q, idx) => {
                    userAnswers[lvlId][currentMode][idx] = null;
                });
                btn.className = "bg-slate-100 border-slate-300 text-slate-700 font-bold px-2 py-0.5 rounded-lg text-[10px] sm:text-xs flex items-center gap-0.5";
                btn.innerText = "解答";
            }
            renderAllLevels();
        }

        function showModal(title, text, iconEmoji) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerHTML = text;
            document.getElementById('modal-icon').innerText = iconEmoji;
            document.getElementById('custom-modal').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('custom-modal').classList.add('hidden'); }
    </script>
</body>
</html>
