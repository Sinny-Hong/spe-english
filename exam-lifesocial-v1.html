        const preambleEl = document.getElementById('preamble-text'); const questionEl = document.getElementById('question-text'); const optionsEl = document.getElementById('options-list'); const selectEl = document.getElementById('question-select'); const voiceSelectEl = document.getElementById('voice-select'); const prevBtn = document.getElementById('prev-btn'); const nextBtn = document.getElementById('next-btn'); const replayBtn = document.getElementById('replay-btn'); const speedControl = document.getElementById('speed-control'); const speedValue = document.getElementById('speed-value'); const downloadBtn = document.getElementById('download-btn');
        function populateVoiceList() { voices = synth.getVoices().filter(v => v.lang.startsWith('zh')); voiceSelectEl.innerHTML = ''; if (!voices.length) { voiceSelectEl.appendChild(new Option('找不到中文語音', '')); return; } voices.forEach((v, i) => voiceSelectEl.appendChild(new Option(v.name, i))); let d = voices.findIndex(v => v.name.includes('Yating') && v.lang === 'zh-TW'); if (d === -1) d = voices.findIndex(v => v.name === 'Google 國語（臺灣）'); if (d === -1) d = 0; if (voices[d]) { utterance.voice = voices[d]; voiceSelectEl.selectedIndex = d; } }
        if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = populateVoiceList;
        function speak(text) { synth.cancel(); utterance.text = text; utterance.rate = parseFloat(speedControl.value); const sv = voiceSelectEl.value; if (voices[sv]) utterance.voice = voices[sv]; synth.speak(utterance); }
        function getTextToSpeak(index) { const q = questions[index]; let t = ""; if (q.preamble) { const f = (index === 0) || !questions[index - 1].preamble || (questions[index - 1].preamble !== q.preamble); if (f) t += `${q.preamble} ... 接著是題目 ... `; } t += q.question; if (q.options?.length) t += ` ... 選項有 ... ${q.options.join('... ')}`; return t; }
        function renderQuestion(index) { const q = questions[index]; if (q.preamble) { preambleEl.textContent = q.preamble; preambleEl.style.display = 'block'; } else { preambleEl.style.display = 'none'; } questionEl.textContent = q.question; optionsEl.innerHTML = ''; if(q.options?.length){ q.options.forEach(o => { const li = document.createElement('li'); li.textContent = o; li.className = 'option-item'; li.onclick = () => speak(o); optionsEl.appendChild(li); }); } prevBtn.disabled = index === 0; nextBtn.disabled = index === questions.length - 1; selectEl.value = index; }
        prevBtn.onclick = () => { synth.cancel(); if (currentQuestionIndex > 0) renderQuestion(--currentQuestionIndex); };
        nextBtn.onclick = () => { synth.cancel(); if (currentQuestionIndex < questions.length - 1) renderQuestion(++currentQuestionIndex); };
        replayBtn.onclick = () => speak(getTextToSpeak(currentQuestionIndex));
        selectEl.onchange = (e) => { synth.cancel(); currentQuestionIndex = parseInt(e.target.value, 10); renderQuestion(currentQuestionIndex); };
        voiceSelectEl.onchange = () => { if (voices[voiceSelectEl.value]) { utterance.voice = voices[voiceSelectEl.value]; speak(getTextToSpeak(currentQuestionIndex)); } };
        speedControl.oninput = (e) => { const s = parseFloat(e.target.value); utterance.rate = s; speedValue.textContent = `${s.toFixed(1)}x`; if (synth.speaking) speak(utterance.text); };
        downloadBtn.onclick = () => { const docClone = document.cloneNode(true); const blob = new Blob([docClone.documentElement.outerHTML], { type: 'text/html;charset=utf-8' }); const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = '社會適應能力報讀測驗.html'; link.click(); URL.revokeObjectURL(link.href); };
        function init() { selectEl.innerHTML = ''; let cs = "", cg = null; questions.forEach((q, i) => { if (q.section !== cs) { cs = q.section; cg = document.createElement('optgroup'); cg.label = cs; selectEl.appendChild(cg); } const o = new Option(q.displayId, i); if (cg) cg.appendChild(o); }); populateVoiceList(); if(questions.length > 0) renderQuestion(0); }
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
