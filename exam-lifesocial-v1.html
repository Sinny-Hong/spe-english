
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社會適應能力 - 互動式語音報讀教學網頁</title>
    <!-- 引入 Tailwind CSS 進行現代化視覺設計 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Google 字體與 Font Awesome 圖標 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0f4f8;
        }
        /* 答題正確的啵啵與閃爍動畫 */
        @keyframes correct-pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
        .correct-animate {
            animation: correct-pop 0.4s ease-in-out;
        }
        /* 煙火與得分彈出框特效 */
        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #ffd700;
            top: 0;
            opacity: 0;
            animation: fall 3s infinite ease-out;
        }
        @keyframes fall {
            0% { top: -10px; transform: translateX(0) rotate(0deg); opacity: 1; }
            100% { top: 100%; transform: translateX(100px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body class="min-height-screen flex flex-col justify-between text-slate-800 p-2 md:p-6">

    <div id="app-container" class="w-full max-w-5xl mx-auto bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden flex flex-col">
        <!-- 頂部導覽列與標題 -->
        <header class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white p-4 md:p-6 text-center shadow-md relative">
            <div class="absolute top-4 left-4 hidden md:flex items-center gap-2">
                <span class="bg-blue-500 text-white text-xs px-2 py-1 rounded-full font-bold">互動計分教學版</span>
            </div>
            <h1 class="text-xl md:text-3xl font-extrabold tracking-wide flex items-center justify-center gap-2">
                <i class="fa-solid fa-graduation-cap"></i> 高中職能力評估 - 社會適應能力
            </h1>
            <p class="text-sm md:text-base text-blue-100 mt-1 font-medium">全方位語音報讀 ‧ 互動式自主學習測驗系統</p>
        </header>

        <!-- 控制與設定區（可摺疊） -->
        <div class="bg-slate-50 border-b border-slate-200 p-4">
            <div class="flex flex-wrap items-center justify-between gap-4">
                <!-- 學習模式切換 -->
                <div class="flex items-center gap-2 bg-white p-1 rounded-lg shadow-sm border border-slate-200">
                    <button id="mode-study-btn" onclick="switchMode('study')" class="px-4 py-1.5 rounded-md font-bold text-sm transition-all duration-200 bg-blue-600 text-white shadow-sm">
                        <i class="fa-solid fa-book-open mr-1"></i> 即時學習模式
                    </button>
                    <button id="mode-test-btn" onclick="switchMode('test')" class="px-4 py-1.5 rounded-md font-bold text-sm transition-all duration-200 text-slate-600 hover:bg-slate-100">
                        <i class="fa-solid fa-file-signature mr-1"></i> 模擬測驗模式
                    </button>
                </div>

                <!-- 單元選擇與進度統計 -->
                <div class="flex items-center gap-2">
                    <label for="unit-select" class="font-bold text-slate-700 hidden sm:inline"><i class="fa-solid fa-cubes text-blue-500 mr-1"></i>選擇單元:</label>
                    <select id="unit-select" onchange="changeUnit(this.value)" class="bg-white border border-slate-300 rounded-lg px-3 py-1.5 font-bold text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <!-- 由 JS 動態產生十個單元 -->
                    </select>
                </div>

                <!-- 展開/收合語音控制按鈕 -->
                <button onclick="toggleVoicePanel()" class="text-sm font-bold text-blue-600 hover:text-blue-800 flex items-center gap-1">
                    <i class="fa-solid fa-sliders"></i> <span id="voice-panel-toggle-text">設定語音/語速</span>
                </button>
            </div>

            <!-- 語音控制面板 (預設展開，可收合) -->
            <div id="voice-settings-panel" class="mt-4 p-4 bg-white rounded-xl border border-slate-200 grid grid-cols-1 md:grid-cols-3 gap-4 transition-all duration-300">
                <div class="flex flex-col gap-1">
                    <label for="voice-select" class="text-sm font-bold text-slate-600"><i class="fa-solid fa-comment-dots mr-1 text-slate-400"></i>選擇唸讀聲音:</label>
                    <select id="voice-select" onchange="updateVoice()" class="bg-slate-50 border border-slate-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500"></select>
                </div>
                <div class="flex flex-col gap-1 justify-center">
                    <div class="flex justify-between items-center text-sm font-bold text-slate-600">
                        <span><i class="fa-solid fa-gauge-high mr-1 text-slate-400"></i>唸讀速度:</span>
                        <span id="speed-value" class="text-blue-600">0.9x</span>
                    </div>
                    <input id="speed-control" type="range" min="0.5" max="1.5" step="0.1" value="0.9" oninput="updateSpeed(this.value)" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                </div>
                <!-- 自動報讀與重新唸讀 -->
                <div class="flex items-center justify-around gap-2 pt-2 md:pt-0">
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="auto-read-toggle" checked class="sr-only peer">
                        <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                        <span class="ml-2 text-sm font-bold text-slate-600">下一題自動唸題目</span>
                    </label>
                </div>
            </div>
        </div>

        <!-- 單元進度與計分面板 -->
        <div class="bg-blue-50/50 p-4 border-b border-slate-200 flex flex-wrap items-center justify-between gap-3">
            <div class="flex items-center gap-3">
                <span class="bg-indigo-100 text-indigo-800 text-sm font-black px-3 py-1 rounded-lg" id="unit-title-display">
                    單元一 (第1~10題)
                </span>
                <span class="text-sm font-bold text-slate-500" id="progress-text">
                    進度: 1 / 10 題
                </span>
            </div>
            
            <!-- 進度小圓點指標 -->
            <div class="flex items-center gap-1.5" id="progress-dots-container">
                <!-- 10個點由 JS 動態生成 -->
            </div>

            <!-- 即時得分顯示 -->
            <div class="flex items-center gap-2">
                <span class="text-sm font-bold text-slate-600">目前分數:</span>
                <span id="current-score-display" class="text-2xl font-black text-emerald-600 bg-emerald-100 px-3 py-0.5 rounded-lg border border-emerald-200">0</span>
            </div>
        </div>

        <!-- 主作答與播放區 -->
        <main class="flex-grow p-4 md:p-8 flex flex-col justify-between min-h-[350px]">
            <!-- 題目區域 -->
            <div>
                <div class="flex items-start gap-4 mb-6">
                    <button id="replay-btn" onclick="speakCurrentQuestion()" class="bg-emerald-500 hover:bg-emerald-600 active:scale-95 text-white p-3 md:p-4 rounded-xl shadow-md flex items-center justify-center gap-2 flex-shrink-0 transition-all duration-150" title="唸出題目與選項">
                        <i class="fa-solid fa-volume-high text-xl md:text-2xl"></i>
                        <span class="text-sm font-bold hidden md:inline">報讀題目</span>
                    </button>
                    <div class="flex-grow">
                        <!-- 當前題目的前言（如果有） -->
                        <div id="preamble-text" class="hidden mb-3 p-3 bg-amber-50 border-l-4 border-amber-400 text-amber-900 rounded-r-lg font-medium text-sm md:text-base"></div>
                        <!-- 題目文字 -->
                        <h2 id="question-text" class="text-lg md:text-2xl font-bold leading-relaxed text-slate-800">
                            載入中...
                        </h2>
                    </div>
                </div>

                <!-- 選項清單 -->
                <div id="options-list" class="space-y-3 md:space-y-4">
                    <!-- 選項按鈕由 JS 動態生成 -->
                </div>
            </div>

            <!-- 回饋提示區 (僅在即時學習模式顯示) -->
            <div id="feedback-alert" class="hidden mt-6 p-4 rounded-xl border flex items-start gap-3 transition-all duration-300">
                <div id="feedback-icon-container" class="text-2xl mt-0.5"></div>
                <div>
                    <h4 id="feedback-title" class="font-extrabold text-base md:text-lg"></h4>
                    <p id="feedback-desc" class="text-sm md:text-base mt-1 text-slate-600"></p>
                </div>
            </div>
        </main>

        <!-- 底部控制按鈕 -->
        <nav class="bg-slate-50 border-t border-slate-200 p-4 flex justify-between items-center gap-4">
            <button id="prev-btn" onclick="prevQuestion()" class="px-5 py-3 rounded-xl font-bold text-slate-700 bg-white border border-slate-300 hover:bg-slate-100 disabled:opacity-50 disabled:pointer-events-none transition-all duration-150">
                <i class="fa-solid fa-arrow-left mr-1"></i> 上一題
            </button>

            <!-- 測驗模式下的提交按鈕，平常隱藏 -->
            <button id="submit-quiz-btn" onclick="calculateAndShowReport(true)" class="hidden px-6 py-3 rounded-xl font-extrabold text-white bg-indigo-600 hover:bg-indigo-700 shadow-md transition-all duration-150 animate-pulse">
                <i class="fa-solid fa-paper-plane mr-1"></i> 提交單元測驗
            </button>

            <button id="next-btn" onclick="nextQuestion()" class="px-5 py-3 rounded-xl font-bold text-white bg-blue-600 hover:bg-blue-700 disabled:opacity-50 disabled:pointer-events-none transition-all duration-150">
                下一題 <i class="fa-solid fa-arrow-right ml-1"></i>
            </button>
        </nav>

        <!-- 頁尾 -->
        <footer class="bg-slate-100 border-t border-slate-200 p-4 flex flex-col md:flex-row justify-between items-center gap-4 text-center">
            <button id="download-btn" onclick="downloadOfflineVersion()" class="bg-slate-700 hover:bg-slate-800 text-white font-bold text-sm px-4 py-2 rounded-lg flex items-center gap-2 transition-all duration-150 shadow-sm">
                <i class="fa-solid fa-cloud-arrow-down"></i> 下載本單元互動離線版
            </button>
            <p class="text-xs text-slate-500 font-medium">© 報讀互動教學小幫手 ｜ 本單元採 CC BY-NC-SA 4.0 授權</p>
        </footer>
    </div>

    <!-- 學習成果報告 Modal -->
    <div id="report-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-2xl shadow-2xl border border-slate-200 w-full max-w-lg overflow-hidden transform scale-95 transition-all duration-300 relative">
            
            <!-- 裝飾性背景煙火特效容器 -->
            <div id="modal-confetti" class="absolute inset-0 pointer-events-none overflow-hidden"></div>

            <div class="p-6 text-center">
                <div class="w-20 h-20 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4 text-4xl shadow-inner animate-bounce">
                    <i class="fa-solid fa-award"></i>
                </div>
                
                <h3 class="text-2xl font-black text-slate-800" id="report-title">單元學習成果報告</h3>
                <p class="text-slate-500 font-bold mt-1 text-sm" id="report-subtitle">恭喜你完成了這個單元的挑戰！</p>
                
                <!-- 成績看板 -->
                <div class="my-6 bg-slate-50 p-6 rounded-2xl border border-slate-100 flex flex-col items-center justify-center">
                    <span class="text-sm font-bold text-slate-500 uppercase tracking-widest">單元得分</span>
                    <span class="text-6xl font-black text-indigo-600 mt-2" id="report-score">0 <span class="text-2xl font-bold text-slate-400">分</span></span>
                    
                    <div class="grid grid-cols-2 gap-4 w-full mt-6 pt-4 border-t border-slate-200 text-sm">
                        <div class="text-left bg-emerald-50 p-3 rounded-xl border border-emerald-100">
                            <p class="text-emerald-700 font-bold"><i class="fa-solid fa-circle-check mr-1"></i>答對題數</p>
                            <p class="text-xl font-black text-emerald-800 mt-1" id="report-correct-count">0 題</p>
                        </div>
                        <div class="text-left bg-rose-50 p-3 rounded-xl border border-rose-100">
                            <p class="text-rose-700 font-bold"><i class="fa-solid fa-circle-xmark mr-1"></i>答錯題數</p>
                            <p class="text-xl font-black text-rose-800 mt-1" id="report-wrong-count">0 題</p>
                        </div>
                    </div>
                </div>

                <!-- 評語與語音讚美 -->
                <p id="report-comment" class="text-lg font-extrabold text-indigo-900 mb-6 px-4 py-2 bg-indigo-50 rounded-lg inline-block"></p>

                <!-- 互動按鈕 -->
                <div class="flex flex-col gap-2">
                    <button onclick="retryCurrentUnit()" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-800 font-bold py-3 px-4 rounded-xl transition-all duration-150">
                        <i class="fa-solid fa-rotate-left mr-1"></i> 重新挑戰本單元
                    </button>
                    <button id="next-unit-btn" onclick="goToNextUnit()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold py-3.5 px-4 rounded-xl transition-all duration-150 shadow-lg">
                        解鎖下一單元 <i class="fa-solid fa-circle-arrow-right ml-1"></i>
                    </button>
                    <button onclick="closeReportModal()" class="w-full text-slate-500 hover:text-slate-700 font-bold text-sm py-2">
                        關閉報告
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 題目資料庫加上正確答案 index (0 為第一個選項，1 為第二個，依此類推)
        const questions = [
            { section: "社會適應選擇題", displayId: "1", question: "1. 小新收到簡訊要求點擊連結「驗證」銀行帳戶,最恰當的做法是?", options: ["(1)立刻點擊連結並輸入帳號密碼", "(2)不予理會,並打電話給官方客服確認", "(3)截圖分享到社群媒體請朋友判斷", "(4)回覆簡訊告知對方自己的個資"], answer: 1 },
            { section: "社會適應選擇題", displayId: "2", question: "2. 求職廣告寫「日薪3000元」,但要求先交 5000元保證金,這極可能是?", options: ["(1)體貼員工的好公司", "(2)高薪但專業的要求", "(3)合理的行政費用", "(4)典型的求職陷阱"], answer: 3 },
            { section: "社會適應選擇題", displayId: "3", question: "3. ATM 領錢卡片被機器「吃掉」了,螢幕顯示「請洽服務人員」,應如何處理?", options: ["(1)馬上離開,去別台試試看", "(2)打電話報案說提款機壞了", "(3)記住機台編號,立即聯絡銀行客服協助", "(4)等明天銀行開門再說"], answer: 2 },
            { section: "社會適應選擇題", displayId: "4", question: "4. 在圖書館使用公用電腦後準備離開,為了保護隱私應做什麼?", options: ["(1)把滑鼠藏起來", "(2)將電腦螢幕關掉就好", "(3)執行登出並刪除個人瀏覽紀錄", "(4)把主機電源直接拔掉"], answer: 2 },
            { section: "社會適應選擇題", displayId: "5", question: "5. 接到自稱客服電話要求操作ATM「解除重複扣款」,這通常是?", options: ["(1)購物網站的優惠活動", "(2)詐騙集團的常用手段", "(3)銀行員的貼心提醒", "(4)電腦系統自動升級"], answer: 1 },
            { section: "社會適應選擇題", displayId: "6", question: "6. 關於設定網路帳號密碼,下列哪種做法最安全?", options: ["(1)使用身分證字號或生日當密碼", "(2)所有的網站都用同一組密碼", "(3)設定包含大小寫英文字母與數字的組合", "(4)把密碼寫在貼紙上並黏在螢幕邊框"], answer: 2 },
            { section: "社會適應選擇題", displayId: "7", question: "7. 陌生網友突然傳訊息說要送點數,要求你提供「手機驗證碼」,應該?", options: ["(1)趕快提供以免錯過機會", "(2)詢問對方需不需要身分證字號", "(3)拒絕提供並封鎖該帳號", "(4)轉傳給所有好朋友一起領取"], answer: 2 },
            { section: "社會適應選擇題", displayId: "8", question: "8. 使用網路銀行或金融App時,下列哪項習慣是錯誤的?", options: ["(1)隨時檢查帳戶餘額是否異常", "(2)使用公共免費Wi-Fi 進行大額轉帳", "(3)離開 App 前確認已經登出", "(4)開啟兩步驟驗證功能"], answer: 1 },
            { section: "社會適應選擇題", displayId: "9", question: "9. 辦理手機門號時,將「雙證件正本」交給陌生人獨自處理,可能導致?", options: ["(1)獲得更多贈品", "(2)身分被冒用而成為詐騙共犯", "(3)信用額度自動提升", "(4)辦事速度變快"], answer: 1 },
            { section: "社會適應選擇題", displayId: "10", question: "10.到銀行櫃檯存款後,離開前應該先確認什麼?", options: ["(1)櫃檯人員的名字", "(2)存摺 or 收據上的金額是否正確", "(3)銀行今天有沒有開冷氣", "(4)後面還有多少人在排隊"], answer: 1 },
            { section: "社會適應選擇題", displayId: "11", question: "11. 網購時賣家要求「私下匯款」不透過平台交易,這可能是?", options: ["(1)誠信交易", "(2)省下手續費的好辦法", "(3)網路購物詐騙", "(4)賣家是好心人"], answer: 2 },
            { section: "社會適應選擇題", displayId: "12", question: "12. 遺失金融卡(提款卡)時,第一時間該怎麼辦?", options: ["(1)去警察局報案後就回家睡覺", "(2)打電話給銀行辦理「掛失」停卡", "(3)找找看有沒有同學撿到", "(4)重新辦一張卡,舊的不管它"], answer: 1 },
            { section: "社會適應選擇題", displayId: "13", question: "13. 下列哪一項資料屬於「個人隱私」,不應隨意告知網友?", options: ["(1)喜歡吃的食物", "(2)身分證字號與住家地址", "(3)喜歡的電影", "(4)偶像歌手的名字"], answer: 1 },
            { section: "社會適應選擇題", displayId: "14", question: "14. 接到電話說「帳戶涉及洗錢,請把錢匯到安全帳戶備查」。這是?", options: ["(1)司法程序", "(2)假冒公務機關詐騙", "(3)警察在幫你保護錢", "(4)銀行系統故障"], answer: 1 },
            { section: "社會適應選擇題", displayId: "15", question: "15. 下列哪種方式最能幫助控制預算,避免錢不夠花?", options: ["(1)隨便刷卡下個月再說", "(2)養成記帳習慣,了解開支", "(3)看到喜歡的東西就買", "(4)把錢放在口袋隨手拿"], answer: 1 },
            { section: "社會適應選擇題", displayId: "16", question: "16. 面試時老闆要求「存摺正本與提款卡密碼」,你該怎麼辦?", options: ["(1)乖乖交出", "(2)堅定拒絕,這是不合理的要求", "(3)密碼給錯的就好", "(4)先回家問朋友要不要一起交"], answer: 1 },

            { section: "社會適應選擇題", displayId: "93", question: "93. 哪一項法律主要是提供交通意外受傷時的基本補償?", options: ["(1)強制汽車責任保險法", "(2)消保法", "(3)環境教育", "(4)森林法"], answer: 0 },

            { section: "社會適應選擇題", displayId: "95", question: "95. 在路邊撿到錢 or 皮夾時,我應該怎麼做比較恰當?", options: ["(1)帶回家", "(2)請朋友吃", "(3)送交警局", "(4)丟掉"], answer: 2 },
            { section: "社會適應選擇題", displayId: "96", question: "96. 如果在深夜大聲吵鬧影響鄰居,可能會違反哪一項法律?", options: ["(1)海關緝私", "(2)社會秩序維護法", "(3)商業登記", "(4)專利"], answer: 1 },
            { section: "社會適應選擇題", displayId: "97", question: "97. 下列哪一種做法,才是正確的「節能減碳」環保行動?", options: ["(1)冷氣最強蓋厚被", "(2)隨手關燈", "(3)多取塑膠袋", "(4)水不關"], answer: 1 },
            { section: "社會適應選擇題", displayId: "98", question: "98. 在馬路上聽到救護車鳴笛開過來,行人與車輛應該怎麼做?", options: ["(1)擋車", "(2)賽跑", "(3)靠邊禮讓優先通行", "(4)不理"], answer: 2 },
            { section: "社會適應選擇題", displayId: "99", question: "99. 法律規定「著作權」的主要目的是為了保護什麼?", options: ["(1)寫作業", "(2)創作者作品不被盜用", "(3)隨便畫", "(4)盜版"], answer: 1 },
            { section: "社會適應選擇題", displayId: "100", question: "100. 身為公民,我們享有的基本人權中不包括哪一項自由?", options: ["(1)言論自由", "(2)受教育", "(3)傷害他人自由", "(4)安全保障"], answer: 2 }
        ];

        // 核心狀態管理
        let currentUnitIndex = 0;              // 目前單元 (0 ~ 9 對應單元 1 ~ 10)
        let currentQuestionInUnit = 0;         // 在單元中的題號 (0 ~ 9)
        let quizMode = 'study';                // 'study' (即時回饋學習) or 'test' (模擬測驗計分)
        let userAnswers = Array(10).fill(null); // 當前單元使用者作答紀錄 (長度10)
        let hasCheckedAnswer = Array(10).fill(false); // 即時學習模式下該題是否已被判定對錯

        // Web Speech API 語音控制
        const synth = window.speechSynthesis;
        let utterance = new SpeechSynthesisUtterance();
        utterance.lang = 'zh-TW';
        utterance.rate = 0.9;
        let voices = [];

        // DOM 元素快取
        const preambleEl = document.getElementById('preamble-text');
        const questionEl = document.getElementById('question-text');
        const optionsEl = document.getElementById('options-list');
        const unitSelectEl = document.getElementById('unit-select');
        const voiceSelectEl = document.getElementById('voice-select');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const submitQuizBtn = document.getElementById('submit-quiz-btn');
        const speedControl = document.getElementById('speed-control');
        const speedValue = document.getElementById('speed-value');
        const autoReadToggle = document.getElementById('auto-read-toggle');
        const feedbackAlertEl = document.getElementById('feedback-alert');
        const feedbackTitleEl = document.getElementById('feedback-title');
        const feedbackDescEl = document.getElementById('feedback-desc');
        const feedbackIconContainer = document.getElementById('feedback-icon-container');
        const currentScoreDisplay = document.getElementById('current-score-display');
        const unitTitleDisplay = document.getElementById('unit-title-display');
        const progressTextEl = document.getElementById('progress-text');
        const progressDotsContainer = document.getElementById('progress-dots-container');

        // 載入語音裝置
        function populateVoiceList() {
            voices = synth.getVoices().filter(v => v.lang.startsWith('zh'));
            voiceSelectEl.innerHTML = '';
            
            if (!voices.length) {
                voiceSelectEl.appendChild(new Option('找不到中文語音(TTS)', ''));
                return;
            }
            
            voices.forEach((v, i) => {
                const opt = new Option(v.name, i);
                voiceSelectEl.appendChild(opt);
            });

            // 預設選擇合適的台灣中文發音
            let defaultVoiceIdx = voices.findIndex(v => v.name.includes('Yating') && v.lang === 'zh-TW');
            if (defaultVoiceIdx === -1) defaultVoiceIdx = voices.findIndex(v => v.name.includes('Google') && v.name.includes('國語'));
            if (defaultVoiceIdx === -1) defaultVoiceIdx = voices.findIndex(v => v.lang === 'zh-TW' || v.lang === 'zh_TW');
            if (defaultVoiceIdx === -1) defaultVoiceIdx = 0;

            if (voices[defaultVoiceIdx]) {
                utterance.voice = voices[defaultVoiceIdx];
                voiceSelectEl.selectedIndex = defaultVoiceIdx;
            }
        }

        if (synth.onvoiceschanged !== undefined) {
            synth.onvoiceschanged = populateVoiceList;
        }

        // 切換語音設定面板顯示狀態
        function toggleVoicePanel() {
            const panel = document.getElementById('voice-settings-panel');
            const txt = document.getElementById('voice-panel-toggle-text');
            if (panel.classList.contains('hidden')) {
                panel.classList.remove('hidden');
                txt.textContent = '收合語音設定';
            } else {
                panel.classList.add('hidden');
                txt.textContent = '設定語音/語速';
            }
        }

        // 更新語速
        function updateSpeed(val) {
            const s = parseFloat(val);
            utterance.rate = s;
            speedValue.textContent = `${s.toFixed(1)}x`;
            if (synth.speaking) {
                speakText(utterance.text);
            }
        }

        // 更新發音人
        function updateVoice() {
            const idx = voiceSelectEl.value;
            if (voices[idx]) {
                utterance.voice = voices[idx];
                speakCurrentQuestion();
            }
        }

        // 初始化單元下拉選單
        function initUnits() {
            unitSelectEl.innerHTML = '';
            for (let i = 0; i < 10; i++) {
                const startNum = i * 10 + 1;
                const endNum = (i + 1) * 10;
                const opt = new Option(`單元 ${i + 1} (第 ${startNum} ~ ${endNum} 題)`, i);
                unitSelectEl.appendChild(opt);
            }
            populateVoiceList();
            loadUnit(0);
        }

        // 載入指定的單元 (0-9)
        function loadUnit(unitIdx) {
            synth.cancel();
            currentUnitIndex = parseInt(unitIdx, 10);
            currentQuestionInUnit = 0;
            userAnswers = Array(10).fill(null);
            hasCheckedAnswer = Array(10).fill(false);
            
            unitSelectEl.value = currentUnitIndex;
            unitTitleDisplay.textContent = `單元 ${currentUnitIndex + 1} (第 ${currentUnitIndex * 10 + 1} ~ ${(currentUnitIndex + 1) * 10} 題)`;
            
            renderQuestion();
            updateScoreBoard();
        }

        // 切換單元
        function changeUnit(val) {
            loadUnit(val);
        }

        // 切換模式：即時學習 vs 模擬測驗
        function switchMode(mode) {
            quizMode = mode;
            synth.cancel();
            
            const studyBtn = document.getElementById('mode-study-btn');
            const testBtn = document.getElementById('mode-test-btn');
            
            if (mode === 'study') {
                studyBtn.className = "px-4 py-1.5 rounded-md font-bold text-sm transition-all duration-200 bg-blue-600 text-white shadow-sm";
                testBtn.className = "px-4 py-1.5 rounded-md font-bold text-sm transition-all duration-200 text-slate-600 hover:bg-slate-100";
            } else {
                testBtn.className = "px-4 py-1.5 rounded-md font-bold text-sm transition-all duration-200 bg-indigo-600 text-white shadow-sm";
                studyBtn.className = "px-4 py-1.5 rounded-md font-bold text-sm transition-all duration-200 text-slate-600 hover:bg-slate-100";
            }
            
            // 重新載入當前單元以重設答題狀況
            loadUnit(currentUnitIndex);
        }

        // 取得當前題目在全題庫中的實際 Index
        function getGlobalIndex() {
            return currentUnitIndex * 10 + currentQuestionInUnit;
        }

        // 繪製或更新當前題目
        function renderQuestion() {
            const globalIdx = getGlobalIndex();
            const q = questions[globalIdx];
            
            // 設定前言
            if (q.preamble) {
                preambleEl.textContent = q.preamble;
                preambleEl.style.display = 'block';
            } else {
                preambleEl.style.display = 'none';
            }

            // 設定題目文字 (例如 11. 網購時...)
            questionEl.textContent = q.question;
            
            // 繪製選項
            optionsEl.innerHTML = '';
            q.options.forEach((optText, optIdx) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 md:p-5 rounded-xl border-2 border-slate-200 bg-white hover:bg-blue-50/50 hover:border-blue-300 font-bold text-base md:text-lg transition-all duration-150 flex items-center justify-between shadow-sm group";
                
                // 選項文字
                const textSpan = document.createElement('span');
                textSpan.textContent = optText;
                textSpan.className = "flex-grow pr-4";
                btn.appendChild(textSpan);

                // 狀態 icon 佔位
                const iconContainer = document.createElement('span');
                iconContainer.className = "flex-shrink-0 text-xl w-8 h-8 flex items-center justify-center rounded-full";
                btn.appendChild(iconContainer);

                // 點擊選項邏輯
                btn.onclick = () => selectOption(optIdx);

                // 依照不同模式或狀態套用特定樣式
                applyStyleToOption(btn, optIdx, iconContainer);

                optionsEl.appendChild(btn);
            });

            // 更新按鈕狀態
            prevBtn.disabled = currentQuestionInUnit === 0;
            
            // 在「測驗模式」下，最後一題不顯示下一題，改為顯示提交測驗
            if (quizMode === 'test' && currentQuestionInUnit === 9) {
                nextBtn.classList.add('hidden');
                submitQuizBtn.classList.remove('hidden');
            } else {
                nextBtn.classList.remove('hidden');
                submitQuizBtn.classList.add('hidden');
                nextBtn.disabled = currentQuestionInUnit === 9 && quizMode === 'study'; // 即時模式下最後一題時，下一題按鈕不可用（需從報告看分數）
            }

            // 更新進度與回饋面板
            updateProgressIndicators();
            renderFeedbackPanel();

            // 如果開啟了自動報讀，自動發聲
            if (autoReadToggle.checked) {
                speakCurrentQuestion();
            }
        }

        // 根據作答狀態為選項套用視覺樣式
        function applyStyleToOption(btn, optIdx, iconContainer) {
            const globalIdx = getGlobalIndex();
            const q = questions[globalIdx];
            const chosen = userAnswers[currentQuestionInUnit];
            const checked = hasCheckedAnswer[currentQuestionInUnit];
            const correctIdx = q.answer;

            if (quizMode === 'study') {
                // 【即時學習模式】
                if (checked) {
                    btn.disabled = true; // 已判定就不可再選
                    if (optIdx === correctIdx) {
                        // 正確選項亮綠燈
                        btn.className = "w-full text-left p-4 md:p-5 rounded-xl border-2 border-emerald-500 bg-emerald-50 text-emerald-900 font-bold text-base md:text-lg transition-all duration-150 flex items-center justify-between shadow-sm correct-animate";
                        iconContainer.innerHTML = `<i class="fa-solid fa-circle-check text-emerald-500"></i>`;
                    } else if (optIdx === chosen) {
                        // 選錯的選項亮紅燈
                        btn.className = "w-full text-left p-4 md:p-5 rounded-xl border-2 border-rose-500 bg-rose-50 text-rose-900 font-bold text-base md:text-lg transition-all duration-150 flex items-center justify-between shadow-sm";
                        iconContainer.innerHTML = `<i class="fa-solid fa-circle-xmark text-rose-500"></i>`;
                    } else {
                        // 其他沒選的普通選項變半透明
                        btn.className = "w-full text-left p-4 md:p-5 rounded-xl border border-slate-200 bg-white font-bold text-base md:text-lg opacity-40 flex items-center justify-between";
                    }
                } else if (chosen === optIdx) {
                    // 還沒確認，但目前點選的
                    btn.className = "w-full text-left p-4 md:p-5 rounded-xl border-2 border-blue-500 bg-blue-50/50 font-bold text-base md:text-lg flex items-center justify-between shadow-inner";
                }
            } else {
                // 【模擬測驗模式】
                // 只會顯示目前選取的項目，不透露正確答案
                if (chosen === optIdx) {
                    btn.className = "w-full text-left p-4 md:p-5 rounded-xl border-2 border-indigo-600 bg-indigo-50/50 text-indigo-900 font-bold text-base md:text-lg flex items-center justify-between shadow-inner";
                    iconContainer.innerHTML = `<i class="fa-solid fa-circle text-indigo-600 text-xs"></i>`;
                }
            }
        }

        // 使用者點選選項
        function selectOption(optIdx) {
            synth.cancel();
            const globalIdx = getGlobalIndex();
            const q = questions[globalIdx];
            
            // 記錄當前題目的選擇
            userAnswers[currentQuestionInUnit] = optIdx;

            if (quizMode === 'study') {
                // 即時學習模式：立刻判定對錯並播放專屬語音
                if (!hasCheckedAnswer[currentQuestionInUnit]) {
                    hasCheckedAnswer[currentQuestionInUnit] = true;
                    const isCorrect = (optIdx === q.answer);
                    
                    // 更新畫面上按鈕狀態與計分板
                    renderQuestion();
                    updateScoreBoard();
                    
                    // 即時回饋語音
                    let feedbackSpeech = "";
                    if (isCorrect) {
                        feedbackSpeech = "答對了！太棒了！";
                    } else {
                        // 告訴學生正確答案內容
                        const correctTextClean = q.options[q.answer].replace(/^\(\d+\)/, ''); // 移除 (1) 這種編號
                        feedbackSpeech = `答錯囉，最恰當的做法應該是：${correctTextClean}`;
                    }
                    speakText(feedbackSpeech);

                    // 自動在 1.5 秒後，如果不是最後一題，則提示點擊下一題 (或可手動切換)
                    // 為了教學流暢度，讓使用者自己點擊「下一題」能看得更清楚
                }
            } else {
                // 模擬測驗模式：僅更新 UI 顯示所選
                renderQuestion();
            }
        }

        // 更新進度條點點
        function updateProgressIndicators() {
            progressTextEl.textContent = `進度: ${currentQuestionInUnit + 1} / 10 題`;
            progressDotsContainer.innerHTML = '';
            
            for (let i = 0; i < 10; i++) {
                const dot = document.createElement('div');
                dot.className = "w-4 h-4 rounded-full border transition-all duration-200 ";
                
                if (i === currentQuestionInUnit) {
                    // 當前正在作答，閃爍藍色
                    dot.className += "bg-blue-400 border-blue-600 animate-pulse scale-125";
                } else if (userAnswers[i] === null) {
                    // 未答
                    dot.className += "bg-slate-200 border-slate-300";
                } else {
                    // 已答
                    if (quizMode === 'study') {
                        // 即時學習模式，顯示對錯
                        const isCorrect = (userAnswers[i] === questions[currentUnitIndex * 10 + i].answer);
                        if (isCorrect) {
                            dot.className += "bg-emerald-500 border-emerald-600";
                        } else {
                            dot.className += "bg-rose-500 border-rose-600";
                        }
                    } else {
                        // 測驗模式只顯示已作答藍色
                        dot.className += "bg-indigo-500 border-indigo-600";
                    }
                }
                
                // 點擊點點可以直接跳題 (模擬測驗模式下更方便)
                dot.title = `第 ${i + 1} 題`;
                dot.style.cursor = "pointer";
                dot.onclick = () => {
                    synth.cancel();
                    currentQuestionInUnit = i;
                    renderQuestion();
                };

                progressDotsContainer.appendChild(dot);
            }
        }

        // 計算目前單元分數並更新看板
        function updateScoreBoard() {
            let score = 0;
            for (let i = 0; i < 10; i++) {
                if (userAnswers[i] !== null) {
                    const correctIdx = questions[currentUnitIndex * 10 + i].answer;
                    if (userAnswers[i] === correctIdx) {
                        score += 10;
                    }
                }
            }
            currentScoreDisplay.textContent = score;
        }

        // 顯示/更新即時回饋提示面板 (僅限學習模式)
        function renderFeedbackPanel() {
            const checked = hasCheckedAnswer[currentQuestionInUnit];
            const chosen = userAnswers[currentQuestionInUnit];
            
            if (quizMode === 'study' && checked) {
                const globalIdx = getGlobalIndex();
                const q = questions[globalIdx];
                const isCorrect = (chosen === q.answer);

                feedbackAlertEl.classList.remove('hidden');
                if (isCorrect) {
                    feedbackAlertEl.className = "mt-6 p-4 rounded-xl border border-emerald-200 bg-emerald-50/50 flex items-start gap-3 transition-all duration-300";
                    feedbackIconContainer.innerHTML = `<i class="fa-solid fa-circle-check text-emerald-600"></i>`;
                    feedbackTitleEl.className = "font-extrabold text-emerald-800 text-lg";
                    feedbackTitleEl.textContent = "答對了！非常優秀！";
                    feedbackDescEl.className = "text-sm md:text-base mt-1 text-emerald-700";
                    feedbackDescEl.textContent = "這是一個非常符合社會適應、安全且負責任的做法。繼續保持喔！";
                } else {
                    feedbackAlertEl.className = "mt-6 p-4 rounded-xl border border-rose-200 bg-rose-50/50 flex items-start gap-3 transition-all duration-300";
                    feedbackIconContainer.innerHTML = `<i class="fa-solid fa-triangle-exclamation text-rose-600"></i>`;
                    feedbackTitleEl.className = "font-extrabold text-rose-800 text-lg";
                    feedbackTitleEl.textContent = "答錯囉，沒關係，再接再厲！";
                    feedbackDescEl.className = "text-sm md:text-base mt-1 text-rose-700 font-bold";
                    // 顯示詳解說明
                    const correctOptionText = q.options[q.answer];
                    feedbackDescEl.textContent = `最恰當的做法應該是：${correctOptionText}。請點選正確答案來聽取說明或記住這個安全的行為。`;
                }
            } else {
                feedbackAlertEl.classList.add('hidden');
            }
        }

        // 上一題
        function prevQuestion() {
            synth.cancel();
            if (currentQuestionInUnit > 0) {
                currentQuestionInUnit--;
                renderQuestion();
            }
        }

        // 下一題
        function nextQuestion() {
            synth.cancel();
            if (currentQuestionInUnit < 9) {
                currentQuestionInUnit++;
                renderQuestion();
            } else if (currentQuestionInUnit === 9 && quizMode === 'study') {
                // 學習模式最後一題，按下一題直接跳出成果結算
                calculateAndShowReport(false);
            }
        }

        // 語音朗讀邏輯
        function speakText(text) {
            synth.cancel();
            utterance.text = text;
            utterance.rate = parseFloat(speedControl.value);
            const selectedVoiceIdx = voiceSelectEl.value;
            if (voices[selectedVoiceIdx]) {
                utterance.voice = voices[selectedVoiceIdx];
            }
            synth.speak(utterance);
        }

        // 朗讀當前題目與選項
        function speakCurrentQuestion() {
            const globalIdx = getGlobalIndex();
            const q = questions[globalIdx];
            let textToSpeak = "";
            
            if (q.preamble) {
                textToSpeak += `${q.preamble}。接著是題目。`;
            }
            
            textToSpeak += `${q.question}。選項有：`;
            
            q.options.forEach((opt, idx) => {
                textToSpeak += `${opt}。`;
            });
            
            speakText(textToSpeak);
        }

        // 計算總分並開啟報告 Modal
        function calculateAndShowReport(isManualSubmit = false) {
            synth.cancel();

            // 檢查是否還有未答題目 (測驗模式強制提醒)
            if (quizMode === 'test') {
                const unansweredCount = userAnswers.filter(ans => ans === null).length;
                if (unansweredCount > 0 && isManualSubmit) {
                    const confirmSubmit = confirm(`你還有 ${unansweredCount} 題尚未作答，確定要提交測驗嗎？`);
                    if (!confirmSubmit) return;
                }
            }

            let correctCount = 0;
            let wrongCount = 0;
            
            for (let i = 0; i < 10; i++) {
                const correctIdx = questions[currentUnitIndex * 10 + i].answer;
                if (userAnswers[i] === correctIdx) {
                    correctCount++;
                } else {
                    wrongCount++;
                }
            }

            const finalScore = correctCount * 10;
            
            // 填寫報告內容
            document.getElementById('report-score').innerHTML = `${finalScore} <span class="text-2xl font-bold text-slate-400">分</span>`;
            document.getElementById('report-correct-count').textContent = `${correctCount} 題`;
            document.getElementById('report-wrong-count').textContent = `${wrongCount} 題`;
            document.getElementById('report-title').textContent = `單元 ${currentUnitIndex + 1} 學習成果報告`;

            // 給予不同分數的評語與語音讚美
            let comment = "";
            let speechAward = "";
            if (finalScore === 100) {
                comment = "🎉 太神了！完美的 100 分！你完全掌握了社會適應能力！";
                speechAward = "恭喜你！獲得完美的 一百 分！你真是太優秀、太厲害了！";
                startConfettiEffect();
            } else if (finalScore >= 80) {
                comment = "🌟 超級棒！得到高分！你做得非常好！";
                speechAward = `恭喜你！得到 ${finalScore} 分！做得好棒，繼續保持喔！`;
                startConfettiEffect();
            } else if (finalScore >= 60) {
                comment = "👍 及格囉！基本觀念很正確，再努力一下就完美了！";
                speechAward = `太棒了！得到 ${finalScore} 分！及格囉，再努力一下下就更完美了！`;
            } else {
                comment = "💪 沒關係！我們多練習幾次，一定會越來越進步！";
                speechAward = `你得到了 ${finalScore} 分！沒關係，多讀幾次，相信你下一次一定能拿滿分！`;
            }

            document.getElementById('report-comment').textContent = comment;
            
            // 顯示下一個單元按鈕 (如果是最後一個單元則隱藏)
            const nextUnitBtn = document.getElementById('next-unit-btn');
            if (currentUnitIndex === 9) {
                nextUnitBtn.classList.add('hidden');
            } else {
                nextUnitBtn.classList.remove('hidden');
            }

            // 開啟 Modal
            document.getElementById('report-modal').classList.remove('hidden');
            
            // 報讀成果
            setTimeout(() => {
                speakText(speechAward);
            }, 300);
        }

        // 關閉報告
        function closeReportModal() {
            document.getElementById('report-modal').classList.add('hidden');
            stopConfettiEffect();
        }

        // 重新挑戰當前單元
        function retryCurrentUnit() {
            closeReportModal();
            loadUnit(currentUnitIndex);
        }

        // 前往下一單元
        function goToNextUnit() {
            closeReportModal();
            if (currentUnitIndex < 9) {
                loadUnit(currentUnitIndex + 1);
            }
        }

        // 產生煙火彩帶特效
        function startConfettiEffect() {
            const container = document.getElementById('modal-confetti');
            container.innerHTML = '';
            const colors = ['#f59e0b', '#10b981', '#3b82f6', '#ec4899', '#8b5cf6', '#ef4444'];
            for (let i = 0; i < 40; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = `${Math.random() * 100}%`;
                piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                piece.style.animationDelay = `${Math.random() * 2}s`;
                piece.style.animationDuration = `${1.5 + Math.random() * 1.5}s`;
                piece.style.transform = `rotate(${Math.random() * 360}deg)`;
                container.appendChild(piece);
            }
        }

        function stopConfettiEffect() {
            document.getElementById('modal-confetti').innerHTML = '';
        }

        // 下載完整的離線 HTML (包含整套題庫與新設計)
        function downloadOfflineVersion() {
            // 複製整份文件
            const docClone = document.cloneNode(true);
            
            // 將打包好的檔案自動轉換為下載 Blob
            const blob = new Blob([docClone.documentElement.outerHTML], { type: 'text/html;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `社會適應能力_互動計分版_單元${currentUnitIndex + 1}.html`;
            link.click();
            URL.revokeObjectURL(link.href);
        }

        // 初始化載入
        window.addEventListener('DOMContentLoaded', () => {
            initUnits();
        });
    </script>
</body>
</html>
